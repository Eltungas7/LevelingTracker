<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SAO // Daily Quests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  color-scheme: dark;
  --sao-cyan: #4dd0e1;
  --sao-cyan-bright: #80deea;
  --sao-cyan-dim: rgba(77,208,225,0.18);
  --sao-gold: #ffc107;
  --sao-gold-soft: #ffd54f;
  --sao-weekly: #b39ddb;
  --sao-weekly-soft: #ce93d8;
  --sao-bg: #020d14;
  --sao-bg2: #061a2b;
  --sao-bg3: #0a2238;
  --sao-border: rgba(77,208,225,0.22);
  --sao-border-bright: rgba(77,208,225,0.55);
  --sao-text: #e0f7fa;
  --sao-text-dim: rgba(224,247,250,0.45);
  --sao-green: #69f0ae;
  --sao-red: #ff5252;
  --nav-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--sao-bg);
  color: var(--sao-text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  min-height: 100dvh;
  overflow-x: hidden;
}

body {
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
}

/* ── CONTAINER ── */
.container {
  max-width: 100%;
  padding: 0;
}

/* ── STATUS PANEL ── */
.status-panel {
  background: linear-gradient(180deg, #061a2b 0%, #020d14 100%);
  border-bottom: 1px solid var(--sao-border);
  padding: 8px 12px 10px;
}

.status-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--sao-cyan);
  margin-bottom: 8px;
}

.blink-dot {
  display: inline-block;
  width: 5px; height: 5px;
  background: var(--sao-green);
  border-radius: 50%;
  margin-right: 4px;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.sound-toggle {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 2px; color: inherit;
  min-width: 28px; min-height: 28px;
}
.sound-toggle.muted { opacity: 0.4; }
.top-bar-btns { display: flex; align-items: center; }

/* ── TIER-UP BANNER ──────────────────────────────────────────── */
.tierup-banner {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
  z-index: 9990; min-width: 210px;
  background: rgba(3,12,25,0.97);
  border: 1px solid var(--tu-color, #ffd700);
  border-radius: 10px; padding: 14px 22px; text-align: center;
  box-shadow: 0 0 28px var(--tu-color, #ffd700), 0 6px 20px rgba(0,0,0,0.55);
  animation: tuSlideIn 0.36s cubic-bezier(0.22,1,0.36,1) forwards;
  cursor: pointer;
}
.tierup-banner.leaving { animation: tuSlideOut 0.34s ease forwards; }
.tierup-label {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 3px;
  color: #80deea; margin-bottom: 5px;
}
.tierup-stat {
  font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700;
  color: var(--tu-color, #ffd700); letter-spacing: 1px; margin-bottom: 9px;
}
.tierup-tiers {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.tierup-old {
  font-family: 'Cinzel', serif; font-size: 18px; color: rgba(255,255,255,0.35);
}
.tierup-arrow {
  font-size: 14px; color: var(--tu-color, #ffd700); opacity: 0.7;
}
.tierup-new {
  font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700;
  color: var(--tu-color, #ffd700);
  text-shadow: 0 0 14px var(--tu-color, #ffd700), 0 0 4px #fff;
}
@keyframes tuSlideIn {
  from { opacity:0; transform: translateX(-50%) translateY(-18px) scale(0.94); }
  to   { opacity:1; transform: translateX(-50%) translateY(0)     scale(1);    }
}
@keyframes tuSlideOut {
  from { opacity:1; transform: translateX(-50%) translateY(0) scale(1); }
  to   { opacity:0; transform: translateX(-50%) translateY(-12px) scale(0.96); }
}

/* ── HARVEST OVERLAY ────────────────────────────────────────── */
.harvest-overlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(3,12,25,0.97);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: masteryFadeIn 0.6s ease forwards;
  padding: 32px 24px; text-align: center;
}
.harvest-badge {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: #ffd700; opacity: 0.85; margin-bottom: 10px;
}
.harvest-date {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  color: #80deea; margin-bottom: 18px;
}
.harvest-quests {
  font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 2px;
  color: #ffd700; margin-bottom: 6px;
}
.harvest-xp {
  font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700;
  color: #4dd0e1; margin-bottom: 20px; letter-spacing: 1px;
}
.harvest-gains {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 12px;
  margin-bottom: 24px; width: 100%; max-width: 300px;
}
.harvest-stat-row {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(77,208,225,0.08); border: 1px solid rgba(77,208,225,0.2);
  border-radius: 6px; padding: 6px 10px;
}
.harvest-stat-key {
  font-family: 'Cinzel', serif; font-size: 10px; color: #80deea; letter-spacing: 1px;
}
.harvest-stat-val {
  font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; color: #ffd700;
}
.harvest-no-gains {
  font-family: 'Rajdhani', sans-serif; font-size: 12px;
  color: rgba(128,222,234,0.5); margin-bottom: 24px;
}
.harvest-dismiss-btn {
  background: none; border: 1px solid rgba(255,215,0,0.5); cursor: pointer;
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
  color: #ffd700; padding: 10px 28px; border-radius: 4px; margin-top: 4px;
}
.harvest-dismiss-btn:active { background: rgba(255,215,0,0.12); }

/* ── LEVEL UP POPUP ────────────────────────────────────────── */
.lvup-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  animation: lvup-fadein 0.3s ease;
}
@keyframes lvup-fadein { from{opacity:0} to{opacity:1} }
.lvup-panel {
  background: var(--sao-bg2);
  border: 2px solid var(--lvup-rc, #4dd0e1);
  border-radius: 10px;
  width: min(340px, 90vw);
  max-height: 85vh; overflow-y: auto;
  padding: 20px 16px 16px;
  box-shadow: 0 0 40px color-mix(in srgb, var(--lvup-rc,#4dd0e1) 40%, transparent);
  animation: lvup-scalein 0.35s cubic-bezier(.17,.67,.35,1.2);
}
@keyframes lvup-scalein { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
.lvup-header { text-align: center; margin-bottom: 16px; }
.lvup-sparkles {
  font-size: 16px; letter-spacing: 8px;
  color: var(--lvup-rc, #4dd0e1);
  animation: lvup-pulse 1.2s infinite alternate;
}
@keyframes lvup-pulse { from{opacity:0.5} to{opacity:1} }
.lvup-title {
  font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
  color: #fff; letter-spacing: 4px; margin: 4px 0 2px;
  text-shadow: 0 0 20px var(--lvup-rc,#4dd0e1);
}
.lvup-level { font-family: 'Cinzel', serif; font-size: 13px; color: var(--sao-text-dim); letter-spacing: 2px; }
.lvup-lv-num { font-size: 28px; font-weight: 700; color: var(--lvup-rc, #4dd0e1); }
.lvup-rank-badge {
  display: inline-block; margin-top: 6px;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
  border: 1px solid; border-radius: 4px; padding: 2px 10px;
}
.lvup-milestone { margin-top: 8px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; font-weight: 700; }
.lvup-section { margin-bottom: 14px; }
.lvup-section-label {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px;
  color: var(--sao-text-dim); margin-bottom: 8px;
  border-bottom: 1px solid var(--sao-border); padding-bottom: 4px;
}
.lvup-x { color: var(--sao-gold); font-size: 10px; }
.lvup-stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.lvup-stat {
  background: var(--sao-bg3); border-radius: 5px; padding: 6px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.lvup-stat-key { font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; }
.lvup-stat-arrow { font-size: 9px; color: var(--sao-gold); }
.lvup-stat-new { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; }
.lvup-combat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.lvup-cstat {
  background: var(--sao-bg3); border-radius: 5px; padding: 5px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.lvup-cstat-name { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px; color: var(--sao-text-dim); }
.lvup-cstat-change { font-size: 10px; color: var(--sao-text); }
.lvup-btn {
  width: 100%; margin-top: 4px;
  background: none; border: 1px solid var(--lvup-rc, #4dd0e1);
  color: var(--lvup-rc, #4dd0e1); border-radius: 6px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px;
  padding: 10px; cursor: pointer; transition: background 0.2s;
}
.lvup-btn:active { background: rgba(77,208,225,0.15); }

.status-body {}

.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.avatar-frame {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--sao-cyan);
  background: var(--sao-bg3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(77,208,225,0.3);
}
.avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
#avatarLetter { font-family: 'Cinzel', serif; font-size: 14px; color: var(--sao-cyan); }
#avatarInput { display: none; }

.player-info-wrap {
  flex: 1;
  display: flex; align-items: center; justify-content: space-between;
  min-width: 0;
}
.player-info { min-width: 0; }
.player-name {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-tag {
  font-size: 10px; letter-spacing: 1.5px;
  color: var(--sao-cyan); opacity: 0.7;
}
.player-edit-btn {
  background: none; border: 1px solid var(--sao-border);
  color: var(--sao-cyan); border-radius: 4px;
  font-size: 14px; cursor: pointer;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.lvl-pill {
  font-family: 'Cinzel', serif;
  font-size: 10px; font-weight: 700;
  color: var(--sao-gold);
  border: 1px solid rgba(255,193,7,0.4);
  border-radius: 10px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}

.bars-row {
  display: flex; flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
}
.bar-block {}
.bar-label {
  display: flex; justify-content: space-between;
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 1px;
  color: var(--sao-text-dim);
  margin-bottom: 3px;
}
.bar-name { color: var(--sao-cyan-bright); }
.bar-track {
  height: 7px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-fill.hp  { background: linear-gradient(90deg, #00c853, #69f0ae); box-shadow: 0 0 8px rgba(105,240,174,0.6); }
.bar-fill.mp  { background: linear-gradient(90deg, #00b0ff, #80d8ff); box-shadow: 0 0 8px rgba(0,176,255,0.6); }
.bar-fill.exp { background: linear-gradient(90deg, #f9a825, #ffd54f); box-shadow: 0 0 8px rgba(255,193,7,0.6); }

.micro-stats {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 5px;
}
.micro {
  background: var(--sao-bg3);
  border: 1px solid var(--sao-border);
  border-top: 2px solid var(--sao-border);
  border-radius: 4px;
  padding: 7px 2px;
  text-align: center;
}
.micro:nth-child(1) { border-top-color: rgba(255,152,0,0.7); }
.micro:nth-child(2) { border-top-color: rgba(77,208,225,0.6); }
.micro:nth-child(3) { border-top-color: rgba(179,157,219,0.6); }
.micro-value.weekly-val { color: var(--sao-weekly); text-shadow: 0 0 10px rgba(179,157,219,0.5); }
.micro:nth-child(4) { border-top-color: rgba(255,193,7,0.6); }
.micro-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 1px;
  color: rgba(224,247,250,0.55);
  margin-bottom: 2px;
}
.micro-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--sao-cyan-bright);
  text-shadow: 0 0 10px rgba(77,208,225,0.5);
}
.micro-value.gold { color: var(--sao-gold); text-shadow: 0 0 10px rgba(255,193,7,0.5); }
.micro-value.str { color: #ff8a80; }
.micro-value.dex { color: #b9f6ca; }
.micro-value.con { color: #ffd180; }
.micro-value.int { color: #82b1ff; }
.micro-value.vol { color: #e040fb; }
.micro-value.cha { color: #ff8a65; }

/* ── BOTTOM NAV TABS ── */
.tabs {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  padding-bottom: env(safe-area-inset-bottom);
  background: rgba(6,26,43,0.97);
  border-top: 1px solid var(--sao-border-bright);
  display: flex;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  font-size: 7px; letter-spacing: 0.5px;
  color: var(--sao-text-dim);
  transition: color 0.2s, background 0.2s;
  border: none; background: none;
  padding: 0 2px;
  min-height: 44px;
  line-height: 1.2;
  text-align: center;
}
.tab .tab-icon { font-size: 16px; line-height: 1; }
.tab.active {
  color: var(--sao-cyan);
  background: rgba(77,208,225,0.07);
  border-top: 2px solid var(--sao-cyan);
}
.tab.tab-full { /* inventory — same as others */ }

/* ── MAIN PANEL ── */
.panel {
  padding: 10px 10px 0;
}

.panel-header {
  padding: 8px 0 6px;
  border-bottom: 1px solid var(--sao-border);
  margin-bottom: 10px;
}
.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 13px; font-weight: 700;
  color: var(--sao-cyan);
  letter-spacing: 2px;
}
.panel-subtitle {
  font-size: 10px; color: var(--sao-text-dim);
  letter-spacing: 1px; margin-top: 1px;
}

/* ── SECTION HEADERS ── */
.section-header {
  display: flex; align-items: center;
  gap: 6px; margin-bottom: 6px; margin-top: 10px;
  flex-wrap: wrap;
}
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 2px;
  color: var(--sao-cyan);
  white-space: nowrap;
}
.section-label.gold { color: var(--sao-weekly); }
.section-label.neg  { color: var(--sao-red); }
.section-line { flex: 1; height: 1px; background: var(--sao-border); min-width: 10px; }
.section-line.gold { background: rgba(179,157,219,0.3); }
.section-line.neg  { background: rgba(255,82,82,0.25); }
.add-habit-btn.neg { border-color: var(--sao-red); color: var(--sao-red); background: rgba(255,82,82,0.08); }

/* ── NEGATIVE HABITS ── */
.quest.negative { border-left-color: rgba(255,82,82,0.55); background: rgba(255,82,82,0.03); }
.quest.negative.failed { background: rgba(255,82,82,0.09); border-color: rgba(255,82,82,0.4); border-left-color: var(--sao-red); }
.quest.negative.failed .quest-text { color: var(--sao-text-dim); }
.neg-check-ring {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 50%; border: 2px solid var(--sao-red);
  background: transparent; position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.neg-check-ring.failed {
  background: var(--sao-red); border-color: var(--sao-red);
  box-shadow: 0 0 8px rgba(255,82,82,0.6);
}
.neg-check-ring.failed::after { content: '✕'; color: #fff; font-size: 13px; font-weight: 700; }
.neg-penalty {
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
  color: var(--sao-red); border: 1px solid rgba(255,82,82,0.4);
  background: rgba(255,82,82,0.08); border-radius: 3px;
  padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
}
.quest.negative.failed .neg-penalty { opacity: 0.45; text-decoration: line-through; }
.neg-float .xp-float-xp { color: var(--sao-red); text-shadow: 0 0 18px rgba(255,82,82,0.9), 0 0 36px rgba(255,82,82,0.4); }
.neg-failing { animation: quest-complete-exit 0.25s ease forwards; pointer-events: none; }
.section-meta { font-size: 10px; color: var(--sao-text-dim); white-space: nowrap; }
.bulk-btn {
  font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 1px;
  padding: 3px 6px; border-radius: 3px; cursor: pointer;
  border: 1px solid;
}
.bulk-btn.mark { border-color: var(--sao-cyan); color: var(--sao-cyan); background: rgba(77,208,225,0.08); }
.bulk-btn.unmark { border-color: rgba(255,82,82,0.5); color: var(--sao-red); background: rgba(255,82,82,0.07); }
.add-habit-btn {
  width: 24px; height: 24px;
  border: 1px solid var(--sao-cyan); border-radius: 50%;
  background: rgba(77,208,225,0.1); color: var(--sao-cyan);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.add-habit-btn.gold { border-color: var(--sao-weekly); color: var(--sao-weekly); background: rgba(179,157,219,0.1); }

/* ── QUEST LIST ── */
.quest-list { display: flex; flex-direction: column; gap: 8px; }
/* ── XP FLOAT ── */
.xp-float {
  position: fixed; left: 50%; top: 33%;
  transform: translateX(-50%);
  text-align: center; pointer-events: none;
  z-index: 9999;
  animation: xp-float-up 1.3s ease forwards;
}
.xp-float-xp {
  font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700;
  color: var(--sao-gold); letter-spacing: 2px;
  text-shadow: 0 0 18px rgba(255,193,7,0.9), 0 0 36px rgba(255,193,7,0.4);
}
.xp-float-gains {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 8px; flex-wrap: wrap;
}
.xp-float-chip {
  font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600;
  padding: 3px 9px; border-radius: 3px; border: 1px solid;
}
.xf-STR { color: #ff8a80; border-color: rgba(255,138,128,0.5); background: rgba(255,138,128,0.15); text-shadow: 0 0 8px rgba(255,138,128,0.6); }
.xf-DEX { color: #b9f6ca; border-color: rgba(185,246,202,0.5); background: rgba(185,246,202,0.15); text-shadow: 0 0 8px rgba(185,246,202,0.6); }
.xf-CON { color: #ffd180; border-color: rgba(255,209,128,0.5); background: rgba(255,209,128,0.15); text-shadow: 0 0 8px rgba(255,209,128,0.6); }
.xf-INT { color: #82b1ff; border-color: rgba(130,177,255,0.5); background: rgba(130,177,255,0.15); text-shadow: 0 0 8px rgba(130,177,255,0.6); }
.xf-VOL { color: #e040fb; border-color: rgba(224,64,251,0.5); background: rgba(224,64,251,0.15); text-shadow: 0 0 8px rgba(224,64,251,0.6); }
.xf-CHA { color: #ff8a65; border-color: rgba(255,138,101,0.5); background: rgba(255,138,101,0.15); text-shadow: 0 0 8px rgba(255,138,101,0.6); }
@keyframes xp-float-up {
  0%   { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.82); }
  18%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
  65%  { opacity: 1; transform: translateX(-50%) translateY(-44px) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-72px) scale(0.96); }
}

.quest-completing {
  animation: quest-complete-exit 0.25s ease forwards;
  pointer-events: none;
}
@keyframes quest-complete-exit {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(8px); }
}

.quest-done-separator {
  display: flex; align-items: center; gap: 8px;
  margin: 6px 0 2px;
}
.quest-done-separator::before,
.quest-done-separator::after {
  content: ''; flex: 1; height: 1px; background: rgba(105,240,174,0.2);
}
.quest-done-separator-label {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px;
  color: var(--sao-green); opacity: 0.65; white-space: nowrap;
}

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  background: rgba(77,208,225,0.04);
  border: 1px solid rgba(77,208,225,0.2);
  border-radius: 5px;
  padding: 8px 10px 9px;
  margin: 0 0 12px;
}
.progress-bar-wrap.weekly {
  background: rgba(179,157,219,0.04);
  border-color: rgba(179,157,219,0.2);
}
.progress-bar-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 7px;
}
.progress-bar-label {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: var(--sao-cyan); opacity: 0.75;
}
.progress-bar-label.weekly { color: var(--sao-weekly); }
.progress-bar-pct {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
  color: var(--sao-cyan); letter-spacing: 1px;
  text-shadow: 0 0 12px rgba(77,208,225,0.7);
}
.progress-bar-pct.weekly { color: var(--sao-weekly); text-shadow: 0 0 12px rgba(179,157,219,0.7); }
.progress-bar-pct.complete { color: var(--sao-green); text-shadow: 0 0 14px rgba(105,240,174,0.9); }
.progress-bar-track {
  height: 10px;
  background: rgba(0,10,20,0.6);
  border-radius: 5px;
  border: 1px solid rgba(77,208,225,0.12);
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.progress-bar-track.weekly { border-color: rgba(179,157,219,0.12); }
.progress-bar-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, rgba(77,208,225,0.65), var(--sao-cyan-bright));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 10px rgba(77,208,225,0.55), 0 0 20px rgba(77,208,225,0.2);
  position: relative; overflow: hidden;
}
.progress-bar-fill::after {
  content: '';
  position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: bar-shimmer 2.5s ease-in-out infinite;
}
.progress-bar-fill.weekly {
  background: linear-gradient(90deg, rgba(149,117,205,0.8), var(--sao-weekly-soft));
  box-shadow: 0 0 10px rgba(179,157,219,0.55), 0 0 20px rgba(179,157,219,0.2);
}
.progress-bar-fill.complete {
  background: linear-gradient(90deg, rgba(105,240,174,0.8), var(--sao-green));
  box-shadow: 0 0 14px var(--sao-green), 0 0 28px rgba(105,240,174,0.35);
  animation: bar-flash 0.8s ease;
}
@keyframes bar-shimmer {
  0% { left: -80%; }
  100% { left: 130%; }
}
@keyframes bar-flash {
  0%,100% { box-shadow: 0 0 14px var(--sao-green), 0 0 28px rgba(105,240,174,0.35); }
  50% { box-shadow: 0 0 24px var(--sao-green), 0 0 55px rgba(105,240,174,0.55); }
}
.quests-complete-banner {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
  color: var(--sao-cyan); text-align: center;
  text-shadow: 0 0 12px rgba(77,208,225,0.8);
  max-height: 0; overflow: hidden; margin-top: 0;
  transition: max-height 0.3s ease, margin-top 0.3s ease;
}
.quests-complete-banner.weekly { color: var(--sao-weekly); text-shadow: 0 0 12px rgba(179,157,219,0.8); }
.quests-complete-banner.active { max-height: 28px; margin-top: 9px; animation: complete-pulse 2s ease-in-out infinite; }
.quests-complete-banner.weekly.active { animation: complete-pulse-weekly 2s ease-in-out infinite; }
@keyframes complete-pulse {
  0%,100% { opacity: 0.8; text-shadow: 0 0 12px rgba(77,208,225,0.7); }
  50% { opacity: 1; text-shadow: 0 0 20px rgba(77,208,225,1), 0 0 40px rgba(77,208,225,0.4); }
}
@keyframes complete-pulse-weekly {
  0%,100% { opacity: 0.8; text-shadow: 0 0 12px rgba(179,157,219,0.7); }
  50% { opacity: 1; text-shadow: 0 0 20px rgba(179,157,219,1), 0 0 40px rgba(179,157,219,0.4); }
}

.quest {
  background: var(--sao-bg2);
  border: 1px solid var(--sao-border);
  border-left: 3px solid rgba(77,208,225,0.5);
  border-radius: 6px;
  padding: 12px 12px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  position: relative;
  min-height: 52px;
  transition: border-color 0.2s, background 0.2s;
}
.quest.completed {
  background: rgba(105,240,174,0.05);
  border-color: rgba(105,240,174,0.25);
}
.quest.weekly { border-left-color: rgba(179,157,219,0.6); }
.quest.weekly.completed { border-left-color: var(--sao-weekly); }

.check-ring {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--sao-cyan);
  background: transparent;
  position: relative;
  transition: all 0.2s;
}
.completed .check-ring {
  background: var(--sao-green);
  border-color: var(--sao-green);
  box-shadow: 0 0 8px rgba(105,240,174,0.5);
}
.completed .check-ring::after {
  content: '✓';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #000; font-weight: 700;
}

.quest-text {
  flex: 1; font-size: 15px; font-weight: 500;
  color: var(--sao-text);
  line-height: 1.3;
}
.completed .quest-text { color: var(--sao-text-dim); text-decoration: line-through; }

.gains { display: flex; flex-wrap: wrap; gap: 3px; }
.gain-chip {
  font-family: 'Cinzel', serif;
  font-size: 11px; padding: 2px 7px;
  border-radius: 3px; border: 1px solid;
  white-space: nowrap;
}
.gain-STR { color: #ff6b6b; border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.08); }
.gain-DEX { color: #40e0ff; border-color: rgba(64,224,255,0.35);  background: rgba(64,224,255,0.08);  }
.gain-CON { color: #81c784; border-color: rgba(129,199,132,0.35); background: rgba(129,199,132,0.08); }
.gain-INT { color: #7b9dff; border-color: rgba(123,157,255,0.35); background: rgba(123,157,255,0.08); }
.gain-VOL { color: #e060f5; border-color: rgba(224,96,245,0.35);  background: rgba(224,96,245,0.08);  }
.gain-CHA { color: #ffe57f; border-color: rgba(255,229,127,0.35); background: rgba(255,229,127,0.08); }

/* Always visible on mobile */
.quest-actions {
  display: flex; gap: 4px;
  opacity: 1;
}
.quest-action-btn {
  width: 28px; height: 28px;
  border-radius: 4px; border: 1px solid;
  background: none; cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.quest-action-btn.edit { border-color: rgba(77,208,225,0.4); color: var(--sao-cyan); }
.quest-action-btn.del  { border-color: rgba(255,82,82,0.4);  color: var(--sao-red); }

.drag-handle {
  color: var(--sao-text-dim); font-size: 14px;
  cursor: grab; padding: 0 2px;
  opacity: 1;
}

.streak-badge {
  display: flex; align-items: center; gap: 2px;
  font-family: 'Cinzel', serif; font-size: 9px;
  color: var(--sao-gold); white-space: nowrap;
  flex-shrink: 0;
}
.streak-badge.milestone { color: #ff6d00; }
.streak-fire { font-size: 11px; }

.tier-badge {
  display: inline-block;
  font-family: 'Cinzel', serif; font-size: 8px;
  background: rgba(255,193,7,0.15); color: var(--sao-gold);
  border: 1px solid rgba(255,193,7,0.3); border-radius: 3px;
  padding: 1px 4px; margin-left: 5px;
}
.scalable-mark { color: var(--sao-cyan); font-size: 11px; margin-left: 4px; }

/* ── TIER SELECTOR ── */
.tier-selector { display: none; }
.tier-selector.show {
  display: block;
  background: var(--sao-bg3);
  border: 1px solid var(--sao-border-bright);
  border-radius: 6px;
  padding: 10px;
  margin-top: 4px;
}
.tier-prompt {
  font-family: 'Cinzel', serif; font-size: 8px;
  letter-spacing: 2px; color: var(--sao-cyan);
  text-align: center; margin-bottom: 8px;
}
.tier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.tier-btn {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 5px; padding: 8px 6px;
  cursor: pointer; text-align: left; color: var(--sao-text);
  min-height: 44px;
}
.tier-btn.elite { border-color: rgba(255,193,7,0.5); background: rgba(255,193,7,0.05); }
.tier-btn.sel-tier { border-color: var(--sao-cyan); background: rgba(77,208,225,0.1); }
.tier-time { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-cyan); margin-bottom: 2px; }
.tier-gains-line { font-size: 9px; color: var(--sao-text-dim); }

/* Date banner */
.date-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,193,7,0.07); border: 1px solid rgba(255,193,7,0.3);
  border-radius: 5px; padding: 8px 10px; margin-bottom: 10px;
}
.date-banner-text { font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-gold); }
.date-banner-btn {
  font-family: 'Cinzel', serif; font-size: 8px;
  background: none; border: 1px solid var(--sao-cyan);
  color: var(--sao-cyan); border-radius: 3px; padding: 3px 7px; cursor: pointer;
}

/* ── FOOTER / RESET ── */
.footer-actions {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding: 8px 0 4px;
  border-top: 1px solid var(--sao-border);
}
.progress-text { font-size: 10px; color: var(--sao-text-dim); letter-spacing: 1px; }
.reset-btn {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px;
  background: none; border: 1px solid rgba(255,82,82,0.4);
  color: var(--sao-red); border-radius: 3px; padding: 4px 8px; cursor: pointer;
}

/* ── ADD TASK FORM ── */
.add-task-form { display: flex; gap: 6px; margin-top: 10px; }
.add-task-input {
  flex: 1; background: var(--sao-bg3); border: 1px solid var(--sao-border);
  color: var(--sao-text); border-radius: 5px; padding: 8px 10px;
  font-family: 'Rajdhani', sans-serif; font-size: 13px;
  min-height: 44px;
}
.add-task-input:focus { outline: none; border-color: var(--sao-cyan); }
.add-btn {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px;
  background: rgba(77,208,225,0.12); border: 1px solid var(--sao-cyan);
  color: var(--sao-cyan); border-radius: 5px; padding: 8px 10px; cursor: pointer;
  min-height: 44px; white-space: nowrap;
}

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 30px 10px; }
.empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.3; }
.empty-text { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-text-dim); }
.empty-sub  { font-size: 11px; color: var(--sao-text-dim); margin-top: 4px; opacity: 0.6; }

/* ── CHARACTER TAB ── */
.character-grid {
  display: flex; flex-direction: column; gap: 10px;
}
.radar-card {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 6px; padding: 10px;
}
.radar-title {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: var(--sao-cyan); text-align: center; margin-bottom: 6px;
}
#radarCanvas { height: 200px !important; }

.stats-list { display: flex; flex-direction: column; gap: 5px; }
.stat-row-wrap {}
.stat-row {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 5px; padding: 8px 10px; cursor: pointer;
}
.stat-row-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 5px;
}
.stat-name-block { display: flex; align-items: baseline; gap: 6px; }
.stat-code { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; color: var(--sao-cyan); }
.stat-full-name { font-size: 10px; color: var(--sao-text-dim); }
.stat-tier {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px;
  color: var(--sao-gold);
}
.stat-row-bar { height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.stat-row-fill { height: 100%; background: linear-gradient(90deg, var(--sao-cyan), var(--sao-cyan-bright)); border-radius: 4px; transition: width 0.4s; }
.stat-row-foot { display: flex; justify-content: space-between; font-size: 9px; color: var(--sao-text-dim); }
.stat-points { color: var(--sao-cyan-bright); }

.stat-detail {
  background: rgba(6,26,43,0.8); border: 1px solid var(--sao-border);
  border-top: none; border-radius: 0 0 5px 5px;
  padding: 8px 10px; font-size: 11px;
}
.stat-detail-sources { margin-bottom: 8px; font-size: 10px; color: var(--sao-text-dim); line-height: 1.6; }
.stat-detail-table { width: 100%; border-collapse: collapse; font-size: 9px; margin-bottom: 6px; }
.stat-detail-thead th { font-family: 'Cinzel', serif; font-size: 8px; color: var(--sao-text-dim); letter-spacing: 1px; padding: 3px 4px; text-align: left; border-bottom: 1px solid var(--sao-border); }
.stat-detail-td { padding: 3px 4px; }
.stat-detail-tr.is-current td { background: rgba(77,208,225,0.05); }
.stat-detail-maxgain { font-size: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 6px; border-top: 1px solid var(--sao-border); }

.character-summary {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 5px; padding: 10px; text-align: center; margin-top: 6px;
}
.summary-class { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--sao-gold); letter-spacing: 3px; }
.summary-tagline { font-size: 11px; color: var(--sao-text-dim); margin-top: 3px; }

/* ── CLASS PANEL ── */
.class-panel {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 6px; padding: 10px; margin-bottom: 8px;
}
.class-panel-hdr {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: var(--sao-cyan); text-align: center; margin-bottom: 8px;
}
.class-name-row {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 3px;
}
.class-name-big {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; letter-spacing: 3px;
}
.class-tier-badge {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px;
  padding: 2px 6px; border-radius: 3px; border: 1px solid currentColor; opacity: 0.8;
}
.class-tagline { font-size: 10px; color: var(--sao-text-dim); text-align: center; margin-bottom: 8px; }
.class-bonuses {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px;
}
.class-bonus-pill {
  padding: 2px 8px; border-radius: 10px;
  background: rgba(77,208,225,0.08); border: 1px solid rgba(77,208,225,0.25);
  color: var(--sao-cyan-bright); font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px;
}
.class-mastery-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.class-mastery-bar {
  flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
}
.class-mastery-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.class-mastery-label { font-size: 9px; color: var(--sao-text-dim); white-space: nowrap; }
.class-unlock-alert {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px;
  color: #ffd700; text-align: center; margin-bottom: 6px;
}
.class-change-btn {
  display: block; width: 100%; padding: 7px; font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 2px; background: transparent;
  border: 1px solid var(--sao-cyan); color: var(--sao-cyan);
  border-radius: 4px; cursor: pointer; text-align: center;
}
.class-change-btn:active { background: rgba(77,208,225,0.1); }
.stat-passive-bonus { color: var(--sao-gold-soft); font-size: 9px; margin-left: 4px; }

/* ── CLASS SELECT POPUP ── */
.class-popup-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200;
  display: flex; flex-direction: column; backdrop-filter: blur(4px);
}
.class-popup-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 8px; border-bottom: 1px solid var(--sao-border); flex-shrink: 0;
}
.class-popup-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; color: var(--sao-cyan); }
.class-popup-close {
  font-size: 22px; color: var(--sao-text-dim); background: none;
  border: none; cursor: pointer; padding: 0 4px; line-height: 1;
}
.class-tier-tabs {
  display: flex; overflow-x: auto; border-bottom: 1px solid var(--sao-border);
  flex-shrink: 0; scrollbar-width: none;
}
.class-tier-tab {
  flex: 0 0 auto; padding: 9px 14px; font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: 1px; color: var(--sao-text-dim); background: none;
  border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
}
.class-tier-tab.active { color: var(--sao-cyan); border-bottom-color: var(--sao-cyan); }
.class-tier-tab.locked-tab { opacity: 0.45; }
/* Progression tree */
.class-tree-row {
  display: flex; align-items: center; overflow-x: auto;
  padding: 10px 12px 8px; gap: 0; border-bottom: 1px solid var(--sao-border);
  flex-shrink: 0; scrollbar-width: none;
}
.tree-node {
  flex: 0 0 auto; text-align: center; padding: 5px 8px; border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.08); min-width: 62px; cursor: pointer;
  transition: border-color 0.2s;
}
.tree-node.tree-active  { border-color: rgba(77,208,225,0.3); background: rgba(77,208,225,0.05); }
.tree-node.tree-complete { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.05); }
.tree-node.tree-locked  { opacity: 0.4; }
.tree-node-name { font-family:'Cinzel',serif; font-size:8px; font-weight:700; letter-spacing:1px; margin-bottom:2px; }
.tree-node-req  { font-size:7px; color:var(--sao-text-dim); margin-bottom:2px; line-height:1.3; }
.tree-node-status { font-size:7px; color:var(--sao-text-dim); }
.tree-complete .tree-node-status { color:var(--sao-gold); }
.tree-active .tree-node-status   { color:var(--sao-cyan-bright); }
.tree-eq-dot { color:var(--sao-cyan); margin-right:2px; }
.tree-arrow { flex: 0 0 auto; color:rgba(255,255,255,0.2); font-size:12px; padding:0 3px; }

.class-card-prereq { font-size:7px; color:var(--sao-text-dim); margin-top:3px; line-height:1.5; }
.class-card-unlock { font-size:7px; color:var(--sao-text-dim); margin-top:1px; line-height:1.5; }

.class-popup-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
.class-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.class-card {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);

.class-card-passive { font-size: 8px; color: var(--sao-cyan-bright); }

.class-card-eq-badge {

}

/* Combat stats */
.combat-stats-section { margin-top: 10px; }
.cstat-category { margin-bottom: 10px; }
.cstat-cat-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cstat-cat-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: var(--sao-cyan); white-space: nowrap; }
.cstat-cat-line { flex: 1; height: 1px; }
.cstat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 5px; }
.cstat-card {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 5px; padding: 7px 8px;
  border-left: 2px solid var(--cc, var(--sao-cyan));
}
.cstat-card.cstat-zero { opacity: 0.4; }
.cstat-icon { font-size: 12px; }
.cstat-name { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 1px; color: var(--sao-text-dim); margin: 1px 0; }
.cstat-value { font-size: 15px; font-weight: 700; color: var(--cc, var(--sao-cyan)); }
.cstat-unit { font-size: 9px; color: var(--sao-text-dim); margin-left: 2px; }
.cstat-source { font-size: 8px; color: var(--sao-text-dim); opacity: 0.6; margin-top: 1px; }

/* ── MASTERY / TIER-COMPLETE / TRUE HERO OVERLAYS ── */
.mastery-overlay {
  position: fixed; inset: 0; z-index: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.97) 70%);
  backdrop-filter: blur(10px); padding: 24px;
  animation: masteryFadeIn 0.5s cubic-bezier(0.22,1,0.36,1);
}
.tier-complete-overlay { background: radial-gradient(ellipse at center, rgba(10,8,0,0.5) 0%, rgba(0,0,0,0.97) 70%); }
.true-hero-overlay { background: radial-gradient(ellipse at center, rgba(20,20,20,0.4) 0%, rgba(0,0,0,0.99) 60%); }

.mastery-badge {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px;
  color: var(--mc, #ffd700); opacity: 0.75; margin-bottom: 16px; text-align: center;
}
.mastery-class-name {
  font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700;
  letter-spacing: 5px; color: var(--mc, #ffd700); text-align: center;
  text-shadow: 0 0 30px var(--mc, #ffd700), 0 0 60px color-mix(in srgb, var(--mc,#ffd700) 40%, transparent);
  animation: masteryPulse 2s ease-in-out infinite;
}
.mastery-tier-label {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
  color: rgba(255,255,255,0.45); margin-top: 6px; margin-bottom: 20px; text-align: center;
}
.mastery-reward-box {
  border: 1px solid color-mix(in srgb, var(--mc,#ffd700) 30%, transparent);
  border-radius: 6px; padding: 12px 20px; text-align: center;
  background: rgba(0,0,0,0.4); margin-bottom: 20px; min-width: 200px;
}
.mastery-reward-title {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: var(--sao-text-dim); margin-bottom: 8px;
}
.mastery-reward-line { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.8; }
.mastery-reward-val { color: var(--mc, #ffd700); font-weight: 700; font-size: 15px; }
.mastery-dismiss {
  font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 2px;
  font-family: 'Cinzel', serif; animation: masteryBlink 2s ease-in-out infinite;
}

/* TRUE HERO specific */
.th-question-wrap { position: relative; height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.th-question {
  font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700;
  letter-spacing: 8px; color: rgba(255,255,255,0.3);
  position: absolute;
}
.th-reveal {
  font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700;
  letter-spacing: 5px; color: #fff;
  text-shadow: 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.4);
  position: absolute; opacity: 0;
}

@keyframes masteryFadeIn  { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
@keyframes masteryFadeOut { from { opacity:1; transform:scale(1); }    to { opacity:0; transform:scale(1.06); } }
@keyframes masteryPulse   { 0%,100% { text-shadow: 0 0 25px var(--mc,#ffd700); } 50% { text-shadow: 0 0 55px var(--mc,#ffd700), 0 0 90px color-mix(in srgb,var(--mc,#ffd700) 30%,transparent); } }
@keyframes masteryBlink   { 0%,100% { opacity:0.2; } 50% { opacity:0.6; } }
@keyframes thRevealIn     { 0% { opacity:0; letter-spacing:14px; } 60% { opacity:1; letter-spacing:6px; } 100% { opacity:1; letter-spacing:5px; text-shadow:0 0 40px #fff,0 0 100px rgba(255,255,255,0.5); } }

/* ── HISTORY TAB ── */
.period-selector { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.period-btn {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
  background: var(--sao-bg2); border: 1px solid var(--sao-border);

}
.period-btn.active { border-color: var(--sao-cyan); color: var(--sao-cyan); background: rgba(77,208,225,0.1); }

.chart-section { background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.chart-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-cyan); margin-bottom: 10px; }

.chart-bars-row { display: flex; align-items: flex-end; gap: 4px; min-height: 120px; padding-bottom: 4px; }
.chart-label-row { display: flex; gap: 4px; }
.chart-bar {
  flex: 1; min-width: 22px; max-width: 44px;

}

.chart-bar.bar-low   { background: linear-gradient(180deg, var(--sao-red), rgba(255,82,82,0.6)); }
.chart-bar.bar-empty { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); }
.chart-bar.bar-sel   { outline: 2px solid var(--sao-cyan); }
.chart-bar-pct { font-size: 9px; color: #000; font-weight: 700; padding-top: 3px; }
.chart-label-cell { flex: 1; min-width: 22px; max-width: 44px; text-align: center; font-size: 10px; color: var(--sao-text-dim); cursor: pointer; padding-top: 3px; }

.chart-summary { display: flex; align-items: center; justify-content: space-around; background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.chart-summary-item { text-align: center; }

.chart-summary-value { font-size: 20px; font-weight: 700; color: var(--sao-cyan-bright); }
.chart-summary-value.good { color: var(--sao-green); }

.chart-summary-value.low  { color: var(--sao-red); }
.chart-summary-divider { width: 1px; height: 30px; background: var(--sao-border); }

.day-detail { background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; }
.day-detail-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.day-detail-date { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; color: var(--sao-cyan); }
.day-detail-score { font-size: 12px; color: var(--sao-text-dim); }
.hist-goto-btn { font-family: 'Cinzel', serif; font-size: 10px; background: none; border: 1px solid var(--sao-cyan); color: var(--sao-cyan); border-radius: 3px; padding: 5px 9px; cursor: pointer; white-space: nowrap; min-height: 34px; }
.day-detail-section { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-text-dim); margin: 10px 0 5px; }
.hist-readonly-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(77,208,225,0.07); }
.hist-check { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--sao-border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.hist-check.done { background: var(--sao-green); border-color: var(--sao-green); color: #000; font-weight: 700; }
.hist-quest-text { flex: 1; font-size: 12px; }
.hist-xp { font-size: 11px; color: var(--sao-text-dim); white-space: nowrap; }
.hist-empty { font-size: 11px; color: var(--sao-text-dim); text-align: center; padding: 10px; }
.custom-range { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

/* ── ACHIEVEMENTS TAB ── */
.logros-summary {
  display: flex; align-items: center; justify-content: space-between;

}

.logros-summary-val { font-size: 22px; font-weight: 700; color: var(--sao-gold); }

.logros-wrap {}

.logros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

.logro-icon { font-size: 20px; margin-bottom: 3px; }
.logro-name { font-family: 'Cinzel', serif; font-size: 8px; color: var(--sao-text); margin-bottom: 4px; }
.logro-tier-badge { font-size: 8px; padding: 2px 5px; border-radius: 3px; margin-bottom: 5px; display: inline-block; }
.logro-tier-badge.t0 { background: rgba(180,120,60,0.15); color: #cd7f32; }

.logro-tier-badge.t2 { background: rgba(255,193,7,0.15); color: var(--sao-gold); }
.logro-tier-badge.t3 { background: rgba(77,208,225,0.12); color: var(--sao-cyan); }
.logro-tier-badge.t4 { background: rgba(255,193,7,0.12); color: var(--sao-gold); }
.logro-prog-wrap {}

.logro-prog-fill.t4 { background: linear-gradient(90deg, var(--sao-gold), var(--sao-cyan)); }
.logro-prog-label { font-size: 9px; color: var(--sao-text-dim); margin-top: 2px; text-align: right; }

.logro-detail-hdr { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }

.logro-detail-stat { font-size: 10px; margin-top: 3px; }
.logro-tier-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--sao-border); }

.logro-detail-prog { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--sao-text-dim); text-align: center; margin-top: 10px; }

.inv-equip-panel { background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; }

.inv-equip-slot {

.inv-bag-panel { background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; }
