/* ── DUNGEON ── */
.dungeon-section {}
.dungeon-select-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; color: var(--sao-cyan); text-align: center; padding: 10px 0 4px; }
.dungeon-select-sub { font-size: 10px; color: var(--sao-text-dim); text-align: center; margin-bottom: 10px; }
.dungeon-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.dungeon-card {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 6px; padding: 10px 8px; cursor: pointer; text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.dungeon-card.selected { border-color: var(--dcolor); box-shadow: 0 0 10px var(--dglow); }
.dcard-emoji { font-size: 22px; margin-bottom: 3px; }
.dcard-diff { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px; color: var(--dcolor); }
.dcard-name { font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-text); margin: 2px 0; }
.dcard-time { font-size: 9px; color: var(--sao-text-dim); }
.dcard-rewards { display: flex; gap: 4px; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
.dcard-xp  { font-size: 9px; color: var(--sao-cyan); }
.dcard-col { font-size: 9px; color: var(--sao-gold); }
.dcard-stat { font-size: 8px; color: var(--sao-text-dim); margin-top: 2px; }
.dungeon-enter-btn {
  display: block; width: 100%;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  background: rgba(77,208,225,0.12); border: 1px solid var(--sao-cyan);
  color: var(--sao-cyan); border-radius: 5px; padding: 10px; cursor: pointer;
  margin-bottom: 8px; min-height: 44px;
}

.dungeon-explore { border: 1px solid var(--sao-border); border-radius: 8px; padding: 10px; margin-bottom: 8px; background: var(--dbg, var(--sao-bg2)); }
.dexp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.dexp-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--dcolor); font-weight: 700; }
.dexp-diff-badge { font-family: 'Cinzel', serif; font-size: 8px; padding: 2px 7px; border: 1px solid var(--dcolor); color: var(--dcolor); border-radius: 3px; }
.dexp-overall { margin-bottom: 8px; }
.dexp-overall-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--sao-text-dim); margin-bottom: 3px; }
.dexp-overall-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.dexp-overall-fill { height: 100%; background: linear-gradient(90deg, var(--dcolor), var(--dcolor)); border-radius: 3px; transition: width 1s; }
.dexp-scene { height: 60px; background: rgba(0,0,0,0.3); border-radius: 6px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-around; overflow: hidden; position: relative; }
.dexp-bg { position: absolute; inset: 0; }
.dexp-hero { font-size: 22px; z-index: 1; }
.dexp-hero.running { animation: heroRun 0.5s steps(2) infinite; }
@keyframes heroRun { 0%{transform:translateY(0)} 50%{transform:translateY(-3px)} 100%{transform:translateY(0)} }
.dexp-vs { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-text-dim); z-index: 1; }
.dexp-enemy { font-size: 24px; z-index: 1; }
.dexp-enemy.paused { opacity: 0.5; }
.dexp-enemy-name { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--sao-text-dim); text-align: center; margin-bottom: 8px; }
.dexp-pomo-section { background: rgba(0,0,0,0.2); border-radius: 5px; padding: 8px; margin-bottom: 8px; }
.dexp-pomo-phase { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--dcolor); text-align: center; margin-bottom: 4px; }
.dexp-pomo-phase.break-phase { color: var(--sao-green); }
.dexp-pomo-timer { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700; color: var(--dcolor); text-align: center; letter-spacing: 3px; }
.dexp-pomo-timer.paused { opacity: 0.5; }
.dexp-pomo-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; margin: 6px 0; }
.dexp-pomo-fill { height: 100%; background: var(--dcolor); border-radius: 2px; transition: width 1s linear; }
.dexp-pomo-fill.break-fill { background: var(--sao-green); }
.dexp-pomo-count { font-size: 10px; color: var(--sao-text-dim); text-align: center; }
.dexp-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.dexp-btn {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px;
  border-radius: 4px; padding: 8px 10px; cursor: pointer; border: 1px solid;
  flex: 1; min-height: 40px; text-align: center;
}
.dexp-btn-primary { background: rgba(77,208,225,0.15); border-color: var(--sao-cyan); color: var(--sao-cyan); }
.dexp-btn-pause   { background: rgba(255,193,7,0.1);  border-color: var(--sao-gold); color: var(--sao-gold); }
.dexp-btn-exit    { background: rgba(105,240,174,0.1); border-color: var(--sao-green); color: var(--sao-green); }
.dexp-btn-boss    { background: rgba(244,67,54,0.1);  border-color: var(--sao-red); color: var(--sao-red); }
.dexp-btn-abandon { background: rgba(255,82,82,0.07); border-color: rgba(255,82,82,0.4); color: var(--sao-red); }
.dexp-complete-badge { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px; color: var(--sao-gold); text-align: center; margin-top: 8px; border: 1px solid rgba(255,193,7,0.3); border-radius: 4px; padding: 5px; }

.dungeon-boss { border: 1px solid var(--dcolor); border-radius: 8px; padding: 10px; margin-bottom: 8px; box-shadow: 0 0 15px var(--dglow,rgba(77,208,225,0.2)); }
.dboss-header { display: flex; align-items: center; justify-content: space-between; font-family: 'Cinzel', serif; font-size: 11px; color: var(--dcolor); margin-bottom: 6px; }
.dboss-turn { font-size: 9px; color: var(--sao-text-dim); }
.practice-badge { font-size: 8px; background: rgba(156,39,176,0.2); border: 1px solid rgba(156,39,176,0.5); color: #ce93d8; border-radius: 3px; padding: 1px 5px; margin-left: 6px; }
.dboss-practice-bar { font-size: 9px; color: var(--sao-text-dim); text-align: center; padding: 4px; margin-bottom: 6px; background: rgba(0,0,0,0.2); border-radius: 3px; }
.dboss-arena { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.dboss-fighter { flex: 1; }
.dboss-sprite { font-size: 28px; text-align: center; margin-bottom: 4px; display: block; }
.dboss-sprite.boss-sprite { font-size: 32px; }
.dboss-sprite.d-dead { filter: grayscale(1); opacity: 0.4; }
.dboss-name { font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-text-dim); text-align: center; margin-bottom: 4px; }
.dboss-bar-wrap { margin-bottom: 4px; }
.dboss-bar-label { display: flex; justify-content: space-between; font-size: 8px; color: var(--sao-text-dim); margin-bottom: 2px; }
.dboss-track { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.dboss-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.hp-fill { background: linear-gradient(90deg, #e53935, #ef5350); }
.mp-fill { background: linear-gradient(90deg, #1565c0, #1e88e5); }
.enemy-hp-fill { background: linear-gradient(90deg, var(--dcolor), var(--dcolor)); }
.dboss-buff { font-size: 9px; color: var(--sao-gold); margin-top: 2px; }
.dboss-derived-stats { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.dboss-derived-stats span { font-size: 8px; background: rgba(255,255,255,0.05); border-radius: 3px; padding: 1px 4px; color: var(--sao-text-dim); }
.dboss-vs-divider { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-text-dim); align-self: center; padding: 0 4px; }
.dboss-log { background: rgba(0,0,0,0.3); border-radius: 5px; padding: 8px; height: 100px; overflow-y: auto; margin-bottom: 8px; }
.d-log-line { font-size: 10px; color: var(--sao-text-dim); padding: 1px 0; line-height: 1.4; }
.dboss-outcome { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 3px; text-align: center; padding: 8px; margin-bottom: 6px; border-radius: 4px; }
.dboss-outcome.win  { color: var(--sao-gold); background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); }
.dboss-outcome.lose { color: var(--sao-red);  background: rgba(255,82,82,0.1);  border: 1px solid rgba(255,82,82,0.3); }
.dboss-skills { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.skill-btn {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 5px; padding: 7px 6px; cursor: pointer; text-align: left;
  color: var(--sao-text); min-height: 60px; display: flex; flex-direction: column; gap: 1px;
}
.skill-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.skill-btn.queued { border-color: var(--sao-cyan); background: rgba(77,208,225,0.1); }
.skill-emoji { font-size: 14px; }
.skill-name { font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-cyan); }
.skill-desc { font-size: 8px; color: var(--sao-text-dim); }
.skill-cd   { font-size: 9px; color: var(--sao-gold); }

.dungeon-reward { border: 1px solid var(--dcolor); border-radius: 8px; padding: 14px; margin-bottom: 8px; text-align: center; }
.dreward-title { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; color: var(--sao-gold); margin-bottom: 4px; }
.dreward-subtitle { font-size: 11px; color: var(--sao-text-dim); margin-bottom: 12px; }
.dreward-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.dreward-item { display: flex; align-items: center; gap: 8px; font-size: 12px; justify-content: center; }
.dreward-icon { font-size: 16px; }
.dreward-item.boss-bonus { color: var(--sao-gold); font-weight: 700; }

.dungeon-divider { display: flex; align-items: center; gap: 8px; margin: 12px 0 8px; }
.dungeon-divider span { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-cyan); white-space: nowrap; }
.dungeon-divider::before,.dungeon-divider::after { content:''; flex: 1; height: 1px; background: var(--sao-border); }

.practice-section { background: var(--sao-bg2); border: 1px solid var(--sao-border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.practice-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: #ce93d8; text-align: center; }
.practice-sub { font-size: 9px; color: var(--sao-text-dim); text-align: center; margin-bottom: 8px; }
.practice-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.practice-card { background: var(--sao-bg3); border: 1px solid var(--pcolor); border-radius: 5px; padding: 8px 6px; text-align: center; }
.pcard-emoji { font-size: 18px; }
.pcard-diff { font-family: 'Cinzel', serif; font-size: 7px; color: var(--pcolor); }
.pcard-name { font-size: 9px; color: var(--sao-text); margin: 2px 0; }
.pcard-hp   { font-size: 8px; color: var(--sao-text-dim); }
.pcard-fight { font-family: 'Cinzel', serif; font-size: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--pcolor); color: var(--pcolor); border-radius: 3px; padding: 5px 8px; cursor: pointer; margin-top: 5px; width: 100%; min-height: 32px; }

/* ── MODAL — Bottom sheet ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }

.modal-box {
  width: 100%; max-width: 100%;
  max-height: 88dvh;
  background: var(--sao-bg2);
  border: 1px solid var(--sao-border-bright);
  border-radius: 14px 14px 0 0;
  border-bottom: none;
  display: flex; flex-direction: column;
  overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--sao-border);
  flex-shrink: 0;
}
.modal-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; color: var(--sao-cyan); }
.modal-close { background: none; border: 1px solid var(--sao-border); color: var(--sao-text-dim); border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-size: 14px; }

.modal-body {
  flex: 1; overflow-y: auto;
  padding: 12px 14px;
  -webkit-overflow-scrolling: touch;
}

.modal-footer {
  display: flex; gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--sao-border);
  flex-shrink: 0;
}
.m-btn { flex: 1; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; padding: 10px; border-radius: 5px; cursor: pointer; min-height: 44px; border: 1px solid; }
.m-btn.cancel { background: rgba(255,82,82,0.08); border-color: rgba(255,82,82,0.4); color: var(--sao-red); }
.m-btn.save   { background: rgba(77,208,225,0.12); border-color: var(--sao-cyan); color: var(--sao-cyan); }

/* Modal form fields */
.m-field { margin-bottom: 12px; }
.m-label { display: block; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: var(--sao-text-dim); margin-bottom: 5px; }
.m-input {
  width: 100%; background: var(--sao-bg3); border: 1px solid var(--sao-border);
  color: var(--sao-text); border-radius: 5px; padding: 9px 10px;
  font-family: 'Rajdhani', sans-serif; font-size: 14px; min-height: 44px;
}
.m-input:focus { outline: none; border-color: var(--sao-cyan); }
.m-input.narrow { width: 80px; }
.m-toggle-row { display: flex; gap: 6px; }
.m-toggle {
  flex: 1; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px;
  background: var(--sao-bg3); border: 1px solid var(--sao-border);
  color: var(--sao-text-dim); border-radius: 4px; padding: 8px 4px; cursor: pointer; min-height: 36px;
}
.m-toggle.active { border-color: var(--sao-cyan); color: var(--sao-cyan); background: rgba(77,208,225,0.1); }
.m-toggle.gold-active { border-color: var(--sao-gold); color: var(--sao-gold); background: rgba(255,193,7,0.1); }
.m-divider { height: 1px; background: var(--sao-border); margin: 8px 0 12px; }

/* Stat selector */
.stat-selector { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.stat-sel-item { background: var(--sao-bg3); border: 1px solid var(--sao-border); border-radius: 5px; padding: 6px; cursor: pointer; text-align: center; }
.stat-sel-item.on { border-color: var(--sao-cyan); background: rgba(77,208,225,0.08); }
.stat-sel-code { font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700; }
.stat-sel-item.STR .stat-sel-code { color: #ff8a80; }
.stat-sel-item.DEX .stat-sel-code { color: #b9f6ca; }
.stat-sel-item.CON .stat-sel-code { color: #ffd180; }
.stat-sel-item.INT .stat-sel-code { color: #82b1ff; }
.stat-sel-item.VOL .stat-sel-code { color: #ce93d8; }
.stat-sel-item.CHA .stat-sel-code { color: #ffe082; }
.stat-sel-amt { display: flex; align-items: center; gap: 3px; margin-top: 4px; justify-content: center; }
.stat-sel-btn { width: 20px; height: 20px; background: var(--sao-bg2); border: 1px solid var(--sao-border); color: var(--sao-text); border-radius: 3px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.stat-sel-num { width: 30px; background: none; border: none; color: var(--sao-cyan); font-size: 12px; text-align: center; }

/* Tier builder */
.tier-builder { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.tier-row { background: var(--sao-bg3); border: 1px solid var(--sao-border); border-radius: 5px; padding: 8px; position: relative; }
.tier-row.elite-row { border-color: rgba(255,193,7,0.4); }
.tier-row-remove { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--sao-red); cursor: pointer; font-size: 12px; }
.tier-row-top { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.tier-row-inputs { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
.mini-field { display: flex; flex-direction: column; gap: 2px; }
.mini-label { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 1px; color: var(--sao-text-dim); }
.mini-input { background: var(--sao-bg2); border: 1px solid var(--sao-border); color: var(--sao-text); border-radius: 3px; padding: 4px 5px; font-family: 'Rajdhani', sans-serif; font-size: 12px; min-height: 30px; }
.mini-input.w80 { width: 100%; }
.mini-input.w55 { width: 100%; }
.elite-toggle { display: flex; align-items: center; gap: 6px; margin-top: 6px; cursor: pointer; }
.elite-check { width: 14px; height: 14px; border: 1px solid var(--sao-border); border-radius: 2px; }
.elite-check.on { background: var(--sao-gold); border-color: var(--sao-gold); }
.elite-label { font-size: 10px; color: var(--sao-text-dim); }
.add-tier-btn { font-family: 'Cinzel', serif; font-size: 8px; width: 100%; padding: 7px; background: rgba(77,208,225,0.08); border: 1px dashed rgba(77,208,225,0.4); color: var(--sao-cyan); border-radius: 4px; cursor: pointer; min-height: 36px; }
.mark-all-info { font-size: 11px; color: var(--sao-text-dim); background: rgba(77,208,225,0.06); border-radius: 4px; padding: 7px; margin-bottom: 8px; }

/* ── NOTIFICATION — slides from top ── */
.notification {
  position: fixed;
  top: 0; left: 8px; right: 8px;
  background: linear-gradient(135deg, #061a2b, #0a2238);
  border: 1px solid var(--sao-cyan);
  border-top: none;
  border-radius: 0 0 10px 10px;
  z-index: 300;
  transform: translateY(-110%);
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  padding: 8px 12px;
  box-shadow: 0 4px 20px rgba(77,208,225,0.25);
}
.notification.show { transform: translateY(0); }
.notif-bar { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 3px; color: var(--sao-cyan); opacity: 0.7; margin-bottom: 2px; }
.notif-body { font-size: 12px; color: var(--sao-text); font-weight: 500; }

/* ── LEVEL UP ── */
@keyframes levelUpPulse { 0%,100%{box-shadow:0 0 0 rgba(255,193,7,0)} 50%{box-shadow:0 0 20px rgba(255,193,7,0.4)} }
.level-up { animation: levelUpPulse 0.6s ease 3; }

/* ── STREAK FLASH ── */
@keyframes streak7flash { 0%,100%{background:var(--sao-bg2)} 25%,75%{background:rgba(255,193,7,0.15)} }
.streak-7-flash { animation: streak7flash 1.1s ease; }
.streak-milestone { border-color: rgba(255,152,0,0.6) !important; }
.drag-over-top    { border-top: 2px solid var(--sao-cyan) !important; }
.drag-over-bottom { border-bottom: 2px solid var(--sao-cyan) !important; }

/* ── D-HIT ANIMATION ── */
@keyframes dHit { 0%,100%{filter:none} 50%{filter:brightness(2.5) saturate(0.5)} }
.d-hit { animation: dHit 0.28s ease; }
.d-dead { filter: grayscale(1); opacity: 0.4; }

/* ── FIRST HABIT OF THE DAY ── */
.first-habit-overlay {
  position: fixed; inset: 0; z-index: 9997;
  background: rgba(2,13,20,0.93);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: all;
  animation: fhIn 0.38s ease forwards;
}
.first-habit-overlay.leaving { animation: fhOut 0.45s ease forwards; }
@keyframes fhIn  { from{opacity:0} to{opacity:1} }
@keyframes fhOut { from{opacity:1} to{opacity:0} }

.fh-scan {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(77,208,225,0.018) 3px, rgba(77,208,225,0.018) 4px);
  animation: fhScan 8s linear infinite;
}
@keyframes fhScan { from{background-position:0 0} to{background-position:0 100px} }

.fh-glow-ring {
  width: 140px; height: 140px; border-radius: 50%;
  border: 1px solid rgba(77,208,225,0.35);
  box-shadow: 0 0 30px rgba(77,208,225,0.15), inset 0 0 30px rgba(77,208,225,0.06);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px; opacity: 0;
  animation: fhRingIn 0.55s 0.15s ease forwards, fhRingPulse 2s 0.7s ease infinite alternate;
}
@keyframes fhRingIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
@keyframes fhRingPulse { from{box-shadow:0 0 20px rgba(77,208,225,0.1), inset 0 0 20px rgba(77,208,225,0.04)} to{box-shadow:0 0 50px rgba(77,208,225,0.3), inset 0 0 40px rgba(77,208,225,0.12)} }
.fh-ring-icon { font-size: 48px; }

.fh-eyebrow {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 5px;
  color: var(--sao-cyan); opacity: 0; margin-bottom: 10px;
  animation: fhUp 0.5s 0.35s ease forwards;
}
.fh-title {
  font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; letter-spacing: 3px;
  color: #fff; text-align: center; line-height: 1.25; opacity: 0; margin-bottom: 10px;
  text-shadow: 0 0 28px rgba(77,208,225,0.55), 0 0 60px rgba(77,208,225,0.2);
  animation: fhUp 0.5s 0.5s ease forwards;
}
.fh-line {
  width: 0; height: 1px; margin: 4px auto 14px;
  background: linear-gradient(90deg, transparent, var(--sao-cyan), transparent);
  animation: fhLine 0.6s 0.65s ease forwards;
}
@keyframes fhLine { from{width:0} to{width:180px} }
.fh-sub {
  font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 7px;
  color: var(--sao-gold); opacity: 0;
  text-shadow: 0 0 18px rgba(255,193,7,0.45);
  animation: fhUp 0.5s 0.75s ease forwards;
}
.fh-tap { font-size: 9px; color: var(--sao-text-dim); letter-spacing: 2px; opacity: 0; margin-top: 32px; animation: fhUp 0.5s 1.1s ease forwards; }
@keyframes fhUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ── PERFECT DAY ── */
.perfect-day-overlay {
  position: fixed; inset: 0; z-index: 9996;
  background: rgba(2,13,20,0.96);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: all; overflow: hidden;
  animation: pdIn 0.5s ease forwards;
}
.perfect-day-overlay.leaving { animation: pdOut 0.6s ease forwards; }
@keyframes pdIn  { from{opacity:0} to{opacity:1} }
@keyframes pdOut { from{opacity:1} to{opacity:0} }

.pd-bg-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at center, rgba(255,193,7,0.07) 0%, transparent 70%);
  animation: pdGlowPulse 1.8s ease infinite alternate;
}
@keyframes pdGlowPulse { from{opacity:0.5} to{opacity:1} }

.pd-scan {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,193,7,0.012) 3px, rgba(255,193,7,0.012) 4px);
}

.pd-star {
  position: absolute; color: var(--sao-gold); pointer-events: none; opacity: 0;
  animation: pdStarFloat linear forwards;
}
@keyframes pdStarFloat {
  0%   { opacity: 0; transform: translateY(0) scale(0.5); }
  15%  { opacity: 1; }
  85%  { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(-100px) scale(1.4); }
}

.pd-crown { font-size: 42px; opacity: 0; margin-bottom: 18px; animation: pdUp 0.6s 0.2s ease forwards; }
.pd-eyebrow {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 5px;
  color: var(--sao-cyan); opacity: 0; margin-bottom: 12px;
  animation: pdUp 0.6s 0.35s ease forwards;
}
.pd-title {
  font-family: 'Cinzel', serif; font-size: 34px; font-weight: 700; letter-spacing: 5px;
  color: var(--sao-gold); text-align: center; line-height: 1.2; opacity: 0;
  animation: pdUp 0.6s 0.5s ease forwards, pdTitleGlow 1.6s 0.9s ease infinite alternate;
}
@keyframes pdTitleGlow {
  from { text-shadow: 0 0 20px rgba(255,193,7,0.4); }
  to   { text-shadow: 0 0 50px rgba(255,193,7,0.9), 0 0 90px rgba(255,193,7,0.35); }
}
.pd-divider {
  width: 0; height: 2px; margin: 18px auto;
  background: linear-gradient(90deg, transparent, var(--sao-gold), transparent);
  animation: pdDivider 0.7s 0.7s ease forwards;
}
@keyframes pdDivider { from{width:0} to{width:220px} }
.pd-sub {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px;
  color: rgba(255,255,255,0.75); text-align: center; line-height: 2; opacity: 0;
  animation: pdUp 0.6s 0.85s ease forwards;
}
.pd-bonus {
  margin-top: 14px; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 2px;
  color: var(--sao-gold); opacity: 0; animation: pdUp 0.6s 1.05s ease forwards;
}
.pd-tap { font-size: 9px; color: var(--sao-text-dim); letter-spacing: 2px; opacity: 0; margin-top: 28px; animation: pdUp 0.5s 1.4s ease forwards; }
@keyframes pdUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sao-border); border-radius: 2px; }

/* ── PARTY TAB ── */
.party-subtabs {
  display: flex; border-bottom: 1px solid var(--sao-border);
  margin: -10px -10px 12px;
}
.party-subtab {
  flex: 1; padding: 11px 8px; font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: 2px; color: var(--sao-text-dim); background: none;
  border: none; border-bottom: 2px solid transparent; cursor: pointer;
  transition: color 0.2s, border-color 0.2s; text-align: center;
}
.party-subtab.active { color: var(--sao-cyan); border-bottom-color: var(--sao-cyan); }

.party-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.party-slot {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 8px; padding: 10px 8px 8px; position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-height: 148px;
}
.party-slot.is-player { border-color: rgba(77,208,225,0.55); box-shadow: 0 0 12px rgba(77,208,225,0.12); }
.party-slot.is-empty  { border-style: dashed; cursor: pointer; justify-content: center; }
.party-slot.is-locked { border-style: dashed; opacity: 0.45; justify-content: center; }

.pslot-badge {
  position: absolute; top: 5px; left: 6px;
  font-family: 'Cinzel', serif; font-size: 6px; letter-spacing: 1px;
  padding: 1px 5px; border-radius: 2px; border: 1px solid;
}
.pslot-badge.leader { border-color: rgba(255,193,7,0.5); color: var(--sao-gold); background: rgba(255,193,7,0.08); }
.pslot-badge.member { border-color: rgba(77,208,225,0.35); color: var(--sao-cyan); background: rgba(77,208,225,0.07); }

.pslot-remove {
  position: absolute; top: 4px; right: 5px; background: none; border: none;
  color: rgba(255,82,82,0.45); cursor: pointer; font-size: 13px; padding: 2px; line-height: 1;
}
.pslot-sprite { margin: 8px 0 2px; display:flex; align-items:center; justify-content:center; }
.pslot-icon  { display:block; filter: drop-shadow(0 0 5px currentColor); }
.pslot-icon--dim { opacity: 0.22; filter: none; }
.pslot-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; margin: 10px 0 2px; border: 1px solid var(--sao-cyan); }
.ptab-icon { vertical-align: middle; margin-right: 3px; opacity: 0.85; }
.pslot-name  { font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700; color: #fff; text-align: center; }
.pslot-class { font-size: 7px; color: var(--sao-text-dim); letter-spacing: 1px; }
.pslot-lv   { font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-gold); }
.pslot-bars { width: 100%; display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.pslot-bar-row { display: flex; align-items: center; gap: 4px; }
.pslot-bar-lbl { font-size: 7px; color: var(--sao-text-dim); width: 12px; flex-shrink: 0; }
.pslot-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.pslot-bar-fill { height: 100%; border-radius: 2px; }
.pslot-bar-fill.hp { background: linear-gradient(90deg,#c62828,#ef5350); }
.pslot-bar-fill.mp { background: linear-gradient(90deg,#1565c0,#42a5f5); }

.pslot-empty-icon { font-size: 22px; opacity: 0.25; margin-bottom: 5px; }
.pslot-empty-text { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 1px; color: var(--sao-text-dim); text-align: center; line-height: 1.6; }
.pslot-lock-icon { font-size: 20px; opacity: 0.35; margin-bottom: 6px; }
.pslot-lock-req  { font-size: 8px; color: var(--sao-text-dim); text-align: center; line-height: 1.5; }

.party-summary {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 6px; padding: 10px; margin-bottom: 8px;
}
.party-summary-title {
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: var(--sao-cyan); text-align: center; margin-bottom: 8px;
}
.party-stats-row { display: flex; justify-content: space-around; }
.party-stat { text-align: center; }
.party-stat-val { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--sao-gold); }
.party-stat-lbl { font-size: 7px; color: var(--sao-text-dim); letter-spacing: 1px; }

/* Tactics hint */
.party-tactics-hint {
  background: rgba(77,208,225,0.04); border: 1px dashed rgba(77,208,225,0.2);
  border-radius: 6px; padding: 10px; text-align: center; margin-bottom: 8px;
}
.party-tactics-hint-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--sao-cyan); opacity:0.6; margin-bottom:3px; }
.party-tactics-hint-text  { font-size:10px; color:var(--sao-text-dim); }

/* Tavern */
.tavern-hdr {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 6px; padding: 12px; margin-bottom: 10px; text-align: center;
}
.tavern-hdr-title { font-family:'Cinzel',serif; font-size:13px; letter-spacing:3px; color:var(--sao-gold); margin-bottom:3px; }
.tavern-hdr-sub   { font-size:10px; color:var(--sao-text-dim); }

.tav-rank-header {
  display:flex; align-items:center; gap:8px; margin: 12px 0 6px;
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px;
}
.tav-rank-header::after { content:''; flex:1; height:1px; background:var(--sao-border); }
.tav-rank-pill  { font-family:'Cinzel',serif; font-size:9px; font-weight:700; padding:2px 7px; border:1px solid; border-radius:3px; flex-shrink:0; }
.tav-rank-cap   { color:var(--sao-text-dim); font-size:8px; flex-shrink:0; }
.tav-rank-lock  { color:rgba(255,82,82,0.6); font-size:8px; flex-shrink:0; }
.tav-rank-free  { color:var(--sao-green); font-size:8px; font-weight:700; flex-shrink:0; }
.tav-rank-cost  { font-size:8px; flex-shrink:0; }
.tav-rank-preview {
  background:rgba(255,255,255,0.03); border:1px dashed rgba(255,255,255,0.1);
  border-radius:6px; padding:12px; text-align:center;
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--sao-text-dim);
  margin-bottom:6px;
}

.pslot-class-row { display:flex; align-items:center; justify-content:center; gap:5px; }
.pslot-rank-badge { font-family:'Cinzel',serif; font-size:7px; padding:1px 4px; border:1px solid; border-radius:2px; }

.tav-section-lbl {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px;
  color:var(--sao-text-dim); margin: 10px 0 6px;
  display:flex; align-items:center; gap:8px;
}
.tav-section-lbl::before,.tav-section-lbl::after { content:''; flex:1; height:1px; background:var(--sao-border); }

.tav-card {
  background: var(--sao-bg2); border: 1px solid var(--sao-border);
  border-radius: 8px; padding: 10px; margin-bottom: 7px;
  display: flex; gap: 10px; align-items: flex-start;
}
.tav-card.in-party  { border-color: rgba(105,240,174,0.4); }
.tav-card.is-locked { opacity: 0.5; }

.tav-sprite  { flex-shrink: 0; margin-top: 2px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
.tav-icon    { display:block; filter: drop-shadow(0 0 6px currentColor); }
.tav-info    { flex: 1; min-width: 0; }
.tav-name-row { display:flex; align-items:center; gap:6px; margin-bottom:1px; }
.tav-name    { font-family:'Cinzel',serif; font-size:12px; font-weight:700; color:#fff; }
.tav-rank-badge-sm { font-family:'Cinzel',serif; font-size:9px; font-weight:700; padding:1px 5px; border:1px solid; border-radius:3px; flex-shrink:0; }
.tav-class   { font-size:8px; color:var(--sao-cyan); letter-spacing:1px; margin-bottom:4px; }
.tav-lore    { font-size:9px; color:var(--sao-text-dim); line-height:1.5; margin-bottom:5px; }
.tav-stats   { display:flex; gap:4px; flex-wrap:wrap; }
.tav-stat-pill {
  font-family:'Cinzel',serif; font-size:7px; padding:1px 5px;
  background:rgba(77,208,225,0.07); border:1px solid rgba(77,208,225,0.2);
  border-radius:3px; color:var(--sao-cyan-bright);
}
.tav-req         { font-size:8px; margin-top:5px; }
.tav-req.met     { color:var(--sao-green); }
.tav-req.unmet   { color:rgba(255,82,82,0.7); }
.tav-actions     { flex-shrink:0; display:flex; flex-direction:column; gap:5px; }
.tav-btn {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px;
  border-radius:4px; padding:7px 9px; cursor:pointer; border:1px solid;
  min-height:42px; text-align:center; line-height:1.4; white-space:nowrap;
}
.tav-btn.recruit   { background:rgba(77,208,225,0.12); border-color:var(--sao-cyan); color:var(--sao-cyan); }
.tav-btn.in-party  { background:rgba(105,240,174,0.08); border-color:var(--sao-green); color:var(--sao-green); }
.tav-btn.locked    { background:none; border-color:rgba(255,255,255,0.1); color:var(--sao-text-dim); cursor:not-allowed; opacity:0.6; }

/* ── CLASS UNLOCK OVERLAY ── */
.class-unlock-overlay {
  position: fixed; inset: 0; z-index: 9995;
  background: rgba(2,13,20,0.96);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: all; overflow: hidden;
  animation: cuIn 0.45s ease forwards;
}
.class-unlock-overlay.leaving { animation: cuOut 0.5s ease forwards; }
@keyframes cuIn  { from{opacity:0;transform:scale(1.04)} to{opacity:1;transform:scale(1)} }
@keyframes cuOut { from{opacity:1} to{opacity:0} }
.cu-bg-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 65% 55% at center, var(--cu-glow, rgba(77,208,225,0.08)) 0%, transparent 65%);
  animation: cuGlowPulse 1.8s ease infinite alternate;
}
@keyframes cuGlowPulse { from{opacity:0.5} to{opacity:1} }
.cu-scan {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(77,208,225,0.014) 3px, rgba(77,208,225,0.014) 4px);
}
.cu-eyebrow { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:var(--sao-cyan); opacity:0; margin-bottom:10px; animation:cuUp 0.5s 0.3s ease forwards; }
.cu-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--sao-text-dim); opacity:0; margin-bottom:20px; animation:cuUp 0.5s 0.42s ease forwards; }
.cu-ring {
  width:130px; height:130px; border-radius:50%;
  border:1px solid var(--cu-color, rgba(77,208,225,0.4));
  box-shadow:0 0 30px var(--cu-glow,rgba(77,208,225,0.12)), inset 0 0 30px var(--cu-glow,rgba(77,208,225,0.05));
  display:flex; align-items:center; justify-content:center;
  margin-bottom:22px; opacity:0;
  animation:cuRingIn 0.55s 0.5s ease forwards, cuRingPulse 2s 1s ease infinite alternate;
}
@keyframes cuRingIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
@keyframes cuRingPulse {
  from{box-shadow:0 0 20px var(--cu-glow,rgba(77,208,225,0.1)), inset 0 0 20px var(--cu-glow,rgba(77,208,225,0.04))}
  to  {box-shadow:0 0 55px var(--cu-glow,rgba(77,208,225,0.25)), inset 0 0 40px var(--cu-glow,rgba(77,208,225,0.10))}
}
.cu-ring-icon { font-size:46px; }
.cu-tier-badge { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; padding:3px 12px; border:1px solid var(--cu-color,var(--sao-cyan)); color:var(--cu-color,var(--sao-cyan)); background:rgba(0,0,0,0.25); border-radius:2px; opacity:0; margin-bottom:12px; animation:cuUp 0.5s 0.7s ease forwards; }
.cu-class-name { font-family:'Cinzel',serif; font-size:26px; font-weight:700; letter-spacing:3px; color:var(--cu-color,#fff); text-align:center; line-height:1.2; opacity:0; animation:cuUp 0.5s 0.85s ease forwards, cuNameGlow 1.6s 1.3s ease infinite alternate; }
@keyframes cuNameGlow {
  from { text-shadow:0 0 18px var(--cu-glow-str,rgba(77,208,225,0.4)); }
  to   { text-shadow:0 0 42px var(--cu-glow-str,rgba(77,208,225,0.8)), 0 0 80px var(--cu-glow,rgba(77,208,225,0.2)); }
}
.cu-class-stats { font-size:11px; color:var(--sao-text-dim); letter-spacing:2px; opacity:0; margin-top:6px; animation:cuUp 0.5s 1.0s ease forwards; }
.cu-divider { width:0; height:1px; margin:14px auto 12px; background:linear-gradient(90deg,transparent,var(--cu-color,var(--sao-cyan)),transparent); animation:cuLine 0.6s 1.1s ease forwards; }
@keyframes cuLine { from{width:0} to{width:200px} }
.cu-sub { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.6); text-align:center; line-height:2; opacity:0; animation:cuUp 0.5s 1.2s ease forwards; }
.cu-tap { font-size:9px; color:var(--sao-text-dim); letter-spacing:2px; opacity:0; margin-top:26px; animation:cuUp 0.5s 1.5s ease forwards; }
@keyframes cuUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
/* Multi-class variant */
.cu-multi-list { display:flex; flex-direction:column; gap:8px; width:100%; max-width:320px; padding:0 20px; margin-bottom:8px; }
.cu-multi-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid rgba(77,208,225,0.2); background:rgba(0,10,20,0.45); border-radius:3px; opacity:0; }
.cu-multi-item:nth-child(1){animation:cuUp 0.45s 0.55s ease forwards}
.cu-multi-item:nth-child(2){animation:cuUp 0.45s 0.68s ease forwards}
.cu-multi-item:nth-child(3){animation:cuUp 0.45s 0.81s ease forwards}
.cu-multi-item:nth-child(4){animation:cuUp 0.45s 0.94s ease forwards}
.cu-multi-item:nth-child(5){animation:cuUp 0.45s 1.07s ease forwards}
.cu-multi-item:nth-child(6){animation:cuUp 0.45s 1.20s ease forwards}
.cu-multi-icon { font-size:18px; flex-shrink:0; }
.cu-multi-name { font-family:'Cinzel',serif; font-size:12px; letter-spacing:1.5px; color:#fff; flex:1; }
.cu-multi-tier { font-size:8px; letter-spacing:1px; color:var(--sao-text-dim); flex-shrink:0; }
.cu-multi-stats { font-size:13px; letter-spacing:1px; flex-shrink:0; margin-left:4px; }
</style>

<body>

<div class="container">
  <div class="status-panel" id="statusPanel">
    <div class="status-top-bar">
      <span><span class="blink-dot"></span>MENU // STATUS</span>
      <span id="dateLabel">--</span>
      <div class="top-bar-btns">
        <button class="sound-toggle" id="exportBtn" title="Export save data" onclick="exportSave()">💾</button>
        <button class="sound-toggle" id="importBtn" title="Import save data" onclick="importSave()">📂</button>
        <button class="sound-toggle" id="soundToggle" title="Toggle sound" onclick="toggleSound()">🔊</button>
      </div>
    </div>
    <div class="status-body">
      <div class="player-row">
        <div class="avatar-frame" id="avatarFrame" onclick="document.getElementById('avatarInput').click()" title="Upload profile photo">
          <span id="avatarLetter">T</span>
        </div>
        <input type="file" id="avatarInput" accept="image/*">
        <div class="player-info-wrap">
          <div class="player-info">
            <div class="player-name" id="playerNameEl">Tuni</div>
            <div class="player-tag" id="playerTagEl">Beginner</div>
          </div>
          <button class="player-edit-btn" onclick="openPlayerModal()" title="Edit profile">✎</button>
        </div>
        <div class="lvl-pill">LV <span id="lvNum">1</span></div>
      </div>
      <div class="bars-row">
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">HP</span><span id="hpText">100/100</span></div>
          <div class="bar-track"><div class="bar-fill hp" id="hpFill" style="width:100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">MP</span><span id="mpText">100/100</span></div>
          <div class="bar-track"><div class="bar-fill mp" id="mpFill" style="width:100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">EXP</span><span id="xpText">0/100</span></div>
          <div class="bar-track"><div class="bar-fill exp" id="xpFill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="micro-stats">
        <div class="micro"><div class="micro-label">STREAK</div><div class="micro-value gold" id="statStreak">0</div></div>

function exportSave() {
  const data = JSON.stringify(state, null, 2);

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sao_save_${todayKey()}.json`; a.click();

  showNotif('💾 Save exported!');
}
function importSave() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imp = JSON.parse(ev.target.result);
        if (!imp.stats || !imp.habitos) throw new Error('bad save');
        Object.assign(state, imp);
        saveState(); renderAll();
        showNotif('✅ Save imported!');

    reader.readAsText(file);
  };
  input.click();
}

// Mobile audio unlock — iOS Safari requires a silent buffer played synchronously

function _unlockAudio() {
  if (!_ACtx) return;
  if (!_actx) _actx = new _ACtx();
  try {
    const buf = _actx.createBuffer(1, 1, 22050);
    const src = _actx.createBufferSource();
    src.buffer = buf; src.connect(_actx.destination); src.start(0);
  } catch(e) {}
  if (_actx.state === 'suspended') _actx.resume().catch(()=>{});
}
document.addEventListener('touchstart', _unlockAudio, {once: true, passive: true});

// ── Level progression ────────────────────────────────────────
const MAX_LEVEL = 99;
const LEVEL_BANDS = [
  { rank:'E',   from:1,  to:10, xpPerLevel:1200  },
  { rank:'D',   from:11, to:20, xpPerLevel:1800  },
  { rank:'C',   from:21, to:35, xpPerLevel:2400  },
  { rank:'B',   from:36, to:50, xpPerLevel:3200  },
  { rank:'A',   from:51, to:69, xpPerLevel:3200  },
  { rank:'S',   from:70, to:84, xpPerLevel:9200  },
  { rank:'SS',  from:85, to:94, xpPerLevel:15600 },
  { rank:'SSS', from:95, to:99, xpPerLevel:32000 },
];
// LEVEL_XP_TABLE[n] = total XP needed to reach level n
const LEVEL_XP_TABLE = (() => {
  const t = { 1:0 };
  for (let lv = 1; lv < MAX_LEVEL; lv++) {
    const band = LEVEL_BANDS.find(b => lv >= b.from && lv <= b.to);
    t[lv+1] = t[lv] + (band ? band.xpPerLevel : 21000);
  }
  return t;
})();
function xpForLevel(lv) {
  const band = LEVEL_BANDS.find(b => lv >= b.from && lv <= b.to);
  return band ? band.xpPerLevel : 21000;
}
function levelRank(lv) {
  return LEVEL_BANDS.find(b => lv >= b.from && lv <= b.to)?.rank || 'SSS';
}
function getLevelUpStatBonus(lv) {
  if (lv === 99) return 99;
  if (lv % 10 === 0) return 10;
  return 1;
}
function tierFor(pts) {
  let curr=TIERS[0],next=TIERS[1];
  for(let i=0;i<TIERS.length;i++) if(pts>=TIERS[i].min){curr=TIERS[i];next=TIERS[i+1];}
  if(!next) return {tier:curr.t,pctToNext:100,currentMin:curr.min,nextMin:curr.min,capped:true};
  const span=next.min-curr.min, into=pts-curr.min;
  return {tier:curr.t,pctToNext:Math.min(100,(into/span)*100),currentMin:curr.min,nextMin:next.min,capped:false};
}

// Returns last N day keys, oldest first, today last
function getLastNDayKeys(n=7) {
  const keys=[]; const base=new Date();
  for(let i=n-1;i>=0;i--){ const d=new Date(base); d.setDate(base.getDate()-i); keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`); }
  return keys;
}

function isoWeekKey(date) {
  const d=new Date(date||new Date()); d.setHours(0,0,0,0); d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const w1=new Date(d.getFullYear(),0,4);

}

// CLASS UNLOCK LOGIC  (Paso 2)
// ============================================================

// Level + minimum stat value required to access each tier
// Aligned with tier progression table:
//   NOVICE  → lv 1-19  / Rank E-D  / no stat req    — from the start
//   ADEPT   → lv 20-39 / Rank D-C-B / D stats (270) — ~mes 1
//   EXPERT  → lv 40-69 / Rank B-A  / B stats (1500) — ~mes 3
//   LEGEND  → lv 70-94 / Rank S-SS  / S stats (5000) — ~mes 14
//   HERO    → lv 95-100/ Rank SSS  / SSS stats (8750) + all Tier-4 mastered
const CLASS_TIER_REQ = {
  1: { level: 1,  statMin: 0    },   // NOVICE  — disponible desde el inicio
  2: { level: 20, statMin: 270  },   // ADEPT   — Rank D
  3: { level: 40, statMin: 1500 },   // EXPERT  — Rank B
  4: { level: 70, statMin: 5000 },   // LEGEND  — Rank S
  5: { level: 95, statMin: 8750 },   // HERO    — Rank SSS (hidden)
};

// Returns { available:bool, locked:bool, reasons:string[] }
// reasons is non-empty when locked — use to show unlock hints in UI
function getClassUnlockStatus(classId, state) {
  const cls = CLASSES[classId];
  if (!cls) return { available: false, locked: true, reasons: ['Unknown class'], met: [] };

  const req   = CLASS_TIER_REQ[cls.tier];
  const level = (state.totalXp !== undefined) ? calcLevel(state.totalXp).level : 1;
  const reasons = [];
  const met = [];

  // ── Rank check (Tier 1 requires rank E) ──────────────────
  if (req.rank) {
    if (rankIdx(getPlayerRank()) < rankIdx(req.rank)) {
      reasons.push(`Rango ${req.rank} requerido (actual: ${getPlayerRank()})`);
    } else {
      met.push(`Rango ${req.rank} ✓`);
    }
  }

  // ── Level check ──────────────────────────────────────────
  if (level < req.level) {
    reasons.push(`Nivel ${req.level} requerido (actual: ${level})`);
  } else {
    met.push(`Nivel ${req.level} ✓`);
  }

  // ── Stat check ───────────────────────────────────────────
  if (req.statMin > 0) {
    cls.stats.forEach(s => {
      const val = (state.stats && state.stats[s]) || 0;
      if (val < req.statMin) {
        reasons.push(`${STAT_NAMES[s]} ≥ ${req.statMin} (actual: ${fmtStat(val)})`);
      } else {
        met.push(`${STAT_NAMES[s]} ≥ ${req.statMin} ✓`);
      }
    });
  }

  // ── Mastery prerequisite (Tier 2 needs mastered Tier-1 with shared stat, etc.) ──
  if (cls.tier >= 2) {
    const mastered = state.classData ? state.classData.masteredClasses || {} : {};
    const hasMasteredPrereq = Object.values(CLASSES).some(c =>
      c.tier === cls.tier - 1 &&
      mastered[c.id] &&
      c.stats.some(s => cls.stats.includes(s))
    );
    const tierNames = { 1:'Novice', 2:'Adept', 3:'Expert', 4:'Legend' };
    const prevName  = tierNames[cls.tier - 1] || 'anterior';
    const statsStr  = cls.stats.map(s => STAT_NAMES[s]).join('/');
    if (!hasMasteredPrereq) {
      reasons.push(`Dominá una clase ${prevName} de ${statsStr} primero`);
    } else {
      met.push(`Clase ${prevName} de ${statsStr} ✓`);
    }
  }

  // ── TRUE HERO: only unlocks when all Tier-4 are mastered ─
  if (cls.tier === 5) {
    const mastered  = state.classData ? state.classData.masteredClasses || {} : {};
    const allTier4  = CLASSES_BY_TIER[4].every(id => mastered[id]);
    if (!allTier4) {
      reasons.push('???');
    } else {
      met.push('??? ✓');
    }
  }

  return { available: reasons.length === 0, locked: reasons.length > 0, reasons, met };
}

// Returns array of class IDs the player can currently equip
// Hidden classes (TRUE HERO) are excluded until truly unlocked
function getAvailableClasses(state) {
  return Object.keys(CLASSES).filter(id => {
    const cls = CLASSES[id];
    if (cls.hidden) {
      // Only expose TRUE HERO when fully unlocked
      const mastered = state.classData ? state.classData.masteredClasses || {} : {};
      return CLASSES_BY_TIER[4].every(cid => mastered[cid]);
    }
    return getClassUnlockStatus(id, state).available;
  });
}

// Returns all classes of a given tier with their unlock status
function getClassesByTier(tier, state) {
  return Object.values(CLASSES)
    .filter(c => c.tier === tier && !c.hidden)
    .map(c => ({ ...c, ...getClassUnlockStatus(c.id, state) }));
}

function defaultStats() { return STAT_KEYS.reduce((a,k)=>{a[k]=0;return a;},{}); }

function loadState() {
  try {
    const rawV4 = localStorage.getItem(STORAGE_KEY);
    if (rawV4) {
      const s = JSON.parse(rawV4);
      if (!s.stats) s.stats = defaultStats();
      if (!s.habitos) s.habitos = DEFAULT_HABITOS.map(h=>({...h,done:{}}));
      if (!s.weekly)  s.weekly  = DEFAULT_WEEKLY.map(w=>({...w,done:{}}));
      if (!s.trabajo) s.trabajo = [];
      if (!s.negativos) s.negativos = DEFAULT_NEGATIVOS.map(n=>({...n, done:{}, createdDate:todayKey(), lastBreakDate:null, awardedMilestones:{}, milestones:DEFAULT_NEG_MILESTONES.map(m=>({...m}))}));
      if (typeof s.totalXp !== 'number') s.totalXp = 0;
      if (typeof s.streak  !== 'number') s.streak  = 0;
      if (!s.lastActiveDay) s.lastActiveDay = todayKey();
      if (typeof s.col !== 'number') s.col = 0;
      if (!s.playerName) s.playerName = 'Tuni';
      if (!s.playerTitle) s.playerTitle = 'Beginner';
      if (!s.achievements) s.achievements = {};
      if (!s.logros) s.logros = { perfectWeekCount:0, phoenixCount:0, lastPerfectWeekDay:null, lastPhoenixDay:null, perfectDayCount:0, lastPerfectDay:null };
      if (s.logros.perfectDayCount === undefined) { s.logros.perfectDayCount = 0; s.logros.lastPerfectDay = null; }
      if (!s.inventory) s.inventory = [{itemId:'iron_sword',quantity:1},{itemId:'leather_armor',quantity:1},{itemId:'iron_helm',quantity:1},{itemId:'leather_boots',quantity:1},{itemId:'hp_pot_s',quantity:5},{itemId:'mp_pot_s',quantity:2}];
      if (!s.equipment) s.equipment = {earring_l:null,helmet:null,earring_r:null,weapon:null,armor:null,shield:null,necklace:null,bracelet:null,belt:null,boots:null};
      if (!s.hasOwnProperty('hp') || s.hp === undefined) s.hp = null;
      if (!s.hasOwnProperty('mp') || s.mp === undefined) s.mp = null;
      if (!s.hasOwnProperty('lastHpMpTick')) s.lastHpMpTick = null;
      if (!s.classData) s.classData = defaultClassState();
      if (!s.classData.equipped) s.classData.equipped = null;
      if (!s.classData.mastery) s.classData.mastery = {};
      if (!s.classData.masteredClasses) s.classData.masteredClasses = {};
      if (!s.classData.completedTiers) s.classData.completedTiers = {};
      if (typeof s.classData.tierPassiveBonus !== 'number') s.classData.tierPassiveBonus = 0;
      if (!s.classData.unlockedSkills) s.classData.unlockedSkills = [];
      if (!s.classData.history) s.classData.history = [];
      if (!s.classData.lastMasteryTick) s.classData.lastMasteryTick = null;
      if (!s.classData.notifiedUnlocks) {
        // Seed with already-available classes so existing users don't get spam on first load
        const seed = {}; getAvailableClasses(s).forEach(id => { seed[id] = true; });
        s.classData.notifiedUnlocks = seed;
      }
      if (!s.lastWeeklyReport) s.lastWeeklyReport = null;
      // Migrate old dungeon difficulty keys (easy/medium/hard/xhard → null)
      if (s.dungeon && ['easy','medium','hard','xhard'].includes(s.dungeon.difficulty)) s.dungeon = null;
      // Add missing idle fields to in-progress dungeons
      if (s.dungeon && s.dungeon.phase==='exploring' && s.dungeon.idleEnemyHP===undefined) {
        const _cfg = DUNGEON_CONFIG[s.dungeon.difficulty];
        if (_cfg) {
          s.dungeon.idleEnemyIndex = 0;
          s.dungeon.idleEnemyHP    = _cfg.enemies[0].hp;
          s.dungeon.idleEnemyMaxHP = _cfg.enemies[0].hp;
          s.dungeon.idleTotalKills = 0;
          s.dungeon.idleLastDmgTick = Date.now();
        } else { s.dungeon = null; }
      }
      // ensure done exists on all habits
      s.habitos.forEach(h=>{ if(!h.done) h.done={}; });
      s.weekly.forEach(w=>{ if(!w.done) w.done={}; });
      s.trabajo.forEach(t=>{ if(!t.done) t.done={}; });
      s.negativos.forEach(n=>{ if(!n.done) n.done={}; });
      // ── Migrate avoid habits to new streak format ──────────────
      s.negativos.forEach(n => {
        // Upgrade old neg0 ("Más de 3hs de celular") to the new avoid habit
        if (n.id === 'neg0' && (n.text === 'Más de 3hs de celular' || !n.milestones)) {
          n.text = 'NO RECAER EN ADICCIONES';
          n.hp   = 30;
          if (!n.milestones) n.milestones = DEFAULT_NEG_MILESTONES.map(m=>({...m}));
        }
        if (!n.milestones)         n.milestones         = [];
        if (!n.awardedMilestones)  n.awardedMilestones  = {};
        if (!n.createdDate)        n.createdDate        = todayKey();
        // Derive lastBreakDate from done history if not present
        if (!n.hasOwnProperty('lastBreakDate')) {
          const breaks = Object.keys(n.done||{}).sort();
          n.lastBreakDate = breaks.length ? breaks[breaks.length-1] : null;
        }
      });
      return s;
    }
    // Migrate from v3
    const rawV3 = localStorage.getItem(OLD_KEY_V3);
    if (rawV3) {
      const v3 = JSON.parse(rawV3);
      const habitos = DEFAULT_HABITOS.map((def,i)=>{
        const old = (v3.habitos||[]).find(h=>h.id===def.id)||(v3.habitos||[])[i]||{};
        return {...def, done: old.done||{}};
      });
      const weekly = DEFAULT_WEEKLY.map((def,i)=>{
        const old = (v3.weekly||[]).find(w=>w.id===def.id)||(v3.weekly||[])[i]||{};
        return {...def, done: old.done||{}};
      });
      return { habitos, weekly, trabajo: v3.trabajo||[], stats: v3.stats||defaultStats(), totalXp: v3.totalXp||0, streak: v3.streak||0, lastActiveDay: v3.lastActiveDay||todayKey(), col: v3.col||0 };
    }
  } catch(e) { console.warn('load failed',e); }
  return { habitos: DEFAULT_HABITOS.map(h=>({...h,done:{}})), weekly: DEFAULT_WEEKLY.map(w=>({...w,done:{}})), negativos: DEFAULT_NEGATIVOS.map(n=>({...n,done:{}})), trabajo: [], stats: defaultStats(), totalXp:0, streak:0, lastActiveDay:todayKey(), col:0, playerName:'Tuni', playerTitle:'Beginner', achievements:{}, logros:{perfectWeekCount:0,phoenixCount:0,lastPerfectWeekDay:null,lastPhoenixDay:null}, dungeon:null, inventory:[{itemId:'iron_sword',quantity:1},{itemId:'leather_armor',quantity:1},{itemId:'iron_helm',quantity:1},{itemId:'leather_boots',quantity:1},{itemId:'hp_pot_s',quantity:5},{itemId:'mp_pot_s',quantity:2}], equipment:{earring_l:null,helmet:null,earring_r:null,weapon:null,armor:null,shield:null,necklace:null,bracelet:null,belt:null,boots:null}, classData: defaultClassState(), lastWeeklyReport:null };
}

function getPlayerDPS() {
  const st = state.stats, eq = getEquippedStats();
  const physDmg  = 5 + st.STR * 1.8 + st.DEX * 0.8 + (eq.ATK || 0) * 0.6;
  const magicDmg = 3 + st.INT * 1.2 + st.VOL * 0.6;
  const atkInterval = Math.max(2, 4 - st.DEX * 0.02);
  return Math.max(1, Math.round((physDmg + magicDmg * 0.5) / atkInterval * 10) / 10);
}

function defeatIdleEnemy(d, cfg) {
  const old = cfg.enemies[(d.idleEnemyIndex || 0) % cfg.enemies.length];
  d.defeatedEnemies.push(old.name);
  d.idleTotalKills = (d.idleTotalKills || 0) + 1;
  d.idleEnemyIndex = (d.idleEnemyIndex || 0) + 1;
  const next = cfg.enemies[d.idleEnemyIndex % cfg.enemies.length];
  const scale = 1 + Math.floor(d.idleTotalKills / 20) * 0.15;
  d.idleEnemyMaxHP = Math.round(next.hp * scale);
  d.idleEnemyHP    = d.idleEnemyMaxHP;
}

const TIER_LABELS  = ['🥉 BRONZE','🥈 SILVER','🥇 GOLD','💎 LEGENDARY','👑 UNIQUE'];
const TIER_ICONS   = ['🥉','🥈','🥇','💎','👑'];
const STAT_COLORS  = { STR:'#ff6b6b', DEX:'#40e0ff', CON:'#81c784', INT:'#7b9dff', VOL:'#e060f5', CHA:'#ffe57f' };

// Derive class colors from stat colors (blends for multi-stat; Legend/True Hero stay hardcoded)
(function() {
  const h2r = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const r2h = (r,g,b) => '#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
  Object.values(CLASSES).forEach(cls => {
    if (cls.tier >= 4) return;
    const rgbs = cls.stats.map(s => h2r(STAT_COLORS[s]));
    const avg  = [0,1,2].map(i => rgbs.reduce((s,c)=>s+c[i],0) / rgbs.length);
    cls.color  = r2h(...avg);
  });
})();

function getAchievementCount(ach) {
  if (ach.id === 'streak_gen') return state.streak;
  if (ach.id === 'perf_week')  return state.logros.perfectWeekCount || 0;
  if (ach.id === 'phoenix')    return state.logros.phoenixCount || 0;
  if (ach.id === 'perf_day')   return state.logros.perfectDayCount || 0;
  if (ach.id === 'avoid_clean') {
    const neg = (state.negativos||[]).find(n => n.id === 'neg0');
    return neg ? getAvoidStreak(neg) : 0;
  }
  // Rank milestone (one-time: returns 1 if level >= threshold)
  if (ach.rankMinLevel !== undefined) {
    return calcLevel(state.totalXp).level >= ach.rankMinLevel ? 1 : 0;
  }
  // Class tier mastery (one-time: returns 1 if any class of that tier mastered)
  if (ach.classTierMastery !== undefined) {
    const ids = CLASSES_BY_TIER[ach.classTierMastery] || [];
    return ids.some(id => state.classData?.masteredClasses?.[id]) ? 1 : 0;
  }
  // Balance threshold (one-time: returns 1 if ALL stats >= threshold)
  if (ach.balanceThreshold !== undefined) {
    return STAT_KEYS.every(k => (state.stats[k]||0) >= ach.balanceThreshold) ? 1 : 0;
  }
  // Stat mastery (count = current stat total)
  if (ach.id.startsWith('stat_')) {
    const key = ach.id.split('_')[1];
    return state.stats[key] || 0;
  }
  // Weekly habit by id
  if (ach.weeklyId) {
    const w = (state.weekly||[]).find(x => x.id === ach.weeklyId);
    return w ? Object.keys(w.done || {}).length : 0;
  }
  // Text-based match (works with custom habits regardless of ID)
  if (ach.textMatch) {
    const p = ach.textMatch.toLowerCase();
    const h = [...state.habitos, ...state.weekly].find(x => x.text.toLowerCase().includes(p));
    return h ? Object.keys(h.done || {}).length : 0;
  }
  // Fallback: ID-based (legacy)
  const ids = ach.habitIds || (ach.habitId ? [ach.habitId] : []);
  return ids.reduce((sum, hid) => {
    const h = [...state.habitos, ...state.weekly].find(x => x.id === hid);
    return sum + (h ? Object.keys(h.done || {}).length : 0);
  }, 0);
}

function getAchievementTierIndex(ach, count) {
  let best = -1;
  ach.tiers.forEach((tier, i) => { if (count >= tier.count) best = i; });
  return best;
}

function awardAchievementTier(ach, tierIndex) {
  const tier = ach.tiers[tierIndex]; if (!tier) return;
  if (tier.reward) {
    if (ach.statAll) {
      STAT_KEYS.forEach(k => { state.stats[k] = (state.stats[k]||0) + tier.reward; });
      const xpGain = tier.reward * STAT_KEYS.length * 10;
      state.totalXp += xpGain; state.col += xpGain;
    } else if (ach.statKeys && ach.statKeys.length > 0) {
      const share = Math.max(1, Math.round(tier.reward / ach.statKeys.length));
      ach.statKeys.forEach(k => { state.stats[k] = (state.stats[k]||0) + share; });
      const xpGain = share * ach.statKeys.length * 10;
      state.totalXp += xpGain; state.col += xpGain;
    } else if (ach.stat) {
      state.stats[ach.stat] = (state.stats[ach.stat]||0) + tier.reward;
      const xpGain = tier.reward * 10;
      state.totalXp += xpGain; state.col += xpGain;
    }
  }
  setTimeout(() => {
    playStatRankUp();
    showNotif(`${TIER_ICONS[tierIndex]||'🏆'} ACHIEVEMENT: ${ach.name} · ${tier.label}`);
  }, 1600);
}

function checkAchievements() {
  const today = todayKey();
  // ─ Perfect-day check (today 100%)
  const todayInf = getHabitPct(today);
  if (todayInf && todayInf.pct === 100 && todayInf.total > 0) {
    if (state.logros.lastPerfectDay !== today) {
      state.logros.perfectDayCount = (state.logros.perfectDayCount||0) + 1;
      state.logros.lastPerfectDay  = today;
    }
  }
  // ─ Perfect-week check (last 7 days all 100%)
  const days7 = []; const dd = new Date();
  for (let i = 0; i < 7; i++) {
    days7.push(`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`);
    dd.setDate(dd.getDate()-1);
  }
  if (days7.every(dk => { const inf=getHabitPct(dk); return inf && inf.total>0 && inf.pct===100; })) {
    if (state.logros.lastPerfectWeekDay !== today) {
      state.logros.perfectWeekCount = (state.logros.perfectWeekCount||0)+1;
      state.logros.lastPerfectWeekDay = today;
    }
  }
  // ─ Phoenix check (today 100%, yesterday 0%)
  const yKey = yesterdayKey();
  const yInf = getHabitPct(yKey);
  if (todayInf && todayInf.pct===100 && todayInf.total>0 && yInf && yInf.pct===0 && yInf.total>0) {
    if (state.logros.lastPhoenixDay !== today) {
      state.logros.phoenixCount = (state.logros.phoenixCount||0)+1;
      state.logros.lastPhoenixDay = today;
    }
  }
  // ─ Check all achievement tiers
  ACHIEVEMENTS.forEach(ach => {
    const count = getAchievementCount(ach);
    const alreadyAwarded = state.achievements[ach.id] ?? -1;
    const newTier = getAchievementTierIndex(ach, count);
    if (newTier > alreadyAwarded) {
      for (let i = alreadyAwarded+1; i <= newTier; i++) awardAchievementTier(ach, i);
      state.achievements[ach.id] = newTier;
    }
  });
  // ─ Avoid milestone rewards (XP + stat gains at streak thresholds)
  checkAvoidMilestones();
}

// ─ INVENTORY helpers ────────────────────────────────────────
function getEquippedStats() {
  const totals = {STR:0,DEX:0,CON:0,INT:0,VOL:0,CHA:0,ATK:0,DEF:0,HP:0,MP:0,critBonus:0,dodgeBonus:0,blockBonus:0};
  Object.values(state.equipment||{}).forEach(id => {
    if (!id) return;
    const item = ITEMS_DB[id]; if (!item) return;
    Object.entries(item.stats||{}).forEach(([k,v]) => { if (totals[k] !== undefined) totals[k] += v; });
  });
  return totals;
}

function equipItem(bagIndex) {
  const entry = state.inventory[bagIndex]; if (!entry) return;
  const item = ITEMS_DB[entry.itemId]; if (!item || !item.slot) return;
  let slot = item.slot;
  if (slot === 'earring') {
    slot = !state.equipment.earring_l ? 'earring_l' : !state.equipment.earring_r ? 'earring_r' : 'earring_l';
  }
  if (state.equipment[slot]) {
    const old = ITEMS_DB[state.equipment[slot]];
    const ex = old?.stackable && state.inventory.find(e=>e.itemId===state.equipment[slot]);
    if (ex) ex.quantity++; else state.inventory.push({itemId:state.equipment[slot],quantity:1});
  }
  state.equipment[slot] = entry.itemId;
  if ((entry.quantity||1) > 1) entry.quantity--; else state.inventory.splice(bagIndex,1);
  invSelected = null; saveState(); renderInventory();
  showNotif(`⚔ ${item.name} equipped!`);
}

function unequipItem(slot) {
  const id = state.equipment[slot]; if (!id) return;
  const item = ITEMS_DB[id];
  if (state.inventory.length >= INV_SIZE) { showNotif('⚠ Inventory full!'); return; }
  const ex = item?.stackable && state.inventory.find(e=>e.itemId===id);
  if (ex) ex.quantity++; else state.inventory.push({itemId:id,quantity:1});
  state.equipment[slot] = null;
  invSelected = null; saveState(); renderInventory();
  showNotif(`↩ ${item?.name||id} unequipped.`);
}

function useItem(bagIndex) {
  const entry = state.inventory[bagIndex]; if (!entry) return;
  const item = ITEMS_DB[entry.itemId]; if (!item) return;
  if (item.healHP || item.healMP) {
    if (!state.dungeon?.combat) { showNotif('⚠ Potions can only be used in combat!'); return; }
    const c = state.dungeon.combat;
    if (item.healHP) { c.playerHP = Math.min(c.playerMaxHP, c.playerHP + item.healHP); c.log.push(`🧪 ${item.name}: +${item.healHP} HP`); }
    if (item.healMP) { c.playerMP = Math.min(c.playerMaxMP, c.playerMP + item.healMP); c.log.push(`💧 ${item.name}: +${item.healMP} MP`); }
    showNotif(`🧪 ${item.name} used!`);
  }
  if ((entry.quantity||1) > 1) entry.quantity--; else state.inventory.splice(bagIndex,1);
  invSelected = null; saveState(); renderAll();
}

function dropItem(bagIndex) {
  const entry = state.inventory[bagIndex]; if (!entry) return;
  const item = ITEMS_DB[entry.itemId];
  if (!confirm(`Drop ${item?.name||entry.itemId}?`)) return;
  if ((entry.quantity||1) > 1) entry.quantity--; else state.inventory.splice(bagIndex,1);
  invSelected = null; saveState(); renderInventory();
}

function grantItemDrop(dungeonId) {
  const cfg = DUNGEON_CONFIG[dungeonId]; if (!cfg) return;
  const table = (DUNGEON_DROP_TABLES[cfg.dungeonClass]||{})[cfg.rank]; if (!table) return;
  if (Math.random() >= (DUNGEON_DROP_CHANCE[cfg.rank]||0.4)) return;
  if ((state.inventory||[]).length >= INV_SIZE) return;
  const id = table[Math.floor(Math.random()*table.length)];
  const item = ITEMS_DB[id]; if (!item) return;
  if (!state.inventory) state.inventory = [];
  const ex = item.stackable && state.inventory.find(e=>e.itemId===id);
  if (ex) ex.quantity++; else state.inventory.push({itemId:id,quantity:1});
  setTimeout(()=>showNotif(`💎 Item Drop: [${item.rarity.toUpperCase()}] ${item.name}!`), 800);
}

// ============================================================
// STREAK / COMPLETION HELPERS
// ============================================================
function getHabitStreak(habit) {
  const today = todayKey(); let streak=0; const d=new Date();
  if (!habit.done||!habit.done[today]) d.setDate(d.getDate()-1);
  while(true) {
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (habit.done&&habit.done[key]) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

function getCompletion(task, key) { const d=task.done[key]; if(!d) return null; if(typeof d==='object') return d; return {gains:task.gains,xp:task.xp}; }
function applyGains(gains, mul) { Object.entries(gains||{}).forEach(([k,v])=>{ state.stats[k]=Math.max(0,(state.stats[k]||0)+v*mul); }); }

// ── Class passive & multiplier helpers (Paso 3) ──────────────

// Flat bonus added to a stat by: equipped class passive % + tier completion bonuses
function getClassPassiveBonus(statKey, st) {
  const base = (st.stats && st.stats[statKey]) || 0;
  if (!base) return 0;
  let pct = (st.classData && st.classData.tierPassiveBonus) || 0;
  const eqId = st.classData && st.classData.equipped;
  if (eqId) {
    const cls = CLASSES[eqId];
    if (cls && cls.stats.includes(statKey)) pct += cls.passive;
  }
  return Math.floor(base * pct);
}

// Effective stat value (used for display, HP/MP, dungeon calcs)
function getEffectiveStat(statKey, st) {
  return ((st.stats && st.stats[statKey]) || 0) + getClassPassiveBonus(statKey, st);
}

// Format a stat number: integer if whole, 1 decimal if fractional
function fmtStat(n) {
  if (typeof n !== 'number' || isNaN(n)) return String(n);
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

// Notification string for gains — highlights boosted stats with ↑ when class multiplier applied
function _gainsStr(applied, original) {
  return Object.entries(applied).map(([k,v]) => {
    const orig = (original||{})[k] || v;
    return v > orig ? `${k}+${fmtStat(v)}↑` : `${k}+${fmtStat(v)}`;
  }).join(' ');
}

// Apply gains with equipped class multiplier on matching stats.
// Returns the actually-applied gains object (stored in task.done for correct undo).
function applyGainsWithClass(gains) {
  const eqId = state.classData && state.classData.equipped;
  const cls   = eqId ? CLASSES[eqId] : null;
  const applied = {};
  Object.entries(gains || {}).forEach(([k, v]) => {
    const amt = (cls && cls.stats.includes(k))
      ? parseFloat((v * (1 + cls.multiplier)).toFixed(1))
      : v;
    applied[k] = amt;
    state.stats[k] = parseFloat((Math.max(0, (state.stats[k] || 0) + amt)).toFixed(1));
  });
  return applied;
}

// Returns display-only preview of gains with class bonus breakdown.
// Does NOT modify state. Used to preview chips on pending habits.
// Returns { stat: { base, bonus, total, isBoosted, clsColor } }
function previewGainsWithClass(gains) {
  const eqId = state.classData && state.classData.equipped;
  const cls  = eqId ? CLASSES[eqId] : null;
  const result = {};
  Object.entries(gains || {}).forEach(([k, v]) => {
    if (cls && cls.stats.includes(k) && cls.multiplier > 0) {
      const bonus = parseFloat((v * cls.multiplier).toFixed(1));
      const total = parseFloat((v + bonus).toFixed(1));
      result[k] = { base: v, bonus, total, isBoosted: true, clsColor: cls.color || '#ffd700' };
    } else {
      result[k] = { base: v, bonus: 0, total: v, isBoosted: false };
    }
  });
  return result;
}

function calcLevel(totalXp) {
  let level = 1;
  while (level < MAX_LEVEL && totalXp >= (LEVEL_XP_TABLE[level+1]||Infinity)) level++;
  return { level, currentLevelXp: totalXp - (LEVEL_XP_TABLE[level]||0), neededForNext: xpForLevel(level) };
}
function calcHpPct() { const t=state.habitos.length; if(!t) return 100; const done=state.habitos.filter(h=>h.done[todayKey()]).length; return Math.round(60+(done/t)*40); }
function calcMpPct() { const week=isoWeekKey(); const t=state.weekly.length; if(!t) return 100; const done=state.weekly.filter(w=>w.done[week]).length; return Math.round((done/t)*100); }

function calcMaxHP() {
  const lv=calcLevel(state.totalXp), eq=getEquippedStats();
  return 100 + (getEffectiveStat('CON',state)+(eq.CON||0))*3 + (getEffectiveStat('CHA',state)+(eq.CHA||0))*2 + lv.level*10 + (eq.HP||0);
}
function calcMaxMP() {
  const lv=calcLevel(state.totalXp), eq=getEquippedStats();
  return 50 + (getEffectiveStat('INT',state)+(eq.INT||0))*2 + (getEffectiveStat('VOL',state)+(eq.VOL||0))*2 + (getEffectiveStat('CHA',state)+(eq.CHA||0)) + lv.level*3 + (eq.MP||0);
}

// HP regen: 4% of maxHP per hour (full recovery ~25h passively)
// MP regen: 15% of maxMP per hour (full recovery ~7h passively)
function tickHpMp() {
  const maxHP=calcMaxHP(), maxMP=calcMaxMP();
  if (state.hp===null||state.hp===undefined) state.hp=maxHP;
  if (state.mp===null||state.mp===undefined) state.mp=maxMP;
  state.hp=Math.min(maxHP, Math.max(0, state.hp));
  state.mp=Math.min(maxMP, Math.max(0, state.mp));
  const now=Date.now();
  if (state.lastHpMpTick) {
    const mins=(now-state.lastHpMpTick)/60000;
    state.hp=Math.min(maxHP, state.hp + maxHP*0.000667*mins);  // 4%/hr
    state.mp=Math.min(maxMP, state.mp + maxMP*0.0025*mins);    // 15%/hr
  }
  state.lastHpMpTick=now;
}

// Returns {hp, mp} gained so caller can include in notification
function gainHpMpFromHabit(gains) {
  const g=gains||{};
  const hpBonus=((g.STR||0)+(g.DEX||0)+(g.CON||0))*3;
  const mpBonus=((g.INT||0)+(g.VOL||0)+(g.CHA||0))*5;
  if (!hpBonus && !mpBonus) return {hp:0,mp:0};
  const maxHP=calcMaxHP(), maxMP=calcMaxMP();
  if (hpBonus) state.hp=Math.min(maxHP,(state.hp||0)+hpBonus);
  if (mpBonus) state.mp=Math.min(maxMP,(state.mp||0)+mpBonus);
  return {hp:hpBonus, mp:mpBonus};
}

function updateStreakOnLoad() {
  const today=todayKey();
  if (state.lastActiveDay!==today) {
    const y=yesterdayKey();
    const yDone=state.habitos.filter(h=>h.done[y]).length;
    const yPct=state.habitos.length ? yDone/state.habitos.length : 0;
    if (state.lastActiveDay===y && yPct>=0.7) state.streak+=1;
    else if (state.lastActiveDay!==y) state.streak=0;
    // Queue harvest overlay — shown after renderAll()
    const harvestInfo = _buildHarvestInfo(y);
    if (harvestInfo.done > 0) _pendingAnims.push(() => showHarvestOverlay(harvestInfo));
    // Auto weekly report on Mondays (queued after harvest so it shows on dismiss)
    if (new Date().getDay() === 1 && state.lastWeeklyReport !== today) {
      state.lastWeeklyReport = today;
      _pendingAnims.push(() => showWeeklyReport());
    }
    state.lastActiveDay=today; saveState();
  }
}

// ============================================================
// MASTERY SYSTEM  (Pasos 7 + 8 + 9 + 10)
// ============================================================

// Animations queued during load (before first render) — shown after renderAll()
const _pendingAnims = [];

function _buildHarvestInfo(dateKey) {
  const gains = {}; STAT_KEYS.forEach(k => gains[k] = 0);
  let xp = 0, done = 0;
  state.habitos.forEach(h => {
    const c = getCompletion(h, dateKey);
    if (c) { done++; xp += c.xp || 0; STAT_KEYS.forEach(k => { gains[k] += (c.gains||{})[k]||0; }); }
  });
  return { gains, xp, done, total: state.habitos.length, dateKey };
}

function showHarvestOverlay(info) {
  if (soundEnabled) playDailyComplete();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const [y,m,d] = info.dateKey.split('-');
  const dateStr = `${months[parseInt(m)-1]} ${d}, ${y}`;
  const gainRows = STAT_KEYS
    .filter(k => info.gains[k] > 0)
    .map(k => `<div class="harvest-stat-row"><span class="harvest-stat-key">${k}</span><span class="harvest-stat-val">+${info.gains[k]}</span></div>`)
    .join('');
  const ov = document.createElement('div');
  ov.className = 'harvest-overlay';
  ov.innerHTML = `
    <div class="harvest-badge">⟦ HARVEST OF YESTERDAY ⟧</div>
    <div class="harvest-date">${dateStr}</div>
    <div class="harvest-quests">${info.done} / ${info.total} QUESTS COMPLETED</div>
    ${info.xp > 0 ? `<div class="harvest-xp">+${info.xp} EXP GAINED</div>` : ''}
    ${gainRows ? `<div class="harvest-gains">${gainRows}</div>` : '<div class="harvest-no-gains">No stat gains recorded</div>'}
    <button class="harvest-dismiss-btn" onclick="const ov=this.closest('.harvest-overlay');ov.style.animation='masteryFadeOut 0.4s ease forwards';setTimeout(()=>{ov.remove();const next=_pendingAnims.shift();if(next)next();},400)">⟦ CONTINUE ⟧</button>
  `;
  document.body.appendChild(ov);
  setTimeout(() => {
    if (ov.isConnected) {
      ov.style.animation = 'masteryFadeOut 0.4s ease forwards';
      setTimeout(() => ov.remove(), 400);
    }
  }, 12000);
}

function tickMasteryOnLoad() {
  const today = todayKey();
  if (state.classData.lastMasteryTick === today) return; // already ticked today
  state.classData.lastMasteryTick = today;

  const classId = state.classData.equipped;
  if (!classId) { saveState(); return; }

  const cls = CLASSES[classId];
  if (!cls || state.classData.masteredClasses[classId]) { saveState(); return; }

  state.classData.mastery[classId] = (state.classData.mastery[classId] || 0) + 1;

  if (state.classData.mastery[classId] >= cls.masteryDays) {
    applyMasteryReward(classId);
  }
  saveState();
}

function applyMasteryReward(classId) {
  if (state.classData.masteredClasses[classId]) return;
  const cls    = CLASSES[classId];
  const reward = CLASS_MASTERY_REWARD[cls.tier];
  cls.stats.forEach(s => { state.stats[s] = (state.stats[s] || 0) + reward; });
  state.classData.masteredClasses[classId] = true;

  _pendingAnims.push(() => showMasteryOverlay(classId, reward));

  checkTierComplete(cls.tier);
}

function checkTierComplete(tier) {
  if (state.classData.completedTiers[tier]) return;
  const allMastered = CLASSES_BY_TIER[tier].every(id => state.classData.masteredClasses[id]);
  if (!allMastered) return;

  const reward = TIER_COMPLETE_REWARD[tier];
  state.classData.tierPassiveBonus = +(state.classData.tierPassiveBonus + reward.passiveAll).toFixed(4);
  state.classData.completedTiers[tier] = true;
  if (!state.classData.unlockedSkills.includes(reward.skill))
    state.classData.unlockedSkills.push(reward.skill);

  if (tier === 4) {
    _pendingAnims.push(() => showTierCompleteOverlay(tier));
    // Queue TRUE HERO reveal after the tier-complete overlay
    _pendingAnims.push(() => setTimeout(() => showTrueHeroReveal(), 200));
  } else {
    _pendingAnims.push(() => showTierCompleteOverlay(tier));
  }
}

const AVATAR_KEY = 'sao_habit_tracker_avatar';

function applyAvatar(dataUrl) {
  const frame = document.getElementById('avatarFrame');
  const letter = document.getElementById('avatarLetter');
  if (dataUrl) {
    letter.style.display = 'none';
    let img = frame.querySelector('img');
    if (!img) { img = document.createElement('img'); frame.appendChild(img); }
    img.src = dataUrl;
  } else {
    letter.style.display = '';
    const img = frame.querySelector('img');
    if (img) img.remove();
  }
}

function initAvatar() {
  const saved = localStorage.getItem(AVATAR_KEY);
  if (saved) applyAvatar(saved);

  document.getElementById('avatarInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataUrl = ev.target.result;
      localStorage.setItem(AVATAR_KEY, dataUrl);
      applyAvatar(dataUrl);
    };
    reader.readAsDataURL(file);
    this.value = '';
  });
}

  // Streak badge
  if (opts.listKey!=='trabajo') {

    if(task.tiers&&!done){ openTierFor=(openTierFor===task.id)?null:task.id; renderAll(); }

    else { toggleQuest(opts.listKey, opts.periodKey, task.id); }

  if (task.tiers&&!done&&openTierFor===task.id) {

    const prompt=document.createElement('div'); prompt.className='tier-prompt'; prompt.textContent='⟦ SELECT INTENSITY ⟧'; sel.appendChild(prompt);

    });
    sel.appendChild(grid); wrap.appendChild(sel);
  }

  return wrap;
}

function makeSortable(listEl, listKey) {
  let dragId = null;
  listEl.querySelectorAll('.drag-handle').forEach(handle => {
    const quest = handle.closest('[data-task-id]');
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      dragId = quest.dataset.taskId;
      quest.classList.add('dragging');
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', e => {
      if (!dragId || dragId !== quest.dataset.taskId) return;
      const wraps = Array.from(listEl.querySelectorAll('[data-wrap-id]'));
      const targetWrap = wraps.find(w => { const r=w.getBoundingClientRect(); return e.clientY>=r.top && e.clientY<=r.bottom; });
      listEl.querySelectorAll('.quest').forEach(q => q.classList.remove('drag-over-top','drag-over-bottom'));
      if (targetWrap && targetWrap.dataset.wrapId !== dragId) {
        const tq = targetWrap.querySelector('.quest');
        if (tq) { const r=targetWrap.getBoundingClientRect(); tq.classList.add(e.clientY < r.top+r.height/2 ? 'drag-over-top' : 'drag-over-bottom'); }
      }
    });
    const finishDrag = e => {
      if (!dragId || dragId !== quest.dataset.taskId) return;
      const wraps = Array.from(listEl.querySelectorAll('[data-wrap-id]'));
      const targetWrap = wraps.find(w => { const r=w.getBoundingClientRect(); return e.clientY>=r.top && e.clientY<=r.bottom; });
      listEl.querySelectorAll('.quest').forEach(q => q.classList.remove('dragging','drag-over-top','drag-over-bottom'));
      if (targetWrap && targetWrap.dataset.wrapId !== dragId) {
        const tgtId = targetWrap.dataset.wrapId;
        const r = targetWrap.getBoundingClientRect();
        const before = e.clientY < r.top + r.height/2;
        const arr = state[listKey];
        const srcIdx = arr.findIndex(t => t.id === dragId);
        const [moved] = arr.splice(srcIdx, 1);
        const tgtIdx = arr.findIndex(t => t.id === tgtId);
        arr.splice(before ? tgtIdx : tgtIdx+1, 0, moved);
        saveState(); renderAll();
      }
      dragId = null;
    };
    handle.addEventListener('pointerup', finishDrag);
    handle.addEventListener('pointercancel', finishDrag);
  });
}

function renderNegativeItem(task, periodKey) {
  const failed   = task.lastBreakDate === periodKey;
  const streak   = getAvoidStreak(task);
  const milestones = task.milestones || [];
  const awarded    = task.awardedMilestones || {};

  // Next milestone to hit
  const nextMs = milestones.find(ms => !awarded[ms.days]) || null;
  const prevMs = milestones.slice().reverse().find(ms => awarded[ms.days]) || null;

  // Progress bar: between last awarded and next milestone
  let barPct = 0;
  if (nextMs) {
    const from = prevMs ? prevMs.days : 0;
    barPct = Math.min(100, Math.round(((streak - from) / (nextMs.days - from)) * 100));
  } else {
    barPct = 100; // all milestones awarded

  // Streak milestone glow (every 7 days)
  const isMilestone = streak > 0 && streak % 7 === 0;

  const wrap = document.createElement('div'); wrap.dataset.wrapId = task.id;

  const el = document.createElement('div');
