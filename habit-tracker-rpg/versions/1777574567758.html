<html lang="es">
<head>
<meta charset="UTF-8">
<title>SAO MENU // Daily Quests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --sao-cyan: #4dd0e1;
    --sao-cyan-bright: #80deea;
    --sao-cyan-deep: #00b8d4;
    --sao-gold: #ffc107;
    --sao-gold-soft: #ffd54f;
    --sao-bg-deep: #061a2b;
    --sao-bg-mid: #0d2942;
    --sao-bg-soft: #163a55;
    --sao-text: #e0f7fa;
    --sao-text-dim: #7ba7c0;
    --sao-green: #76ff03;
    --sao-green-bar: #64dd17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, #1a4566 0%, #0a2440 40%, #04111d 100%);
    color: var(--sao-text);
    min-height: 100vh;
    padding: 18px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.4), transparent),
      radial-gradient(1px 1px at 80% 60%, rgba(128, 222, 234, 0.5), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255, 215, 100, 0.3), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255, 255, 255, 0.3), transparent),
      radial-gradient(1.5px 1.5px at 10% 70%, rgba(128, 222, 234, 0.4), transparent);
    background-size: 600px 600px;
    pointer-events: none;
    z-index: 0;
    animation: drift 60s linear infinite;
  }

  @keyframes drift {
    0% { background-position: 0 0; }
    100% { background-position: 600px 600px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(77, 208, 225, 0.06), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255, 193, 7, 0.04), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; }

  /* === STATUS PANEL === */
  .status-panel {
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.85), rgba(6, 26, 43, 0.92));
    border: 1px solid var(--sao-cyan);
    border-radius: 6px;
    margin-bottom: 14px;
    box-shadow:
      0 0 0 1px rgba(77, 208, 225, 0.2),
      0 0 24px rgba(77, 208, 225, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .status-top-bar {
    background: linear-gradient(90deg, rgba(77, 208, 225, 0.25) 0%, rgba(77, 208, 225, 0.05) 50%, rgba(77, 208, 225, 0.25) 100%);
    border-bottom: 1px solid rgba(77, 208, 225, 0.5);
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 8px var(--sao-cyan);
  }

  .blink-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--sao-green);
    box-shadow: 0 0 8px var(--sao-green);
    margin-right: 6px; vertical-align: middle;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Sound toggle */
  .sound-toggle {
    background: transparent;
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-cyan-bright);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 7px;
    border-radius: 3px;
    transition: all 0.2s;
    line-height: 1;
    letter-spacing: 0;
  }
  .sound-toggle:hover {
    background: rgba(77, 208, 225, 0.15);
    border-color: var(--sao-cyan);
    box-shadow: 0 0 8px rgba(77, 208, 225, 0.4);
  }
  .sound-toggle.muted { opacity: 0.45; }

  .status-body { padding: 14px 18px 16px; }

  .player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

  .avatar-frame {
    width: 44px; height: 44px;
    border: 2px solid var(--sao-cyan);
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(77, 208, 225, 0.25), rgba(255, 193, 7, 0.15));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700;
    color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold);
    box-shadow: 0 0 0 2px rgba(6, 26, 43, 1), 0 0 0 3px rgba(77, 208, 225, 0.5), 0 0 14px rgba(77, 208, 225, 0.4);
    flex-shrink: 0;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700;
    color: #fff; letter-spacing: 1px;
    text-shadow: 0 0 8px var(--sao-cyan), 0 0 2px #fff; line-height: 1.1;
  }
  .player-tag {
    font-size: 11px; color: var(--sao-gold-soft);
    letter-spacing: 3px; margin-top: 2px; text-transform: uppercase;
  }

  .lvl-pill {
    background: linear-gradient(135deg, rgba(255, 193, 7, 0.2), rgba(255, 193, 7, 0.05));
    border: 1px solid var(--sao-gold);
    color: var(--sao-gold-soft);
    padding: 4px 12px;
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px var(--sao-gold);
    border-radius: 3px; flex-shrink: 0;
  }

  .bars-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .bar-block { display: flex; flex-direction: column; gap: 3px; }
  .bar-label {
    display: flex; justify-content: space-between;
    font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 2px; color: var(--sao-text-dim);
  }
  .bar-name { color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan); }
  .bar-track {
    height: 7px;
    background: rgba(0, 10, 20, 0.85);
    border: 1px solid rgba(77, 208, 225, 0.4);
    border-radius: 2px; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
  .bar-fill.hp { background: linear-gradient(180deg, #b9f6ca, var(--sao-green-bar) 50%, #33691e); box-shadow: 0 0 6px var(--sao-green); }
  .bar-fill.exp { background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep)); box-shadow: 0 0 6px var(--sao-cyan); }
  .bar-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 40%); }

  .micro-stats {
    display: flex; gap: 14px; margin-top: 12px;
    padding-top: 10px; border-top: 1px solid rgba(77, 208, 225, 0.18);
  }
  .micro { flex: 1; text-align: center; }
  .micro-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-text-dim); margin-bottom: 2px; }
  .micro-value { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--sao-cyan-bright); text-shadow: 0 0 8px var(--sao-cyan); }
  .micro-value.gold { color: var(--sao-gold-soft); text-shadow: 0 0 8px var(--sao-gold); }

  /* === TABS === */
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid rgba(77, 208, 225, 0.4); }
  .tab {
    flex: 1;
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.4), rgba(6, 26, 43, 0.7));
    border: 1px solid rgba(77, 208, 225, 0.25); border-bottom: none;
    color: var(--sao-text-dim);
    padding: 11px 14px;
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.25s; text-align: center; border-radius: 6px 6px 0 0;
  }
  .tab + .tab { margin-left: 3px; }
  .tab:hover:not(.active) {
    color: var(--sao-cyan-bright);
    border-color: rgba(77, 208, 225, 0.5);
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.6), rgba(6, 26, 43, 0.85));
  }
  .tab.active {
    color: #fff;
    background: linear-gradient(180deg, rgba(77, 208, 225, 0.25), rgba(13, 41, 66, 0.95));
    border-color: var(--sao-cyan);
    text-shadow: 0 0 10px var(--sao-cyan), 0 0 2px #fff;
    box-shadow: 0 -2px 16px rgba(77, 208, 225, 0.35), inset 0 -2px 0 var(--sao-gold);
  }

  /* === MAIN PANEL === */
  .panel {
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.92), rgba(6, 26, 43, 0.95));
    border: 1px solid var(--sao-cyan); border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 18px 22px 22px;
    box-shadow: 0 0 0 1px rgba(77, 208, 225, 0.2), 0 6px 30px rgba(77, 208, 225, 0.18);
    min-height: 380px;
  }

  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 12px; margin-bottom: 16px;
    border-bottom: 1px solid rgba(77, 208, 225, 0.3); position: relative;
  }
  .panel-header::after {
    content: ''; position: absolute;
    bottom: -1px; left: 0; width: 60px; height: 1px;
    background: var(--sao-gold); box-shadow: 0 0 6px var(--sao-gold);
  }
  .panel-title {
    font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
    color: #fff; letter-spacing: 4px;
    text-shadow: 0 0 8px var(--sao-cyan);
  }
  .panel-subtitle {
    font-size: 12px; color: var(--sao-text-dim);
    letter-spacing: 2px; font-family: 'Cinzel', serif;
  }

  /* Section header (Daily/Weekly) */
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0 10px;
  }
  .section-header.weekly { margin-top: 22px; }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 4px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 6px var(--sao-cyan);
    white-space: nowrap;
  }
  .section-label.gold {
    color: var(--sao-gold-soft);
    text-shadow: 0 0 6px var(--sao-gold);
  }

  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(77, 208, 225, 0.5), rgba(77, 208, 225, 0.05));
  }
  .section-line.gold {
    background: linear-gradient(90deg, rgba(255, 193, 7, 0.5), rgba(255, 193, 7, 0.05));
  }

  .section-meta {
    font-family: 'Cinzel', serif;
    font-size: 10px; color: var(--sao-text-dim);
    letter-spacing: 1px;
  }

  /* === QUEST LIST === */
  .quest-list { display: flex; flex-direction: column; gap: 8px; }

  .quest {
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(90deg, rgba(22, 58, 85, 0.5), rgba(13, 41, 66, 0.3));
    border: 1px solid rgba(77, 208, 225, 0.25);
    padding: 10px 14px;
    cursor: pointer; transition: all 0.2s;
    position: relative; border-radius: 4px;
  }
  .quest::before {
    content: ''; position: absolute; left: 0; top: 50%;
    transform: translateY(-50%); width: 3px; height: 60%;
    background: var(--sao-cyan); box-shadow: 0 0 8px var(--sao-cyan);
    border-radius: 2px;
  }
  .quest.weekly::before { background: var(--sao-gold); box-shadow: 0 0 8px var(--sao-gold); }

  .quest:hover {
    background: linear-gradient(90deg, rgba(30, 80, 110, 0.7), rgba(22, 58, 85, 0.4));
    border-color: var(--sao-cyan);
    transform: translateX(3px);
    box-shadow: 0 0 16px rgba(77, 208, 225, 0.25);
  }
  .quest.weekly:hover {
    border-color: var(--sao-gold);
    box-shadow: 0 0 16px rgba(255, 193, 7, 0.25);
  }
  .quest.completed {
    opacity: 0.55;
    background: linear-gradient(90deg, rgba(118, 255, 3, 0.08), rgba(13, 41, 66, 0.3));
  }
  .quest.completed::before { background: var(--sao-green); box-shadow: 0 0 8px var(--sao-green); }
  .quest.completed .quest-text { text-decoration: line-through; color: var(--sao-text-dim); }

  .check-ring {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--sao-cyan);
    background: rgba(0, 10, 20, 0.8);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.25s; position: relative;
  }
  .quest.weekly .check-ring { border-color: var(--sao-gold); }
  .quest:hover .check-ring { border-color: var(--sao-cyan-bright); box-shadow: 0 0 10px var(--sao-cyan); }
  .quest.weekly:hover .check-ring { border-color: var(--sao-gold-soft); box-shadow: 0 0 10px var(--sao-gold); }
  .quest.completed .check-ring {
    border-color: var(--sao-green);
    background: rgba(118, 255, 3, 0.15);
    box-shadow: 0 0 12px var(--sao-green);
  }
  .quest.completed .check-ring::after {
    content: '✓'; color: var(--sao-green);
    font-size: 14px; font-weight: 900;
    text-shadow: 0 0 6px var(--sao-green);
  }

  .quest-text {
    flex: 1; font-size: 15px; color: var(--sao-text);
    letter-spacing: 0.3px; line-height: 1.3;
  }

  .tier-badge {
    display: inline-block;
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 1px;
    color: var(--sao-gold-soft);
    border: 1px solid rgba(255, 193, 7, 0.5);
    padding: 1px 5px; margin-left: 6px;
    border-radius: 2px;
    vertical-align: middle;
  }

  .scalable-mark {
    font-size: 10px; color: var(--sao-gold);
    letter-spacing: 1px; margin-left: 4px;
    opacity: 0.7;
  }

  /* Stat gain chips */
  .gains {
    display: flex; gap: 4px;
    flex-shrink: 0; flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 220px;
  }
  .gain-chip {
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 2px;
    border: 1px solid; font-weight: 600; white-space: nowrap;
  }
  .gain-STR { color: #ff8a80; border-color: rgba(255,138,128,0.5); background: rgba(255,138,128,0.1); }
  .gain-DEX { color: #b9f6ca; border-color: rgba(185,246,202,0.5); background: rgba(185,246,202,0.1); }
  .gain-CON { color: #ffd180; border-color: rgba(255,209,128,0.5); background: rgba(255,209,128,0.1); }
  .gain-INT { color: #82b1ff; border-color: rgba(130,177,255,0.5); background: rgba(130,177,255,0.1); }
  .gain-VOL { color: #ce93d8; border-color: rgba(206,147,216,0.5); background: rgba(206,147,216,0.1); }
  .gain-CHA { color: #ffe082; border-color: rgba(255,224,130,0.5); background: rgba(255,224,130,0.1); }

  .delete-btn {
    background: transparent;
    border: 1px solid rgba(255, 100, 100, 0.4);
    color: #ff6464;
    width: 22px; height: 22px;
    cursor: pointer; font-size: 11px;
    flex-shrink: 0; opacity: 0;
    transition: opacity 0.2s;
    border-radius: 3px;
  }
  .quest:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255, 80, 80, 0.18); }

  /* Tier selector */
  .tier-selector {
    background: linear-gradient(180deg, rgba(255, 193, 7, 0.06), rgba(13, 41, 66, 0.5));
    border: 1px solid rgba(255, 193, 7, 0.4);
    border-left: 3px solid var(--sao-gold);
    margin-top: -2px;
    padding: 12px 14px;
    border-radius: 0 4px 4px 4px;
    display: none;
    animation: slideDown 0.25s ease-out;
  }
  .tier-selector.show { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tier-prompt {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 2px;
    color: var(--sao-gold-soft);
    text-shadow: 0 0 4px var(--sao-gold);
    margin-bottom: 10px;
  }

  .tier-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  @media (min-width: 600px) {
    .tier-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .tier-btn {
    background: rgba(13, 41, 66, 0.7);
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-text);
    padding: 8px 6px;
    cursor: pointer; border-radius: 3px;
    display: flex; flex-direction: column;
    gap: 3px; align-items: center;
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }
  .tier-btn:hover {
    background: rgba(77, 208, 225, 0.18);
    border-color: var(--sao-cyan);
    box-shadow: 0 0 12px rgba(77, 208, 225, 0.4);
    transform: translateY(-2px);
  }
  .tier-btn.elite { border-color: rgba(255, 193, 7, 0.6); }
  .tier-btn.elite:hover {
    background: rgba(255, 193, 7, 0.15);
    border-color: var(--sao-gold);
    box-shadow: 0 0 14px rgba(255, 193, 7, 0.5);
  }

  .tier-time {
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 1px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 4px var(--sao-cyan);
  }
  .tier-btn.elite .tier-time {
    color: var(--sao-gold-soft);
    text-shadow: 0 0 4px var(--sao-gold);
  }
  .tier-gains-line {
    font-size: 10px; color: var(--sao-text-dim);
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 30px 20px; color: var(--sao-text-dim); }
  .empty-icon { font-size: 38px; margin-bottom: 6px; opacity: 0.6; color: var(--sao-cyan); }
  .empty-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; margin-bottom: 4px; color: var(--sao-cyan-bright); }
  .empty-sub { font-size: 13px; color: var(--sao-text-dim); }

  /* Add task form */
  .add-task-form {
    display: flex; gap: 8px;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }
  .add-task-input {
    flex: 1;
    background: rgba(0, 10, 20, 0.8);
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-text);
    padding: 9px 12px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    outline: none; border-radius: 3px;
    transition: all 0.25s;
  }
  .add-task-input:focus { border-color: var(--sao-cyan); box-shadow: 0 0 12px rgba(77, 208, 225, 0.3); }
  .add-task-input::placeholder { color: rgba(123, 167, 192, 0.6); }

  .add-btn {
    background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep));
    border: 1px solid var(--sao-gold);
    color: #042430;
    padding: 9px 16px;
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer; border-radius: 3px;
    transition: all 0.25s;
  }
  .add-btn:hover {
    box-shadow: 0 0 16px rgba(77, 208, 225, 0.6), 0 0 4px var(--sao-gold);
    transform: translateY(-1px);
  }

  /* Footer */
  .footer-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }
  .progress-text {
    font-family: 'Cinzel', serif; font-size: 10px;
    color: var(--sao-text-dim); letter-spacing: 2px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255, 193, 7, 0.5);
    color: var(--sao-gold-soft);
    padding: 5px 12px;
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 2px; cursor: pointer;
    border-radius: 3px; transition: all 0.25s;
  }
  .reset-btn:hover { background: rgba(255, 193, 7, 0.12); box-shadow: 0 0 10px rgba(255, 193, 7, 0.3); }

  /* PERSONAJE */
  .character-grid {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) 1fr;

<script>
  const STORAGE_KEY = 'sao_habit_tracker_v3';

  // ============================================================
  // SOUND ENGINE — Web Audio API (sin librerías externas)
  // ============================================================
  const _ACtx = window.AudioContext || window.webkitAudioContext;
  let _actx = null;
  let soundEnabled = true;

  function _getCtx() {
    if (!_actx) _actx = new _ACtx();
    if (_actx.state === 'suspended') _actx.resume();
    return _actx;
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('soundToggle');
    if (btn) {
      btn.textContent = soundEnabled ? '🔊' : '🔇';
      btn.classList.toggle('muted', !soundEnabled);
    }
  }

  // 1. LEVEL UP — Fanfare clásico anime JRPG (arpeggio ascendente estilo FF/DQ)
  function playLevelUp() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;

      // Compresor maestro para evitar clipping
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -8;
      comp.knee.value = 4;
      comp.ratio.value = 5;
      comp.attack.value = 0.001;
      comp.release.value = 0.12;
      comp.connect(ctx.destination);

      // Melodía ascendente: C4 E4 G4 C5 E5 G5 C6 — estilo 16-bit
      const melody = [
        [261.63, 0.00, 0.14],
        [329.63, 0.12, 0.14],
        [392.00, 0.24, 0.14],
        [523.25, 0.36, 0.17],
        [659.25, 0.47, 0.17],
        [783.99, 0.58, 0.18],
        [1046.50, 0.68, 0.70],
      ];

      melody.forEach(([freq, start, dur]) => {
        // Onda cuadrada — sonido 16-bit clásico
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t + start);
        g.gain.linearRampToValueAtTime(0.17, t + start + 0.008);
        g.gain.setValueAtTime(0.17, t + start + dur * 0.55);
        g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
        osc.connect(g); g.connect(comp);
        osc.start(t + start); osc.stop(t + start + dur + 0.05);

        // Armónico sine para calidez
        const osc2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, t + start);
        g2.gain.linearRampToValueAtTime(0.055, t + start + 0.008);
        g2.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
        osc2.connect(g2); g2.connect(comp);
        osc2.start(t + start); osc2.stop(t + start + dur + 0.05);
      });

      // Acorde final triunfal (C5-E5-G5)
      [1046.50, 1318.51, 1567.98].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t + 0.68);
        g.gain.linearRampToValueAtTime(0.09 - i * 0.02, t + 0.70);
        g.gain.exponentialRampToValueAtTime(0.001, t + 1.40);
        osc.connect(g); g.connect(comp);
        osc.start(t + 0.68); osc.stop(t + 1.45);
      });

      // Golpe de percusión al inicio
      (() => {
        const len = Math.floor(ctx.sampleRate * 0.10);
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 160;
        const g = ctx.createGain(); g.gain.value = 0.5;
        src.connect(filt); filt.connect(g); g.connect(comp);
        src.start(t); src.stop(t + 0.12);
      })();

      // Sparkle al clímax — brillo mágico ascendente
      [1047, 1319, 1568, 2093, 2637].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const st = t + 0.70 + i * 0.045;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.065, st + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, st + 0.38);
        osc.connect(g); g.connect(comp);
        osc.start(st); osc.stop(st + 0.42);
      });

    } catch(e) { console.warn('Audio levelUp error:', e); }
  }

  // 2. SWORD SLASH — Espada rápida: whoosh + impacto metálico
  function playSwordSlash() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;

      // Ruido blanco: whoosh de hoja barriendo hacia abajo en frecuencia
      const len = Math.floor(ctx.sampleRate * 0.22);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const env = Math.pow(1 - i / len, 1.3);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.setValueAtTime(5500, t);
      filt.frequency.exponentialRampToValueAtTime(700, t + 0.17);
      filt.Q.value = 1.4;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.60, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
      noise.connect(filt); filt.connect(ng); ng.connect(ctx.destination);
      noise.start(t); noise.stop(t + 0.24);

      // Impacto metálico: dos parciales que decaen rápido
      [1150, 1750].forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.52, t + 0.20);
        g.gain.setValueAtTime(0.24, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.26);
      });

    } catch(e) { console.warn('Audio slash error:', e); }
  }

  // 3. ALL COMPLETE — Doble golpe épico + campana de victoria resonante
  function playAllComplete() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;

      // Función de golpe pesado de espada
      function heavyStrike(startT, basePitch, vol) {
        const len = Math.floor(ctx.sampleRate * 0.35);
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) {
          const env = Math.pow(1 - i / len, 1.1);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.setValueAtTime(basePitch * 3.2, startT);
        filt.frequency.exponentialRampToValueAtTime(basePitch * 0.45, startT + 0.28);
        filt.Q.value = 0.85;
        const g = ctx.createGain();
        g.gain.setValueAtTime(vol, startT);
        g.gain.exponentialRampToValueAtTime(0.001, startT + 0.36);
        src.connect(filt); filt.connect(g); g.connect(ctx.destination);
        src.start(startT); src.stop(startT + 0.40);

        // Parciales metálicos del impacto
        [720, 1100, 1950].forEach(f => {
          const osc = ctx.createOscillator();
          const og = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(f, startT);
          osc.frequency.exponentialRampToValueAtTime(f * 0.50, startT + 0.38);
          og.gain.setValueAtTime(vol * 0.24, startT);
          og.gain.exponentialRampToValueAtTime(0.001, startT + 0.48);
          osc.connect(og); og.connect(ctx.destination);
          osc.start(startT); osc.stop(startT + 0.52);
        });
      }

      // Primer golpe, luego segundo más fuerte (choque de espadas)
      heavyStrike(t,        420, 0.62);
      heavyStrike(t + 0.17, 620, 0.88);

      // Campana de victoria — resonancia sostenida
      [440, 880, 1320, 1760].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        const st = t + 0.30;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.14 / (i + 1), st + 0.025);
        g.gain.exponentialRampToValueAtTime(0.001, st + 1.8 / (i * 0.4 + 1));
        osc.connect(g); g.connect(ctx.destination);
        osc.start(st); osc.stop(st + 2.2);
      });

    } catch(e) { console.warn('Audio allComplete error:', e); }
  }

  // ============================================================
  // STAT KEYS / NAMES
  // ============================================================
  const STAT_KEYS = ['STR', 'DEX', 'CON', 'INT', 'VOL', 'CHA'];
  const STAT_NAMES = {
    STR: 'Strength · Fuerza',
    DEX: 'Dexterity · Destreza',
    CON: 'Constitution · Vitalidad',

  // === DAILY HABITS ===
  const DEFAULT_HABITOS = [
    { id: 'h0', text: 'Levantarse a las 7am', xp: 10, gains: { CON: 1, VOL: 1 } },

    { id: 'h12', text: 'Escribir 3 cosas por las que estás agradecido', xp: 10, gains: { CHA: 2, INT: 1 } }
  ];

  // === WEEKLY QUESTS ===
  const DEFAULT_WEEKLY = [
    { id: 'w0', text: 'Pádel', xp: 28, gains: { DEX: 4, STR: 2, CON: 2 } },
    { id: 'w1', text: 'Fútbol', xp: 32, gains: { DEX: 3, STR: 3, CON: 3 } }
  ];

  // === TIERS (rangos de stats) ===
  const TIERS = [
    { t: 'F',  min: 0   },
    { t: 'E',  min: 20  },
    { t: 'D',  min: 50  },
    { t: 'C',  min: 100 },
    { t: 'B',  min: 175 },
    { t: 'A',  min: 275 },
    { t: 'S',  min: 400 },
    { t: 'SS', min: 600 }
  ];

  function tierFor(points) {
    let curr = TIERS[0], next = TIERS[1];
    for (let i = 0; i < TIERS.length; i++) {
      if (points >= TIERS[i].min) { curr = TIERS[i]; next = TIERS[i+1]; }
    }
    if (!next) return { tier: curr.t, pctToNext: 100, currentMin: curr.min, nextMin: curr.min, capped: true };
    const span = next.min - curr.min;
    const into = points - curr.min;
    return { tier: curr.t, pctToNext: Math.min(100, (into / span) * 100), currentMin: curr.min, nextMin: next.min, capped: false };
  }

  // === DATE / WEEK KEYS ===
  const todayKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const yesterdayKey = () => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  function isoWeekKey(date) {
    const d = new Date(date || new Date());
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const week1 = new Date(d.getFullYear(), 0, 4);
    const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
  }

  // === STATE ===
  let state = loadState();
  let currentTab = 'habitos';
  let openTierFor = null;
  let radarChart = null;

  function defaultStats() {
    return STAT_KEYS.reduce((acc, k) => { acc[k] = 0; return acc; }, {});
  }

  function loadState() {
    try {
      const rawV3 = localStorage.getItem(STORAGE_KEY);
      if (rawV3) {
        const s = JSON.parse(rawV3);
        if (!s.stats) s.stats = defaultStats();
        if (!s.habitos) s.habitos = DEFAULT_HABITOS.map(h => ({ ...h, done: {} }));
        if (!s.weekly) s.weekly = DEFAULT_WEEKLY.map(w => ({ ...w, done: {} }));
        if (!s.trabajo) s.trabajo = [];
        if (typeof s.totalXp !== 'number') s.totalXp = 0;
        if (typeof s.streak !== 'number') s.streak = 0;
        if (!s.lastActiveDay) s.lastActiveDay = todayKey();
        if (typeof s.col !== 'number') s.col = 0;
        s.habitos = DEFAULT_HABITOS.map((def, i) => {
          const old = s.habitos.find(h => h.id === def.id) || s.habitos[i] || {};
          return { ...def, done: old.done || {} };
        });
        s.weekly = DEFAULT_WEEKLY.map((def, i) => {
          const old = s.weekly.find(w => w.id === def.id) || s.weekly[i] || {};
          return { ...def, done: old.done || {} };
        });
        return s;
      }
      const rawV2 = localStorage.getItem('sao_habit_tracker_v2');
      if (rawV2) {
        const v2 = JSON.parse(rawV2);
        const habitos = DEFAULT_HABITOS.map((def, i) => {
          const old = (v2.habitos || []).find(h => h.id === def.id) || (v2.habitos || [])[i] || {};
          return { ...def, done: old.done || {} };
        });
        return {
          habitos,
          weekly: DEFAULT_WEEKLY.map(w => ({ ...w, done: {} })),
          trabajo: v2.trabajo || [],
          stats: v2.stats || defaultStats(),
          totalXp: v2.totalXp || 0,
          streak: v2.streak || 0,
          lastActiveDay: v2.lastActiveDay || todayKey(),
          col: v2.col || 0
        };
      }
    } catch (e) { console.warn('load failed', e); }
    return {
      habitos: DEFAULT_HABITOS.map(h => ({ ...h, done: {} })),
      weekly: DEFAULT_WEEKLY.map(w => ({ ...w, done: {} })),
      trabajo: [],
      stats: defaultStats(),
      totalXp: 0,
      streak: 0,
      lastActiveDay: todayKey(),
      col: 0
    };
  }

  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function updateStreakOnLoad() {
    const today = todayKey();
    if (state.lastActiveDay !== today) {
      const y = yesterdayKey();
      const yDone = state.habitos.filter(h => h.done[y]).length;
      const yPct = state.habitos.length ? yDone / state.habitos.length : 0;
      if (state.lastActiveDay === y && yPct >= 0.7) state.streak += 1;
      else if (state.lastActiveDay !== y) state.streak = 0;
      state.lastActiveDay = today;
      saveState();
    }
  }

  // === COMPLETION HELPERS ===
  function getCompletion(task, key) {
    const d = task.done[key];
    if (!d) return null;
    if (typeof d === 'object') return d;
    return { gains: task.gains, xp: task.xp };
  }

  function applyGains(gains, multiplier) {
    Object.entries(gains || {}).forEach(([k, v]) => {
      state.stats[k] = Math.max(0, (state.stats[k] || 0) + v * multiplier);
    });
  }

  // === LEVEL ===
  function calcLevel(totalXp) {
    let level = 1, needed = 100, accumulated = 0;
    while (totalXp >= accumulated + needed) {
      accumulated += needed; level++;
      needed = 100 + (level - 1) * 50;
    }
    return { level, currentLevelXp: totalXp - accumulated, neededForNext: needed };
  }

  function calcHpPct() {
    const today = todayKey();
    const total = state.habitos.length;
    if (!total) return 100;
    const done = state.habitos.filter(h => h.done[today]).length;
    return Math.round(60 + (done / total) * 40);
  }

  // === DOM REFS ===
  const dateLabel = document.getElementById('dateLabel');
  const lvNum = document.getElementById('lvNum');
  const hpText = document.getElementById('hpText');
  const hpFill = document.getElementById('hpFill');
  const xpText = document.getElementById('xpText');
  const xpFill = document.getElementById('xpFill');
  const statStreak = document.getElementById('statStreak');
  const statQuests = document.getElementById('statQuests');
  const statWeek = document.getElementById('statWeek');
  const statCol = document.getElementById('statCol');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  const panelContent = document.getElementById('panelContent');
  const notification = document.getElementById('notification');
  const notifMsg = document.getElementById('notifMsg');

  function setDateLabel() {
    const d = new Date();
    const days = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
    const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    dateLabel.textContent = `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function renderHeader() {
    const today = todayKey();
    const week = isoWeekKey();
    const dailyDone = state.habitos.filter(h => h.done[today]).length;
    const weeklyDone = state.weekly.filter(w => w.done[week]).length;
    const lv = calcLevel(state.totalXp);
    lvNum.textContent = lv.level;
    statStreak.textContent = state.streak;
    statQuests.textContent = `${dailyDone}/${state.habitos.length}`;
    statWeek.textContent = `${weeklyDone}/${state.weekly.length}`;
    statCol.textContent = state.col;
    xpText.textContent = `${lv.currentLevelXp}/${lv.neededForNext}`;
    xpFill.style.width = `${(lv.currentLevelXp/lv.neededForNext)*100}%`;
    const hpPct = calcHpPct();
    hpText.textContent = `${hpPct}/100`;
    hpFill.style.width = `${hpPct}%`;
  }

  // === RENDER QUEST ITEM ===
  function renderQuestItem(task, opts) {
    const done = !!task.done[opts.periodKey];
    const completion = getCompletion(task, opts.periodKey);
    const wrap = document.createElement('div');
    const el = document.createElement('div');
    el.className = 'quest' + (done ? ' completed' : '') + (opts.isWeekly ? ' weekly' : '');
    const ring = document.createElement('div');
    ring.className = 'check-ring';
    const txt = document.createElement('div');
    txt.className = 'quest-text';
    txt.textContent = task.text;

    if (done && completion && completion.tierId) {
      const badge = document.createElement('span');
      badge.className = 'tier-badge';
      badge.textContent = completion.label || completion.tierId;
      txt.appendChild(badge);
    } else if (task.tiers && !done) {
      const mark = document.createElement('span');
      mark.className = 'scalable-mark';
      mark.textContent = '▾';
      mark.title = 'Sesión escalable';
      txt.appendChild(mark);
    }

    const gains = document.createElement('div');
    gains.className = 'gains';
    const showGains = (done && completion) ? completion.gains : task.gains;
    Object.entries(showGains || {}).forEach(([stat, val]) => {
      const chip = document.createElement('span');
      chip.className = `gain-chip gain-${stat}`;
      chip.textContent = `${stat}+${val}`;
      gains.appendChild(chip);
    });

    el.appendChild(ring);
    el.appendChild(txt);
    el.appendChild(gains);

    if (opts.allowDelete) {
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.title = 'Eliminar';
      del.textContent = '✕';
      del.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(opts.listKey, task.id); });
      el.appendChild(del);
    }

    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      if (task.tiers && !done) {
        openTierFor = (openTierFor === task.id) ? null : task.id;
        renderAll();
      } else {
        toggleQuest(opts.listKey, opts.periodKey, task.id);
      }
    });

    wrap.appendChild(el);

    if (task.tiers && !done && openTierFor === task.id) {
      const sel = document.createElement('div');
      sel.className = 'tier-selector show';
      const prompt = document.createElement('div');
      prompt.className = 'tier-prompt';
      prompt.textContent = '⟦ SELECCIONAR INTENSIDAD ⟧';
      sel.appendChild(prompt);

      const grid = document.createElement('div');
      grid.className = 'tier-grid';
      task.tiers.forEach(tier => {
        const btn = document.createElement('button');
        btn.className = 'tier-btn' + (tier.elite ? ' elite' : '');
        const time = document.createElement('div');
        time.className = 'tier-time';
        time.textContent = tier.label;
        btn.appendChild(time);
        const sub = document.createElement('div');
        sub.className = 'tier-gains-line';
        sub.textContent = tier.sub;
        btn.appendChild(sub);
        const gainsLine = document.createElement('div');
        gainsLine.className = 'tier-gains-line';
        gainsLine.style.color = 'var(--sao-cyan-bright)';
        gainsLine.textContent = Object.entries(tier.gains).map(([k,v]) => `${k}+${v}`).join(' ');
        btn.appendChild(gainsLine);
        const xpLine = document.createElement('div');
        xpLine.className = 'tier-gains-line';
        xpLine.style.color = 'var(--sao-gold-soft)';
        xpLine.textContent = `+${tier.xp} EXP`;
        btn.appendChild(xpLine);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          completeTiered(opts.listKey, opts.periodKey, task.id, tier);
        });
        grid.appendChild(btn);
      });
      sel.appendChild(grid);
      wrap.appendChild(sel);
    }

    return wrap;
  }

  function renderQuestList(list, opts) {
    const wrap = document.createElement('div');
    wrap.className = 'quest-list';
    list.forEach(task => wrap.appendChild(renderQuestItem(task, opts)));
    return wrap;
  }

    panelTitle.textContent = 'DAILY QUESTS';
    panelSubtitle.textContent = 'Misiones del día';
    panelContent.innerHTML = '';
    const today = todayKey();
    const week = isoWeekKey();

    const dHeader = document.createElement('div');
    dHeader.className = 'section-header';
    dHeader.innerHTML = `
      <span class="section-label">⟦ DAILY ⟧</span>
      <div class="section-line"></div>
      <span class="section-meta">${state.habitos.filter(h => h.done[today]).length}/${state.habitos.length}</span>
    `;
    panelContent.appendChild(dHeader);
    panelContent.appendChild(renderQuestList(state.habitos, { listKey: 'habitos', periodKey: today, isWeekly: false }));

    const wHeader = document.createElement('div');

      <span class="section-label gold">⟦ WEEKLY ⟧</span>
      <div class="section-line gold"></div>
      <span class="section-meta">${state.weekly.filter(w => w.done[week]).length}/${state.weekly.length} esta semana</span>
    `;

  function renderTrabajo() {
    panelTitle.textContent = 'WORK MISSIONS';
    panelSubtitle.textContent = 'Tareas de trabajo';
    panelContent.innerHTML = '';
    const today = todayKey();

    if (state.trabajo.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-icon">⚔</div>
        <div class="empty-text">⟦ NO ACTIVE QUESTS ⟧</div>
        <div class="empty-sub">Agregá tareas de trabajo para empezar tu jornada.</div>
      `;
      panelContent.appendChild(empty);
    } else {
      panelContent.appendChild(renderQuestList(state.trabajo, { listKey: 'trabajo', periodKey: today, isWeekly: false, allowDelete: true }));
    }

    const form = document.createElement('div');
    form.className = 'add-task-form';
    form.innerHTML = `
      <input type="text" class="add-task-input" id="taskInput" placeholder="Nueva misión... (ej: Revisar PR #42)" maxlength="80">
      <button class="add-btn" id="addBtn">+ ADD</button>
    `;
    panelContent.appendChild(form);
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    panelContent.appendChild(renderFooter('trabajo'));
  }

  function renderFooter(tabKey) {
    const today = todayKey();
    const week = isoWeekKey();
    let text = '';
    if (tabKey === 'habitos') {
      const dDone = state.habitos.filter(t => t.done[today]).length;
      const wDone = state.weekly.filter(t => t.done[week]).length;
      text = `${dDone}/${state.habitos.length} DAY · ${wDone}/${state.weekly.length} WEEK`;
    } else {
      const done = state.trabajo.filter(t => t.done[today]).length;
      text = `${done}/${state.trabajo.length} COMPLETE`;
    }
    const f = document.createElement('div');
    f.className = 'footer-actions';
    f.innerHTML = `
      <div class="progress-text">${text}</div>
      <button class="reset-btn" id="resetBtn">⟲ RESET DAY</button>
    `;
    f.querySelector('#resetBtn').addEventListener('click', () => {
      if (!confirm('¿Resetear el progreso de hoy? Se quitarán los checks y los stats que ganaste hoy se descontarán.')) return;
      [...state.habitos, ...state.trabajo].forEach(t => {
        if (t.done[today]) {
          const c = getCompletion(t, today);
          if (c) {
            applyGains(c.gains, -1);
            state.totalXp = Math.max(0, state.totalXp - (c.xp || 0));
            state.col = Math.max(0, state.col - (c.xp || 0));
          }
          delete t.done[today];
        }
      });
      saveState();
      renderAll();
    });
    return f;
  }

  function drawRadar() {
    const canvas = document.getElementById('radarCanvas');
    if (!canvas) return;
    if (radarChart) radarChart.destroy();
    const data = STAT_KEYS.map(k => state.stats[k]);
    const maxData = Math.max(20, Math.max(...data) * 1.2);
    radarChart = new Chart(canvas, {
      type: 'radar',
      data: {
        labels: STAT_KEYS,
        datasets: [{
          data, fill: true,
          backgroundColor: 'rgba(77, 208, 225, 0.25)',
          borderColor: 'rgba(77, 208, 225, 0.9)',
          borderWidth: 2,
          pointBackgroundColor: '#ffc107',
          pointBorderColor: '#fff',
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: '#ffc107',
          pointRadius: 4, pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(6, 26, 43, 0.95)',
            borderColor: '#4dd0e1', borderWidth: 1,
            titleColor: '#ffc107', bodyColor: '#e0f7fa',
            titleFont: { family: 'Cinzel', size: 12 },
            bodyFont: { family: 'Rajdhani', size: 13 }
          }
        },
        scales: {
          r: {
            min: 0, max: maxData,
            angleLines: { color: 'rgba(77, 208, 225, 0.25)' },

            ticks: { display: false, stepSize: maxData / 4 }

  function renderAll() {
    renderHeader();
    if (currentTab === 'habitos') renderHabitos();
    else if (currentTab === 'trabajo') renderTrabajo();
    else if (currentTab === 'personaje') renderPersonaje();
  }

  // === ACTIONS ===
  function toggleQuest(listKey, periodKey, id) {
    const task = state[listKey].find(t => t.id === id);
    if (!task) return;
    const wasDone = !!task.done[periodKey];

    if (wasDone) {
      const c = getCompletion(task, periodKey);
      if (c) {
        applyGains(c.gains, -1);
        state.totalXp = Math.max(0, state.totalXp - (c.xp || 0));
        state.col = Math.max(0, state.col - (c.xp || 0));
      }
      delete task.done[periodKey];
    } else {
      task.done[periodKey] = true;
      const prevLevel = calcLevel(state.totalXp).level;
      state.totalXp += (task.xp || 0);
      state.col += (task.xp || 0);
      applyGains(task.gains, 1);
      const newLevel = calcLevel(state.totalXp).level;

      // 🔊 Sonido: espada al completar hábito
      playSwordSlash();

      const gainStrs = Object.entries(task.gains || {}).map(([k, v]) => `${k}+${v}`).join(' ');
      showNotif(`+${task.xp} EXP · ${gainStrs}`);

      if (newLevel > prevLevel) afterLevelUp(newLevel);
      checkAllDone(listKey, periodKey);
    }
    openTierFor = null;
    saveState();
    renderAll();
  }

  function completeTiered(listKey, periodKey, id, tier) {
    const task = state[listKey].find(t => t.id === id);
    if (!task) return;
    if (task.done[periodKey]) return;
    task.done[periodKey] = { tierId: tier.id, label: tier.label, gains: { ...tier.gains }, xp: tier.xp };
    const prevLevel = calcLevel(state.totalXp).level;
    state.totalXp += tier.xp;
    state.col += tier.xp;
    applyGains(tier.gains, 1);
    const newLevel = calcLevel(state.totalXp).level;

    // 🔊 Sonido: espada al completar hábito tiered
    playSwordSlash();

    const gainStrs = Object.entries(tier.gains).map(([k, v]) => `${k}+${v}`).join(' ');
    showNotif(`${tier.label} · +${tier.xp} EXP · ${gainStrs}`);

    if (newLevel > prevLevel) afterLevelUp(newLevel);
    checkAllDone(listKey, periodKey);

    openTierFor = null;
    saveState();
    renderAll();
  }

  function afterLevelUp(newLevel) {
    setTimeout(() => {
      // 🔊 Sonido: fanfare anime de level up
      playLevelUp();
      showNotif(`★ LEVEL UP! → LV.${newLevel}`);
      document.getElementById('mainPanel').classList.add('level-up');
      setTimeout(() => document.getElementById('mainPanel').classList.remove('level-up'), 2400);
    }, 700);
  }

  function checkAllDone(listKey, periodKey) {
    const list = state[listKey];
    if (list.length === 0) return;
    const allDone = list.every(t => t.done[periodKey]);
    if (allDone) {
      const msg = listKey === 'weekly' ? '⟦ ALL WEEKLY QUESTS CLEARED ⟧' :
                  listKey === 'habitos' ? '⟦ ALL DAILY QUESTS CLEARED ⟧' :
                  '⟦ ALL MISSIONS CLEARED ⟧';
      setTimeout(() => {
        // 🔊 Sonido: doble espada épica al completar todo
        playAllComplete();
        showNotif(msg);
      }, 1300);
    }
  }

  function deleteTask(listKey, id) {
    state[listKey] = state[listKey].filter(t => t.id !== id);
    saveState();
    renderAll();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    state.trabajo.push({ id: 't' + Date.now(), text, xp: 15, gains: { INT: 1 }, done: {} });
    input.value = '';
    saveState();
    renderAll();
  }

  function showNotif(msg) {
    notifMsg.textContent = msg;
    notification.classList.add('show');
    clearTimeout(notification._t);
    notification._t = setTimeout(() => notification.classList.remove('show'), 2400);
  }

  // tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      openTierFor = null;
      renderAll();
    });
  });

  document.addEventListener('click', (e) => {
    if (!openTierFor) return;
    if (e.target.closest('.quest') || e.target.closest('.tier-selector')) return;
    openTierFor = null;
    renderAll();
  });

  // init
  setDateLabel();
  updateStreakOnLoad();
  renderAll();
</script>

</body>
</html>
