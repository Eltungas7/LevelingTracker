<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Habit Tracker Rpg",
  "schemaVersion": 1,
  "description": "Habit tracker estilo Solo Leveling / SAO con dos solapas (HABITOS y TRABAJO), sistema de XP, nivel, racha y notificaciones de level up. El progreso se guarda en localStorage."
}
</script>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SAO MENU // Daily Quests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --sao-cyan: #4dd0e1;
    --sao-cyan-bright: #80deea;
    --sao-cyan-deep: #00b8d4;
    --sao-gold: #ffc107;
    --sao-gold-soft: #ffd54f;
    --sao-bg-deep: #061a2b;
    --sao-bg-mid: #0d2942;
    --sao-bg-soft: #163a55;
    --sao-text: #e0f7fa;
    --sao-text-dim: #7ba7c0;
    --sao-green: #76ff03;
    --sao-green-bar: #64dd17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, #1a4566 0%, #0a2440 40%, #04111d 100%);
    color: var(--sao-text);
    min-height: 100vh;
    padding: 18px;
    overflow-x: hidden;
    position: relative;
  }

  /* subtle moving particle / glint background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.4), transparent),
      radial-gradient(1px 1px at 80% 60%, rgba(128, 222, 234, 0.5), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255, 215, 100, 0.3), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255, 255, 255, 0.3), transparent),
      radial-gradient(1.5px 1.5px at 10% 70%, rgba(128, 222, 234, 0.4), transparent);
    background-size: 600px 600px;
    pointer-events: none;
    z-index: 0;
    animation: drift 60s linear infinite;
  }

  @keyframes drift {
    0% { background-position: 0 0; }
    100% { background-position: 600px 600px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(77, 208, 225, 0.06), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255, 193, 7, 0.04), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
  }

  /* === SAO STATUS PANEL === */
  .status-panel {
    background:
      linear-gradient(180deg, rgba(13, 41, 66, 0.85), rgba(6, 26, 43, 0.92));
    border: 1px solid var(--sao-cyan);
    border-radius: 6px;
    padding: 0;
    margin-bottom: 14px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(77, 208, 225, 0.2),
      0 0 24px rgba(77, 208, 225, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  /* Top accent bar like SAO menu header */
  .status-top-bar {
    background: linear-gradient(90deg,
      rgba(77, 208, 225, 0.25) 0%,
      rgba(77, 208, 225, 0.05) 50%,
      rgba(77, 208, 225, 0.25) 100%);
    border-bottom: 1px solid rgba(77, 208, 225, 0.5);
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 8px var(--sao-cyan);
  }

  .status-top-bar .blink-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sao-green);
    box-shadow: 0 0 8px var(--sao-green);
    margin-right: 6px;
    vertical-align: middle;
    animation: blink 1.6s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-body {
    padding: 14px 18px 16px;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .avatar-frame {
    width: 44px;
    height: 44px;
    border: 2px solid var(--sao-cyan);
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(77, 208, 225, 0.25), rgba(255, 193, 7, 0.15));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--sao-gold-soft);
    text-shadow: 0 0 6px var(--sao-gold);
    box-shadow:
      0 0 0 2px rgba(6, 26, 43, 1),
      0 0 0 3px rgba(77, 208, 225, 0.5),
      0 0 14px rgba(77, 208, 225, 0.4);
    flex-shrink: 0;
  }

  .player-info { flex: 1; min-width: 0; }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
    text-shadow: 0 0 8px var(--sao-cyan), 0 0 2px #fff;
    line-height: 1.1;
  }

  .player-tag {
    font-size: 11px;
    color: var(--sao-gold-soft);
    letter-spacing: 3px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  .lvl-pill {
    background: linear-gradient(135deg, rgba(255, 193, 7, 0.2), rgba(255, 193, 7, 0.05));
    border: 1px solid var(--sao-gold);
    color: var(--sao-gold-soft);
    padding: 4px 12px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px var(--sao-gold);
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* HP/EXP bars row */
  .bars-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .bar-block {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--sao-text-dim);
  }

  .bar-label .bar-name {
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 6px var(--sao-cyan);
  }

  .bar-track {
    height: 7px;
    background: rgba(0, 10, 20, 0.85);
    border: 1px solid rgba(77, 208, 225, 0.4);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.6);
  }

  .bar-fill {
    height: 100%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .bar-fill.hp {
    background: linear-gradient(180deg, #b9f6ca, var(--sao-green-bar) 50%, #33691e);
    box-shadow: 0 0 6px var(--sao-green);
  }

  .bar-fill.exp {
    background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep));
    box-shadow: 0 0 6px var(--sao-cyan);
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 40%);
  }

  /* Streak / quest count micro stats */
  .micro-stats {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(77, 208, 225, 0.18);
  }

  .micro {
    flex: 1;
    text-align: center;
  }

  .micro-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--sao-text-dim);
    margin-bottom: 2px;
  }

  .micro-value {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 8px var(--sao-cyan);
  }

  .micro-value.gold { color: var(--sao-gold-soft); text-shadow: 0 0 8px var(--sao-gold); }
  .micro-value.green { color: var(--sao-green); text-shadow: 0 0 8px var(--sao-green); }

  /* === SAO TABS === */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 1px solid rgba(77, 208, 225, 0.4);
  }

  .tab {
    flex: 1;
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.4), rgba(6, 26, 43, 0.7));
    border: 1px solid rgba(77, 208, 225, 0.25);
    border-bottom: none;
    color: var(--sao-text-dim);
    padding: 11px 14px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    border-radius: 6px 6px 0 0;
  }

  .tab + .tab { margin-left: 3px; }

  .tab:hover:not(.active) {
    color: var(--sao-cyan-bright);
    border-color: rgba(77, 208, 225, 0.5);
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.6), rgba(6, 26, 43, 0.85));
  }

  .tab.active {
    color: #ffffff;
    background: linear-gradient(180deg, rgba(77, 208, 225, 0.25), rgba(13, 41, 66, 0.95));
    border-color: var(--sao-cyan);
    text-shadow: 0 0 10px var(--sao-cyan), 0 0 2px #fff;
    box-shadow:
      0 -2px 16px rgba(77, 208, 225, 0.35),
      inset 0 -2px 0 var(--sao-gold);
  }

  /* === MAIN PANEL === */
  .panel {
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.92), rgba(6, 26, 43, 0.95));
    border: 1px solid var(--sao-cyan);
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 18px 22px 22px;
    box-shadow:
      0 0 0 1px rgba(77, 208, 225, 0.2),
      0 6px 30px rgba(77, 208, 225, 0.18);
    min-height: 380px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(77, 208, 225, 0.3);
    position: relative;
  }

  .panel-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 60px;
    height: 1px;
    background: var(--sao-gold);
    box-shadow: 0 0 6px var(--sao-gold);
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 4px;
    text-shadow: 0 0 8px var(--sao-cyan);
  }

  .panel-subtitle {
    font-size: 12px;
    color: var(--sao-text-dim);
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
  }

  /* === QUEST LIST === */
  .quest-list { display: flex; flex-direction: column; gap: 8px; }

  .quest {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(90deg, rgba(22, 58, 85, 0.5), rgba(13, 41, 66, 0.3));
    border: 1px solid rgba(77, 208, 225, 0.25);
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    border-radius: 4px;
  }

  .quest::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60%;
    background: var(--sao-cyan);
    box-shadow: 0 0 8px var(--sao-cyan);
    border-radius: 2px;
  }

  .quest:hover {
    background: linear-gradient(90deg, rgba(30, 80, 110, 0.7), rgba(22, 58, 85, 0.4));
    border-color: var(--sao-cyan);
    transform: translateX(3px);
    box-shadow: 0 0 16px rgba(77, 208, 225, 0.25);
  }

  .quest.completed {
    opacity: 0.55;
    background: linear-gradient(90deg, rgba(118, 255, 3, 0.08), rgba(13, 41, 66, 0.3));
  }

  .quest.completed::before { background: var(--sao-green); box-shadow: 0 0 8px var(--sao-green); }
  .quest.completed .quest-text { text-decoration: line-through; color: var(--sao-text-dim); }

  /* SAO check ring */
  .check-ring {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--sao-cyan);
    background: rgba(0, 10, 20, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    position: relative;
  }

  .check-ring::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: transparent;
    transition: all 0.25s;
  }

  .quest:hover .check-ring { border-color: var(--sao-cyan-bright); box-shadow: 0 0 10px var(--sao-cyan); }

  .quest.completed .check-ring {
    border-color: var(--sao-green);
    background: rgba(118, 255, 3, 0.15);
    box-shadow: 0 0 12px var(--sao-green);
  }

  .quest.completed .check-ring::after {
    content: '✓';
    color: var(--sao-green);
    font-size: 14px;
    font-weight: 900;
    background: transparent;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 6px var(--sao-green);
  }

  .quest-text {
    flex: 1;
    font-size: 15px;
    color: var(--sao-text);
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  /* Stat gain chips */
  .gains {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 200px;
  }

  .gain-chip {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid;
    font-weight: 600;
    white-space: nowrap;
  }

  .gain-STR { color: #ff8a80; border-color: rgba(255, 138, 128, 0.5); background: rgba(255, 138, 128, 0.1); }
  .gain-DEX { color: #b9f6ca; border-color: rgba(185, 246, 202, 0.5); background: rgba(185, 246, 202, 0.1); }
  .gain-CON { color: #ffd180; border-color: rgba(255, 209, 128, 0.5); background: rgba(255, 209, 128, 0.1); }
  .gain-INT { color: #82b1ff; border-color: rgba(130, 177, 255, 0.5); background: rgba(130, 177, 255, 0.1); }
  .gain-VOL { color: #ce93d8; border-color: rgba(206, 147, 216, 0.5); background: rgba(206, 147, 216, 0.1); }
  .gain-CHA { color: #ffe082; border-color: rgba(255, 224, 130, 0.5); background: rgba(255, 224, 130, 0.1); }

  .delete-btn {
    background: transparent;
    border: 1px solid rgba(255, 100, 100, 0.4);
    color: #ff6464;
    width: 22px; height: 22px;
    cursor: pointer;
    font-size: 11px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 3px;
  }
  .quest:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255, 80, 80, 0.18); }

  /* Add task form */
  .add-task-form {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }

  .add-task-input {
    flex: 1;
    background: rgba(0, 10, 20, 0.8);
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-text);
    padding: 9px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    border-radius: 3px;
    transition: all 0.25s;
  }
  .add-task-input:focus {
    border-color: var(--sao-cyan);
    box-shadow: 0 0 12px rgba(77, 208, 225, 0.3);
  }
  .add-task-input::placeholder { color: rgba(123, 167, 192, 0.6); }

  .add-btn {
    background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep));
    border: 1px solid var(--sao-gold);
    color: #042430;
    padding: 9px 16px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
  }
  .add-btn:hover {
    box-shadow: 0 0 16px rgba(77, 208, 225, 0.6), 0 0 4px var(--sao-gold);
    transform: translateY(-1px);
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--sao-text-dim); }
  .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.6; color: var(--sao-cyan); }
  .empty-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; margin-bottom: 4px; color: var(--sao-cyan-bright); }
  .empty-sub { font-size: 13px; color: var(--sao-text-dim); }

  /* Footer actions */
  .footer-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }

  .progress-text {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--sao-text-dim);
    letter-spacing: 2px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255, 193, 7, 0.5);
    color: var(--sao-gold-soft);
    padding: 5px 12px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
  }
  .reset-btn:hover {
    background: rgba(255, 193, 7, 0.12);
    box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
  }

  /* === PERSONAJE PAGE === */
  .character-grid {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) 1fr;
    gap: 18px;
    margin-bottom: 18px;
  }

  @media (max-width: 600px) {
    .character-grid { grid-template-columns: 1fr; }
  }

  .radar-card {
    background: linear-gradient(180deg, rgba(22, 58, 85, 0.6), rgba(13, 41, 66, 0.85));
    border: 1px solid rgba(77, 208, 225, 0.4);
    border-radius: 4px;
    padding: 12px;
    position: relative;
  }

  .radar-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--sao-gold);
    box-shadow: 0 0 6px var(--sao-gold);
  }

  .radar-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--sao-cyan-bright);
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 6px var(--sao-cyan);
  }

  #radarCanvas { width: 100% !important; height: 240px !important; }

  .stats-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-row {
    background: linear-gradient(90deg, rgba(22, 58, 85, 0.55), rgba(13, 41, 66, 0.3));
    border: 1px solid rgba(77, 208, 225, 0.25);
    border-left: 3px solid;
    padding: 8px 12px;
    border-radius: 3px;
    transition: all 0.25s;
  }

  .stat-row:hover {
    background: linear-gradient(90deg, rgba(30, 80, 110, 0.7), rgba(22, 58, 85, 0.4));
    box-shadow: 0 0 12px rgba(77, 208, 225, 0.2);
  }

  .stat-row.STR { border-left-color: #ff8a80; }
  .stat-row.DEX { border-left-color: #b9f6ca; }
  .stat-row.CON { border-left-color: #ffd180; }
  .stat-row.INT { border-left-color: #82b1ff; }
  .stat-row.VOL { border-left-color: #ce93d8; }
  .stat-row.CHA { border-left-color: #ffe082; }

  .stat-row-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .stat-name-block {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .stat-code {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }

  .stat-row.STR .stat-code { color: #ff8a80; text-shadow: 0 0 6px rgba(255, 138, 128, 0.6); }
  .stat-row.DEX .stat-code { color: #b9f6ca; text-shadow: 0 0 6px rgba(185, 246, 202, 0.6); }
  .stat-row.CON .stat-code { color: #ffd180; text-shadow: 0 0 6px rgba(255, 209, 128, 0.6); }
  .stat-row.INT .stat-code { color: #82b1ff; text-shadow: 0 0 6px rgba(130, 177, 255, 0.6); }
  .stat-row.VOL .stat-code { color: #ce93d8; text-shadow: 0 0 6px rgba(206, 147, 216, 0.6); }
  .stat-row.CHA .stat-code { color: #ffe082; text-shadow: 0 0 6px rgba(255, 224, 130, 0.6); }

  .stat-full-name {
    font-size: 11px;
    color: var(--sao-text-dim);
    letter-spacing: 1px;
  }

  .stat-tier {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--sao-gold-soft);
    text-shadow: 0 0 6px var(--sao-gold);
    letter-spacing: 1px;
  }

  .stat-row-bar {
    height: 6px;
    background: rgba(0, 10, 20, 0.8);
    border: 1px solid rgba(77, 208, 225, 0.3);
    overflow: hidden;
    border-radius: 2px;
    margin-top: 6px;
  }

  .stat-row-fill {
    height: 100%;
    transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 6px currentColor;
  }

  .stat-row.STR .stat-row-fill { background: #ff8a80; color: #ff8a80; }
  .stat-row.DEX .stat-row-fill { background: #b9f6ca; color: #b9f6ca; }
  .stat-row.CON .stat-row-fill { background: #ffd180; color: #ffd180; }
  .stat-row.INT .stat-row-fill { background: #82b1ff; color: #82b1ff; }
  .stat-row.VOL .stat-row-fill { background: #ce93d8; color: #ce93d8; }
  .stat-row.CHA .stat-row-fill { background: #ffe082; color: #ffe082; }

  .stat-row-foot {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--sao-text-dim);
    letter-spacing: 1px;
  }

  .stat-points { color: var(--sao-cyan-bright); text-shadow: 0 0 4px var(--sao-cyan); }

  .character-summary {
    background: linear-gradient(135deg, rgba(255, 193, 7, 0.08), rgba(77, 208, 225, 0.05));
    border: 1px solid rgba(255, 193, 7, 0.4);
    padding: 12px 16px;
    border-radius: 4px;
    text-align: center;
    margin-top: 6px;
  }

  .summary-class {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--sao-gold-soft);
    text-shadow: 0 0 8px var(--sao-gold);
    margin-bottom: 4px;
  }

  .summary-tagline {
    font-size: 12px;
    color: var(--sao-text);
    letter-spacing: 1px;
  }

  /* Notification */
  .notification {
    position: fixed;
    top: 18px;
    right: 18px;
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.98), rgba(6, 26, 43, 0.98));
    border: 1px solid var(--sao-cyan);
    color: #ffffff;
    padding: 0;
    font-family: 'Cinzel', serif;
    box-shadow: 0 0 24px rgba(77, 208, 225, 0.6), 0 0 4px var(--sao-gold);
    z-index: 100;
    transform: translateX(140%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 4px;
    overflow: hidden;
    min-width: 220px;
  }

  .notification.show { transform: translateX(0); }

  .notif-bar {
    background: linear-gradient(90deg, rgba(255, 193, 7, 0.3), rgba(77, 208, 225, 0.2));
    padding: 4px 12px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--sao-gold-soft);
    border-bottom: 1px solid var(--sao-gold);
    text-shadow: 0 0 6px var(--sao-gold);
  }

  .notif-body {
    padding: 10px 14px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 6px var(--sao-cyan);
  }

  /* Level up flash */
  @keyframes lvlFlash {
    0%, 100% { box-shadow: 0 0 0 1px rgba(77, 208, 225, 0.2), 0 6px 30px rgba(77, 208, 225, 0.18); }
    50% { box-shadow: 0 0 0 2px var(--sao-gold), 0 0 60px rgba(255, 193, 7, 0.6); }
  }
  .level-up { animation: lvlFlash 0.7s ease-in-out 3; }

  @media (max-width: 600px) {
    .player-name { font-size: 17px; }
    .tab { font-size: 10px; letter-spacing: 2px; padding: 9px 6px; }
    .panel-title { font-size: 13px; letter-spacing: 2px; }
    .quest-text { font-size: 14px; }
    .gains { max-width: 110px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- STATUS PANEL -->
  <div class="status-panel" id="statusPanel">
    <div class="status-top-bar">
      <span><span class="blink-dot"></span>MENU // STATUS</span>
      <span id="dateLabel">--</span>
    </div>
    <div class="status-body">
      <div class="player-row">
        <div class="avatar-frame">T</div>
        <div class="player-info">
          <div class="player-name">Tuni</div>
          <div class="player-tag">Aincrad Hunter</div>
        </div>
        <div class="lvl-pill">LV <span id="lvNum">1</span></div>
      </div>

      <div class="bars-row">
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">HP</span><span id="hpText">100/100</span></div>
          <div class="bar-track"><div class="bar-fill hp" id="hpFill" style="width: 100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">EXP</span><span id="xpText">0/100</span></div>
          <div class="bar-track"><div class="bar-fill exp" id="xpFill" style="width: 0%"></div></div>
        </div>
      </div>

      <div class="micro-stats">
        <div class="micro">
          <div class="micro-label">STREAK</div>
          <div class="micro-value gold" id="statStreak">0</div>
        </div>
        <div class="micro">
          <div class="micro-label">QUESTS TODAY</div>
          <div class="micro-value" id="statQuests">0/0</div>
        </div>
        <div class="micro">
          <div class="micro-label">COL</div>
          <div class="micro-value gold" id="statCol">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="habitos">⟦ HABITOS ⟧</div>
    <div class="tab" data-tab="trabajo">⟦ TRABAJO ⟧</div>
    <div class="tab" data-tab="personaje">⟦ PERSONAJE ⟧</div>
  </div>

  <!-- PANEL -->
  <div class="panel" id="mainPanel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">DAILY QUESTS</div>
      <div class="panel-subtitle" id="panelSubtitle">Misiones del día</div>
    </div>

    <div id="panelContent"></div>
  </div>

</div>

<div class="notification" id="notification">
  <div class="notif-bar">⟦ SYSTEM ⟧</div>
  <div class="notif-body" id="notifMsg">Quest Complete!</div>
</div>

<script>
  const STORAGE_KEY = 'sao_habit_tracker_v2';

  // === HABITS WITH STAT GAINS ===
  // Each habit grants stat points + XP when completed.
  const DEFAULT_HABITOS = [
    { text: 'Levantarse a las 7am',                                   xp: 10, gains: { CON: 1, VOL: 1 } },
    { text: 'Tomar un vaso de agua grande',                           xp: 8,  gains: { CON: 1 } },
    { text: 'No tocar el teléfono los primeros 30 min',               xp: 12, gains: { VOL: 2 } },
    { text: 'Caminata al parque',                                     xp: 10, gains: { DEX: 1, CON: 1 } },
    { text: 'Meditación (10 min)',                                    xp: 12, gains: { INT: 1, VOL: 1 } },
    { text: 'Entrenamiento físico',                                   xp: 15, gains: { STR: 2, CON: 1 } },
    { text: 'Desayuno sin pantallas',                                 xp: 10, gains: { VOL: 1, CHA: 1 } },
    { text: 'Cortar trabajo a las 7pm. Sin redes ni pantallas',       xp: 14, gains: { VOL: 2 } },
    { text: 'Anotar logros del día y tarea #1 de mañana',             xp: 12, gains: { INT: 2 } },
    { text: 'Hidratación (control de 2L al día)',                     xp: 10, gains: { CON: 2 } },
    { text: 'Lectura y/o meditación antes de dormir',                 xp: 12, gains: { INT: 2 } },
    { text: 'Acostarse a las 11:30hs',                                xp: 12, gains: { CON: 1, VOL: 1 } },
    { text: 'Escribir 3 cosas por las que estás agradecido',          xp: 10, gains: { CHA: 2, INT: 1 } }
  ];

  const STAT_KEYS = ['STR', 'DEX', 'CON', 'INT', 'VOL', 'CHA'];
  const STAT_NAMES = {
    STR: 'Strength · Fuerza',
    DEX: 'Dexterity · Destreza',
    CON: 'Constitution · Vitalidad',
    INT: 'Intelligence · Mente',
    VOL: 'Volition · Voluntad',
    CHA: 'Charisma · Carisma'
  };

  // Tier thresholds (cumulative points). 8 tiers F → SS
  const TIERS = [
    { t: 'F',  min: 0   },
    { t: 'E',  min: 20  },
    { t: 'D',  min: 50  },
    { t: 'C',  min: 100 },
    { t: 'B',  min: 175 },
    { t: 'A',  min: 275 },
    { t: 'S',  min: 400 },
    { t: 'SS', min: 600 }
  ];

  function tierFor(points) {
    let curr = TIERS[0], next = TIERS[1];
    for (let i = 0; i < TIERS.length; i++) {
      if (points >= TIERS[i].min) { curr = TIERS[i]; next = TIERS[i+1]; }
    }
    if (!next) return { tier: curr.t, pctToNext: 100, currentMin: curr.min, nextMin: curr.min, capped: true };
    const span = next.min - curr.min;
    const into = points - curr.min;
    return { tier: curr.t, pctToNext: Math.min(100, (into / span) * 100), currentMin: curr.min, nextMin: next.min, capped: false };
  }

  const todayKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  const yesterdayKey = () => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  // === STATE ===
  let state = loadState();
  let currentTab = 'habitos';
  let radarChart = null;

  function defaultStats() {
    return STAT_KEYS.reduce((acc, k) => { acc[k] = 0; return acc; }, {});
  }

  function loadState() {
    try {
      const rawV2 = localStorage.getItem(STORAGE_KEY);
      if (rawV2) {
        const s = JSON.parse(rawV2);
        if (!s.stats) s.stats = defaultStats();
        if (!s.habitos) s.habitos = DEFAULT_HABITOS.map((h, i) => ({ id: 'h'+i, ...h, done: {} }));
        if (!s.trabajo) s.trabajo = [];
        if (typeof s.totalXp !== 'number') s.totalXp = 0;
        if (typeof s.streak !== 'number') s.streak = 0;
        if (!s.lastActiveDay) s.lastActiveDay = todayKey();
        if (typeof s.col !== 'number') s.col = 0;
        // ensure each habit has gains/xp (in case definitions changed)
        s.habitos.forEach((h, i) => {
          const def = DEFAULT_HABITOS[i];
          if (def) {
            if (!h.gains) h.gains = def.gains;
            if (typeof h.xp !== 'number') h.xp = def.xp;
          }
        });
        return s;
      }
      // migrate from v1 if present
      const rawV1 = localStorage.getItem('sololvl_habit_tracker_v1');
      if (rawV1) {
        const v1 = JSON.parse(rawV1);
        const stats = defaultStats();
        // recalc stats from completion history
        const habitos = DEFAULT_HABITOS.map((h, i) => {
          const oldH = (v1.habitos || []).find(x => x.id === 'h'+i);
          const done = oldH ? oldH.done || {} : {};
          // accumulate stat points per completion
          Object.keys(done).forEach(() => {
            Object.entries(h.gains).forEach(([k, v]) => stats[k] += v);
          });
          return { id: 'h'+i, ...h, done };
        });
        const trabajo = (v1.trabajo || []).map(t => ({ ...t, gains: t.gains || { INT: 1 } }));
        return {
          habitos,
          trabajo,
          stats,
          totalXp: v1.totalXp || 0,
          streak: v1.streak || 0,
          lastActiveDay: v1.lastActiveDay || todayKey(),
          col: 0
        };
      }
    } catch (e) { console.warn('load failed', e); }
    return {
      habitos: DEFAULT_HABITOS.map((h, i) => ({ id: 'h'+i, ...h, done: {} })),
      trabajo: [],
      stats: defaultStats(),
      totalXp: 0,
      streak: 0,
      lastActiveDay: todayKey(),
      col: 0
    };
  }

  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function updateStreakOnLoad() {
    const today = todayKey();
    if (state.lastActiveDay !== today) {
      const y = yesterdayKey();
      const yDone = state.habitos.filter(h => h.done[y]).length;
      const yPct = state.habitos.length ? yDone / state.habitos.length : 0;
      if (state.lastActiveDay === y && yPct >= 0.7) {
        state.streak += 1;
      } else if (state.lastActiveDay !== y) {
        state.streak = 0;
      }
      state.lastActiveDay = today;
      saveState();
    }
  }

  // === LEVEL ===
  function calcLevel(totalXp) {
    let level = 1, needed = 100, accumulated = 0;
    while (totalXp >= accumulated + needed) {
      accumulated += needed;
      level++;
      needed = 100 + (level - 1) * 50;
    }
    return { level, currentLevelXp: totalXp - accumulated, neededForNext: needed };
  }

  function calcHpPct() {
    const today = todayKey();
    const list = state.habitos;
    const total = list.length;
    if (!total) return 100;
    const done = list.filter(h => h.done[today]).length;
    // HP starts at 60% baseline, fills up to 100% as habits are completed
    return Math.round(60 + (done / total) * 40);
  }

  // === DOM ===
  const dateLabel = document.getElementById('dateLabel');
  const lvNum = document.getElementById('lvNum');
  const hpText = document.getElementById('hpText');
  const hpFill = document.getElementById('hpFill');
  const xpText = document.getElementById('xpText');
  const xpFill = document.getElementById('xpFill');
  const statStreak = document.getElementById('statStreak');
  const statQuests = document.getElementById('statQuests');
  const statCol = document.getElementById('statCol');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  const panelContent = document.getElementById('panelContent');
  const notification = document.getElementById('notification');
  const notifMsg = document.getElementById('notifMsg');

  function setDateLabel() {
    const d = new Date();
    const days = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
    const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    dateLabel.textContent = `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function renderHeader() {
    const today = todayKey();
    const list = currentTab === 'trabajo' ? state.trabajo : state.habitos;
    const doneToday = list.filter(t => t.done[today]).length;
    const total = list.length;

    const lv = calcLevel(state.totalXp);
    lvNum.textContent = lv.level;
    statStreak.textContent = state.streak;
    statQuests.textContent = `${doneToday}/${total}`;
    statCol.textContent = state.col;
    xpText.textContent = `${lv.currentLevelXp}/${lv.neededForNext}`;
    xpFill.style.width = `${(lv.currentLevelXp/lv.neededForNext)*100}%`;

    const hpPct = calcHpPct();
    hpText.textContent = `${hpPct}/100`;
    hpFill.style.width = `${hpPct}%`;
  }

  function renderQuestList(listKey, opts = {}) {
    const today = todayKey();
    const list = state[listKey];
    const wrap = document.createElement('div');
    wrap.className = 'quest-list';

    if (list.length === 0 && opts.emptyState) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-icon">⚔</div>
        <div class="empty-text">⟦ NO ACTIVE QUESTS ⟧</div>
        <div class="empty-sub">Agregá tareas de trabajo para empezar tu jornada.</div>
      `;
      wrap.appendChild(empty);
    } else {
      list.forEach(task => {
        const done = !!task.done[today];
        const el = document.createElement('div');
        el.className = 'quest' + (done ? ' completed' : '');

        const ring = document.createElement('div');
        ring.className = 'check-ring';

        const txt = document.createElement('div');
        txt.className = 'quest-text';
        txt.textContent = task.text;

        const gains = document.createElement('div');
        gains.className = 'gains';
        Object.entries(task.gains || {}).forEach(([stat, val]) => {
          const chip = document.createElement('span');
          chip.className = `gain-chip gain-${stat}`;
          chip.textContent = `${stat}+${val}`;
          gains.appendChild(chip);
        });

        el.appendChild(ring);
        el.appendChild(txt);
        el.appendChild(gains);

        if (listKey === 'trabajo') {
          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.title = 'Eliminar';
          del.textContent = '✕';
          del.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(task.id); });
          el.appendChild(del);
        }

        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          toggleQuest(listKey, task.id);
        });

        wrap.appendChild(el);
      });
    }

    return wrap;
  }

  function renderHabitos() {
    panelTitle.textContent = 'DAILY QUESTS';
    panelSubtitle.textContent = 'Hábitos del día';
    panelContent.innerHTML = '';
    panelContent.appendChild(renderQuestList('habitos'));
    panelContent.appendChild(renderFooter('habitos'));
  }

  function renderTrabajo() {
    panelTitle.textContent = 'WORK MISSIONS';
    panelSubtitle.textContent = 'Tareas de trabajo';
    panelContent.innerHTML = '';
    panelContent.appendChild(renderQuestList('trabajo', { emptyState: true }));

    // add task form
    const form = document.createElement('div');
    form.className = 'add-task-form';
    form.innerHTML = `
      <input type="text" class="add-task-input" id="taskInput" placeholder="Nueva misión... (ej: Revisar PR #42)" maxlength="80">
      <button class="add-btn" id="addBtn">+ ADD</button>
    `;
    panelContent.appendChild(form);
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    panelContent.appendChild(renderFooter('trabajo'));
  }

  function renderFooter(listKey) {
    const today = todayKey();
    const list = state[listKey];
    const done = list.filter(t => t.done[today]).length;

    const f = document.createElement('div');
    f.className = 'footer-actions';
    f.innerHTML = `
      <div class="progress-text">${done} / ${list.length} COMPLETE</div>
      <button class="reset-btn" id="resetBtn">⟲ RESET DAY</button>
    `;
    f.querySelector('#resetBtn').addEventListener('click', () => {
      if (!confirm('¿Resetear el progreso de hoy? Se quitarán los checks y los stats que ganaste hoy se descontarán.')) return;
      [...state.habitos, ...state.trabajo].forEach(t => {
        if (t.done[today]) {
          // subtract gains
          Object.entries(t.gains || {}).forEach(([k, v]) => state.stats[k] = Math.max(0, state.stats[k] - v));
          state.totalXp = Math.max(0, state.totalXp - (t.xp || 0));
          delete t.done[today];
        }
      });
      saveState();
      renderAll();
    });
    return f;
  }

  function renderPersonaje() {
    panelTitle.textContent = 'CHARACTER STATUS';
    panelSubtitle.textContent = 'Atributos del jugador';

    const totalPoints = STAT_KEYS.reduce((s, k) => s + state.stats[k], 0);
    const dominant = STAT_KEYS.reduce((a, b) => state.stats[b] > state.stats[a] ? b : a, 'STR');

    const classMap = {
      STR: { name: 'BERSERKER', tag: 'Combatiente de fuerza pura' },
      DEX: { name: 'SCOUT', tag: 'Veloz, ágil, certero' },
      CON: { name: 'GUARDIAN', tag: 'Resistencia inquebrantable' },
      INT: { name: 'MAGE', tag: 'Mente afilada, conocimiento profundo' },
      VOL: { name: 'MONK', tag: 'Disciplina y dominio interior' },
      CHA: { name: 'BARD', tag: 'Voz que mueve corazones' }
    };
    const klass = totalPoints === 0 ? { name: 'BEGINNER', tag: 'Tu camino recién empieza' } : classMap[dominant];

    panelContent.innerHTML = `
      <div class="character-grid">
        <div class="radar-card">
          <div class="radar-title">⟦ STAT MATRIX ⟧</div>
          <canvas id="radarCanvas"></canvas>
        </div>
        <div class="stats-list" id="statsList"></div>
      </div>
      <div class="character-summary">
        <div class="summary-class">⟦ ${klass.name} ⟧</div>
        <div class="summary-tagline">${klass.tag}</div>
      </div>
    `;

    const statsList = document.getElementById('statsList');
    STAT_KEYS.forEach(k => {
      const pts = state.stats[k];
      const t = tierFor(pts);
      const row = document.createElement('div');
      row.className = `stat-row ${k}`;
      row.innerHTML = `
        <div class="stat-row-top">
          <div class="stat-name-block">
            <span class="stat-code">${k}</span>
            <span class="stat-full-name">${STAT_NAMES[k].split(' · ')[1]}</span>
          </div>
          <div class="stat-tier">RANK ${t.tier}</div>
        </div>
        <div class="stat-row-bar"><div class="stat-row-fill" style="width: ${t.pctToNext}%"></div></div>
        <div class="stat-row-foot">
          <span class="stat-points">${pts} PTS</span>
          <span>${t.capped ? 'MAX RANK' : `→ ${t.nextMin - pts} a Rank ${TIERS[TIERS.findIndex(x => x.t === t.tier) + 1].t}`}</span>
        </div>
      `;
      statsList.appendChild(row);
    });

    drawRadar();
  }

  function drawRadar() {
    const canvas = document.getElementById('radarCanvas');
    if (!canvas) return;
    if (radarChart) radarChart.destroy();
    const data = STAT_KEYS.map(k => state.stats[k]);
    const maxData = Math.max(20, Math.max(...data) * 1.2);

    radarChart = new Chart(canvas, {
      type: 'radar',
      data: {
        labels: STAT_KEYS,
        datasets: [{
          data,
          fill: true,
          backgroundColor: 'rgba(77, 208, 225, 0.25)',
          borderColor: 'rgba(77, 208, 225, 0.9)',
          borderWidth: 2,
          pointBackgroundColor: '#ffc107',
          pointBorderColor: '#fff',
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: '#ffc107',
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: 'rgba(6, 26, 43, 0.95)',
          borderColor: '#4dd0e1',
          borderWidth: 1,
          titleColor: '#ffc107',
          bodyColor: '#e0f7fa',
          titleFont: { family: 'Cinzel', size: 12 },
          bodyFont: { family: 'Rajdhani', size: 13 }
        } },
        scales: {
          r: {
            min: 0,
            max: maxData,
            angleLines: { color: 'rgba(77, 208, 225, 0.25)' },
            grid: { color: 'rgba(77, 208, 225, 0.18)' },
            pointLabels: {
              color: '#80deea',
              font: { family: 'Cinzel', size: 12, weight: '700' }
            },
            ticks: { display: false, stepSize: maxData / 4 }
          }
        }
      }
    });
  }

  function renderAll() {
    renderHeader();
    if (currentTab === 'habitos') renderHabitos();
    else if (currentTab === 'trabajo') renderTrabajo();
    else if (currentTab === 'personaje') renderPersonaje();
  }

  function toggleQuest(listKey, id) {
    const today = todayKey();
    const task = state[listKey].find(t => t.id === id);
    if (!task) return;

    const wasDone = !!task.done[today];

    if (wasDone) {
      delete task.done[today];
      state.totalXp = Math.max(0, state.totalXp - (task.xp || 0));
      Object.entries(task.gains || {}).forEach(([k, v]) => state.stats[k] = Math.max(0, state.stats[k] - v));
      state.col = Math.max(0, state.col - (task.xp || 0));
    } else {
      task.done[today] = true;
      const prevLevel = calcLevel(state.totalXp).level;
      state.totalXp += (task.xp || 0);
      state.col += (task.xp || 0);
      Object.entries(task.gains || {}).forEach(([k, v]) => state.stats[k] = (state.stats[k] || 0) + v);
      const newLevel = calcLevel(state.totalXp).level;

      // notification with stat gains
      const gainStrs = Object.entries(task.gains || {}).map(([k, v]) => `${k}+${v}`).join(' ');
      showNotif(`+${task.xp} EXP · ${gainStrs}`);

      if (newLevel > prevLevel) {
        setTimeout(() => {
          showNotif(`★ LEVEL UP! → LV.${newLevel}`);
          document.getElementById('mainPanel').classList.add('level-up');
          setTimeout(() => document.getElementById('mainPanel').classList.remove('level-up'), 2400);
        }, 700);
      }

      const list = state[listKey];
      const allDone = list.every(t => t.done[today]);
      if (allDone && listKey === 'habitos' && list.length > 0) {
        setTimeout(() => showNotif('⟦ ALL DAILY QUESTS CLEARED ⟧'), 1300);
      }
    }
    saveState();
    renderAll();
  }

  function deleteTask(id) {
    state.trabajo = state.trabajo.filter(t => t.id !== id);
    saveState();
    renderAll();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    state.trabajo.push({
      id: 't' + Date.now(),
      text,
      xp: 15,
      gains: { INT: 1 }, // default for work
      done: {}
    });
    input.value = '';
    saveState();
    renderAll();
  }

  function showNotif(msg) {
    notifMsg.textContent = msg;
    notification.classList.add('show');
    clearTimeout(notification._t);
    notification._t = setTimeout(() => notification.classList.remove('show'), 2400);
  }

  // tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderAll();
    });
  });

  // init
  setDateLabel();
  updateStreakOnLoad();
  renderAll();
</script>

</body>
</html>
