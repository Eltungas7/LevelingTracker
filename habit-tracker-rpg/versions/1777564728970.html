<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Habit Tracker Rpg",
  "schemaVersion": 1,
  "description": "Habit tracker estilo Solo Leveling / SAO con dos solapas (HABITOS y TRABAJO), sistema de XP, nivel, racha y notificaciones de level up. El progreso se guarda en localStorage."
}
</script>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SYSTEM // Daily Quests</title>
<style>
  :root { color-scheme: light; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at top, #0d1530 0%, #050818 60%, #02030a 100%);
    color: #d8e8ff;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
  }

  /* Status Panel */
  .status-panel {
    background: linear-gradient(135deg, rgba(13, 21, 48, 0.95), rgba(20, 30, 60, 0.85));
    border: 2px solid #00d4ff;
    border-radius: 4px;
    padding: 18px 22px;
    margin-bottom: 18px;
    position: relative;
    box-shadow:
      0 0 20px rgba(0, 212, 255, 0.3),
      inset 0 0 30px rgba(0, 212, 255, 0.05);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  .status-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    animation: scan 3s linear infinite;
  }

  @keyframes scan {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .status-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .system-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
  }

  .date-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #6a8caf;
    letter-spacing: 2px;
  }

  .hunter-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 12px #00d4ff, 0 0 4px #ffffff;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .hunter-title {
    font-size: 13px;
    color: #9d4edd;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }

  .stat-box {
    background: rgba(0, 20, 40, 0.6);
    border: 1px solid rgba(0, 212, 255, 0.4);
    padding: 8px 10px;
    text-align: center;
  }

  .stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: #6a8caf;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #00d4ff;
    text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
  }

  .stat-value.streak { color: #ff8c42; text-shadow: 0 0 8px rgba(255, 140, 66, 0.6); }
  .stat-value.level { color: #9d4edd; text-shadow: 0 0 8px rgba(157, 78, 221, 0.6); }

  .xp-section {
    margin-top: 8px;
  }

  .xp-header {
    display: flex;
    justify-content: space-between;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #6a8caf;
    margin-bottom: 4px;
  }

  .xp-bar {
    height: 8px;
    background: rgba(0, 20, 40, 0.8);
    border: 1px solid rgba(0, 212, 255, 0.4);
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #9d4edd);
    box-shadow: 0 0 10px #00d4ff;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
    animation: shine 2s linear infinite;
  }

  @keyframes shine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
  }

  .tab {
    flex: 1;
    background: linear-gradient(180deg, rgba(13, 21, 48, 0.6), rgba(5, 8, 24, 0.8));
    border: 2px solid rgba(0, 212, 255, 0.3);
    border-bottom: none;
    color: #6a8caf;
    padding: 14px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 100%, 12px 100%);
  }

  .tab:nth-child(2) {
    clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
  }

  .tab.active {
    color: #00d4ff;
    background: linear-gradient(180deg, rgba(0, 212, 255, 0.2), rgba(13, 21, 48, 0.95));
    border-color: #00d4ff;
    text-shadow: 0 0 12px #00d4ff;
    box-shadow: 0 -4px 20px rgba(0, 212, 255, 0.3);
  }

  .tab:hover:not(.active) {
    color: #d8e8ff;
    border-color: rgba(0, 212, 255, 0.6);
  }

  /* Quest Panel */
  .quest-panel {
    background: linear-gradient(135deg, rgba(13, 21, 48, 0.95), rgba(20, 30, 60, 0.85));
    border: 2px solid #00d4ff;
    border-radius: 4px;
    padding: 22px;
    box-shadow:
      0 0 30px rgba(0, 212, 255, 0.25),
      inset 0 0 40px rgba(0, 212, 255, 0.04);
    min-height: 400px;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 14px;
    margin-bottom: 18px;
    border-bottom: 1px solid rgba(0, 212, 255, 0.3);
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #00d4ff;
  }

  .panel-subtitle {
    font-size: 12px;
    color: #6a8caf;
    letter-spacing: 2px;
    font-family: 'Orbitron', monospace;
  }

  /* Quest items */
  .quest-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .quest {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(90deg, rgba(0, 30, 60, 0.4), rgba(0, 20, 40, 0.2));
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-left: 3px solid #00d4ff;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .quest::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: #00d4ff;
    box-shadow: 0 0 10px #00d4ff;
  }

  .quest:hover {
    background: linear-gradient(90deg, rgba(0, 50, 90, 0.6), rgba(0, 30, 60, 0.3));
    border-color: #00d4ff;
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
  }

  .quest.completed {
    border-left-color: #00ff88;
    opacity: 0.55;
  }

  .quest.completed::before {
    background: #00ff88;
    box-shadow: 0 0 10px #00ff88;
  }

  .quest.completed .quest-text {
    text-decoration: line-through;
    color: #6a8caf;
  }

  /* Hex checkbox */
  .hex-check {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    position: relative;
    background: rgba(0, 20, 40, 0.8);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    border: 0;
    transition: all 0.3s;
  }

  .hex-check::before {
    content: '';
    position: absolute;
    inset: 2px;
    background: rgba(0, 20, 40, 0.95);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .hex-check-wrap {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    position: relative;
    background: #00d4ff;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
  }

  .hex-check-wrap::before {
    content: '';
    position: absolute;
    inset: 2px;
    background: rgba(5, 10, 25, 1);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .quest.completed .hex-check-wrap {
    background: #00ff88;
    box-shadow: 0 0 14px rgba(0, 255, 136, 0.7);
  }

  .quest.completed .hex-check-wrap::after {
    content: '✓';
    position: absolute;
    z-index: 2;
    color: #00ff88;
    font-size: 16px;
    font-weight: 900;
    text-shadow: 0 0 8px #00ff88;
  }

  .quest-text {
    flex: 1;
    font-size: 16px;
    color: #d8e8ff;
    letter-spacing: 0.5px;
    transition: all 0.3s;
  }

  .quest-xp {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #9d4edd;
    letter-spacing: 1px;
    background: rgba(157, 78, 221, 0.15);
    border: 1px solid rgba(157, 78, 221, 0.4);
    padding: 3px 8px;
    flex-shrink: 0;
  }

  .quest.completed .quest-xp {
    color: #00ff88;
    border-color: rgba(0, 255, 136, 0.4);
    background: rgba(0, 255, 136, 0.1);
  }

  /* Empty state for trabajo */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #6a8caf;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-text {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 13px;
    color: #4a6c8f;
    margin-bottom: 20px;
  }

  /* Add task button */
  .add-task-btn {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(157, 78, 221, 0.2));
    border: 2px solid #00d4ff;
    color: #00d4ff;
    padding: 10px 22px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    text-shadow: 0 0 8px #00d4ff;
  }

  .add-task-btn:hover {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(157, 78, 221, 0.4));
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    transform: translateY(-2px);
  }

  /* Add task input */
  .add-task-form {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(0, 212, 255, 0.2);
  }

  .add-task-input {
    flex: 1;
    background: rgba(0, 20, 40, 0.8);
    border: 1px solid rgba(0, 212, 255, 0.4);
    color: #d8e8ff;
    padding: 10px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }

  .add-task-input:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
  }

  .add-task-input::placeholder {
    color: #4a6c8f;
  }

  .add-btn {
    background: linear-gradient(135deg, #00d4ff, #9d4edd);
    border: none;
    color: #050818;
    padding: 10px 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .add-btn:hover {
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.6);
    transform: translateY(-1px);
  }

  /* Delete button on hover */
  .delete-btn {
    background: transparent;
    border: 1px solid rgba(255, 80, 80, 0.4);
    color: #ff5050;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .quest:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255, 80, 80, 0.2); }

  /* Footer */
  .footer-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(0, 212, 255, 0.2);
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255, 140, 66, 0.5);
    color: #ff8c42;
    padding: 6px 14px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .reset-btn:hover {
    background: rgba(255, 140, 66, 0.15);
    box-shadow: 0 0 10px rgba(255, 140, 66, 0.3);
  }

  .progress-text {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #6a8caf;
    letter-spacing: 2px;
  }

  /* Level up animation */
  @keyframes levelUpFlash {
    0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.25), inset 0 0 40px rgba(0, 212, 255, 0.04); }
    50% { box-shadow: 0 0 60px rgba(157, 78, 221, 0.8), inset 0 0 80px rgba(157, 78, 221, 0.2); }
  }

  .level-up { animation: levelUpFlash 0.8s ease-in-out 3; }

  /* Notification */
  .notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, rgba(13, 21, 48, 0.98), rgba(40, 20, 80, 0.95));
    border: 2px solid #9d4edd;
    color: #ffffff;
    padding: 14px 22px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
    z-index: 100;
    transform: translateX(120%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .notification.show { transform: translateX(0); }

  .notif-title {
    color: #00d4ff;
    font-size: 10px;
    margin-bottom: 4px;
    text-shadow: 0 0 8px #00d4ff;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 12px;
    height: 12px;
    border: 2px solid #00d4ff;
  }
  .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
  .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
  .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-value { font-size: 16px; }
    .quest-text { font-size: 14px; }
    .tab { font-size: 11px; letter-spacing: 2px; padding: 12px 8px; }
    .panel-title { font-size: 13px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- STATUS PANEL -->
  <div class="status-panel" id="statusPanel">
    <div class="status-header">
      <span class="system-label">⟦ SYSTEM // STATUS ⟧</span>
      <span class="date-label" id="dateLabel">--</span>
    </div>
    <div class="hunter-name">HUNTER: TUNI</div>
    <div class="hunter-title">▸ Daily Quest Protocol Active</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">LEVEL</div>
        <div class="stat-value level" id="statLevel">1</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">STREAK</div>
        <div class="stat-value streak" id="statStreak">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">QUESTS</div>
        <div class="stat-value" id="statQuests">0/0</div>
      </div>
    </div>

    <div class="xp-section">
      <div class="xp-header">
        <span>EXP</span>
        <span id="xpText">0 / 100</span>
      </div>
      <div class="xp-bar">
        <div class="xp-fill" id="xpFill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="habitos">⟦ HABITOS ⟧</div>
    <div class="tab" data-tab="trabajo">⟦ TRABAJO ⟧</div>
  </div>

  <!-- QUEST PANEL -->
  <div class="quest-panel" id="questPanel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">DAILY QUESTS</div>
      <div class="panel-subtitle" id="panelSubtitle">Misiones del día</div>
    </div>

    <div class="quest-list" id="questList"></div>

    <div class="add-task-form" id="addTaskForm" style="display: none;">
      <input type="text" class="add-task-input" id="taskInput" placeholder="Nueva misión..." maxlength="80">
      <button class="add-btn" id="addBtn">+ ADD</button>
    </div>

    <div class="footer-actions">
      <div class="progress-text" id="progressText">0 / 0 COMPLETE</div>
      <button class="reset-btn" id="resetBtn">⟲ RESET DAY</button>
    </div>
  </div>

</div>

<div class="notification" id="notification">
  <div class="notif-title">⟦ NOTIFICATION ⟧</div>
  <div id="notifMsg">Quest Complete!</div>
</div>

<script>
  const STORAGE_KEY = 'sololvl_habit_tracker_v1';

  const DEFAULT_HABITOS = [
    'Levantarse a las 7am',
    'Tomar un vaso de agua grande',
    'No tocar el teléfono los primeros 30 min',
    'Caminata al parque',
    'Meditación (10 min)',
    'Entrenamiento físico',
    'Desayuno sin pantallas',
    'Cortar trabajo a las 7pm. Sin redes ni pantallas',
    'Anotar logros del día y tarea #1 de mañana',
    'Hidratación (control de 2L al día)',
    'Lectura y/o meditación antes de dormir',
    'Acostarse a las 11:30hs',
    'Escribir 3 cosas por las que estás agradecido'
  ];

  const todayKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  // State
  let state = loadState();
  let currentTab = 'habitos';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        // ensure structure
        if (!s.habitos) s.habitos = DEFAULT_HABITOS.map((t, i) => ({ id: 'h'+i, text: t, done: {}, xp: 10 }));
        if (!s.trabajo) s.trabajo = [];
        if (!s.totalXp) s.totalXp = 0;
        if (!s.lastActiveDay) s.lastActiveDay = todayKey();
        if (typeof s.streak !== 'number') s.streak = 0;
        return s;
      }
    } catch (e) { console.warn('load failed', e); }
    return {
      habitos: DEFAULT_HABITOS.map((t, i) => ({ id: 'h'+i, text: t, done: {}, xp: 10 })),
      trabajo: [],
      totalXp: 0,
      streak: 0,
      lastActiveDay: todayKey()
    };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // Streak logic — runs once at load
  function updateStreakOnLoad() {
    const today = todayKey();
    if (state.lastActiveDay !== today) {
      // check if previous day completed all habits
      const yesterday = (() => {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      })();

      const yesterdayDone = state.habitos.filter(h => h.done[yesterday]).length;
      const yesterdayPct = state.habitos.length ? yesterdayDone / state.habitos.length : 0;

      if (state.lastActiveDay === yesterday && yesterdayPct >= 0.7) {
        state.streak += 1;
      } else if (state.lastActiveDay !== yesterday) {
        // missed days
        state.streak = 0;
      }
      state.lastActiveDay = today;
      saveState();
    }
  }

  // Render
  const dateLabel = document.getElementById('dateLabel');
  const statLevel = document.getElementById('statLevel');
  const statStreak = document.getElementById('statStreak');
  const statQuests = document.getElementById('statQuests');
  const xpText = document.getElementById('xpText');
  const xpFill = document.getElementById('xpFill');
  const questList = document.getElementById('questList');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  const progressText = document.getElementById('progressText');
  const addTaskForm = document.getElementById('addTaskForm');
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const resetBtn = document.getElementById('resetBtn');
  const notification = document.getElementById('notification');
  const notifMsg = document.getElementById('notifMsg');

  function setDateLabel() {
    const d = new Date();
    const days = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
    const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    dateLabel.textContent = `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function calcLevel(totalXp) {
    // simple curve: level n needs n*100 cumulative xp, level = floor(sqrt(totalXp/50))+1
    let level = 1, needed = 100, accumulated = 0;
    while (totalXp >= accumulated + needed) {
      accumulated += needed;
      level++;
      needed = 100 + (level - 1) * 50;
    }
    return { level, currentLevelXp: totalXp - accumulated, neededForNext: needed };
  }

  function renderStats() {
    const today = todayKey();
    const list = state[currentTab];
    const doneCount = list.filter(t => t.done[today]).length;
    const total = list.length;

    const lv = calcLevel(state.totalXp);
    statLevel.textContent = lv.level;
    statStreak.textContent = state.streak;
    statQuests.textContent = `${doneCount}/${total}`;
    xpText.textContent = `${lv.currentLevelXp} / ${lv.neededForNext}`;
    const pct = lv.neededForNext ? (lv.currentLevelXp / lv.neededForNext * 100) : 0;
    xpFill.style.width = `${pct}%`;
    progressText.textContent = `${doneCount} / ${total} COMPLETE`;
  }

  function renderQuests() {
    const today = todayKey();
    const list = state[currentTab];
    questList.innerHTML = '';

    if (currentTab === 'trabajo' && list.length === 0) {
      questList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚔</div>
          <div class="empty-text">⟦ NO ACTIVE QUESTS ⟧</div>
          <div class="empty-sub">Agregá tareas de trabajo para empezar tu jornada.</div>
        </div>
      `;
    } else {
      list.forEach((task) => {
        const done = !!task.done[today];
        const el = document.createElement('div');
        el.className = 'quest' + (done ? ' completed' : '');
        el.innerHTML = `
          <div class="hex-check-wrap"></div>
          <div class="quest-text"></div>
          <div class="quest-xp">+${task.xp} XP</div>
          ${currentTab === 'trabajo' ? '<button class="delete-btn" title="Eliminar">✕</button>' : ''}
        `;
        el.querySelector('.quest-text').textContent = task.text;

        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          toggleQuest(task.id);
        });

        const delBtn = el.querySelector('.delete-btn');
        if (delBtn) {
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTask(task.id);
          });
        }

        questList.appendChild(el);
      });
    }

    // panel header
    if (currentTab === 'habitos') {
      panelTitle.textContent = 'DAILY QUESTS';
      panelSubtitle.textContent = 'Hábitos del día';
      addTaskForm.style.display = 'none';
    } else {
      panelTitle.textContent = 'WORK MISSIONS';
      panelSubtitle.textContent = 'Tareas de trabajo';
      addTaskForm.style.display = 'flex';
    }
  }

  function renderAll() {
    renderStats();
    renderQuests();
  }

  function toggleQuest(id) {
    const today = todayKey();
    const list = state[currentTab];
    const task = list.find(t => t.id === id);
    if (!task) return;

    const wasDone = !!task.done[today];
    if (wasDone) {
      delete task.done[today];
      state.totalXp = Math.max(0, state.totalXp - task.xp);
    } else {
      task.done[today] = true;
      const prevLevel = calcLevel(state.totalXp).level;
      state.totalXp += task.xp;
      const newLevel = calcLevel(state.totalXp).level;

      // notification
      showNotif(`+${task.xp} EXP GAINED`);
      if (newLevel > prevLevel) {
        setTimeout(() => {
          showNotif(`⚔ LEVEL UP! → LV.${newLevel}`);
          document.getElementById('questPanel').classList.add('level-up');
          setTimeout(() => document.getElementById('questPanel').classList.remove('level-up'), 2400);
        }, 600);
      }

      // check if all done
      const allDone = list.every(t => t.done[today]);
      if (allDone && currentTab === 'habitos' && list.length > 0) {
        setTimeout(() => showNotif('⟦ ALL QUESTS CLEARED ⟧'), 1100);
      }
    }
    saveState();
    renderAll();
  }

  function deleteTask(id) {
    state.trabajo = state.trabajo.filter(t => t.id !== id);
    saveState();
    renderAll();
  }

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;
    const id = 't' + Date.now();
    state.trabajo.push({ id, text, done: {}, xp: 15 });
    taskInput.value = '';
    saveState();
    renderAll();
  }

  function showNotif(msg) {
    notifMsg.textContent = msg;
    notification.classList.add('show');
    clearTimeout(notification._t);
    notification._t = setTimeout(() => notification.classList.remove('show'), 2200);
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderAll();
    });
  });

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });

  resetBtn.addEventListener('click', () => {
    if (!confirm('¿Resetear el progreso de hoy? Se quitarán los checks pero conservás tu XP y nivel.')) return;
    const today = todayKey();
    [...state.habitos, ...state.trabajo].forEach(t => {
      if (t.done[today]) {
        delete t.done[today];
      }
    });
    saveState();
    renderAll();
  });

  // Init
  setDateLabel();
  updateStreakOnLoad();
  renderAll();
</script>

</body>
</html>
