<style>
  :root {

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;

  @keyframes drift {

  body::after {

  }

  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; }

  /* === STATUS PANEL === */
  .status-panel {

  .status-top-bar {

  .blink-dot {

  /* Sound toggle */
  .sound-toggle {

  .status-body { padding: 14px 18px 16px; }

  .player-name {

    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;

    text-shadow: 0 0 6px var(--sao-gold);
    border-radius: 3px; flex-shrink: 0;
  }

  .bars-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .bar-block { display: flex; flex-direction: column; gap: 3px; }
  .bar-label {
    display: flex; justify-content: space-between;
    font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 2px; color: var(--sao-text-dim);
  }
  .bar-name { color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan); }
  .bar-track {
    height: 7px;
    background: rgba(0, 10, 20, 0.85);
    border: 1px solid rgba(77, 208, 225, 0.4);
    border-radius: 2px; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.6);

  .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
  .bar-fill.hp { background: linear-gradient(180deg, #b9f6ca, var(--sao-green-bar) 50%, #33691e); box-shadow: 0 0 6px var(--sao-green); }
  .bar-fill.exp { background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep)); box-shadow: 0 0 6px var(--sao-cyan); }
  .bar-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 40%); }

  .micro-stats {
    display: flex; gap: 14px; margin-top: 12px;
    padding-top: 10px; border-top: 1px solid rgba(77, 208, 225, 0.18);
  }
  .micro { flex: 1; text-align: center; }
  .micro-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-text-dim); margin-bottom: 2px; }
  .micro-value { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--sao-cyan-bright); text-shadow: 0 0 8px var(--sao-cyan); }
  .micro-value.gold { color: var(--sao-gold-soft); text-shadow: 0 0 8px var(--sao-gold); }

  /* === TABS === */
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid rgba(77, 208, 225, 0.4); }
  .tab {
    flex: 1;
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.4), rgba(6, 26, 43, 0.7));
    border: 1px solid rgba(77, 208, 225, 0.25); border-bottom: none;
    color: var(--sao-text-dim);
    padding: 11px 14px;
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.25s; text-align: center; border-radius: 6px 6px 0 0;
  }
  .tab + .tab { margin-left: 3px; }
  .tab:hover:not(.active) {
    color: var(--sao-cyan-bright);
    border-color: rgba(77, 208, 225, 0.5);
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.6), rgba(6, 26, 43, 0.85));
  }
  .tab.active {
    color: #fff;
    background: linear-gradient(180deg, rgba(77, 208, 225, 0.25), rgba(13, 41, 66, 0.95));

    box-shadow: 0 -2px 16px rgba(77, 208, 225, 0.35), inset 0 -2px 0 var(--sao-gold);
  }

  /* === MAIN PANEL === */
  .panel {
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.92), rgba(6, 26, 43, 0.95));
    border: 1px solid var(--sao-cyan); border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 18px 22px 22px;
    box-shadow: 0 0 0 1px rgba(77, 208, 225, 0.2), 0 6px 30px rgba(77, 208, 225, 0.18);
    min-height: 380px;
  }

  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 12px; margin-bottom: 16px;
    border-bottom: 1px solid rgba(77, 208, 225, 0.3); position: relative;
  }
  .panel-header::after {
    content: ''; position: absolute;
    bottom: -1px; left: 0; width: 60px; height: 1px;
    background: var(--sao-gold); box-shadow: 0 0 6px var(--sao-gold);
  }
  .panel-title {
    font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
    color: #fff; letter-spacing: 4px;
    text-shadow: 0 0 8px var(--sao-cyan);
  }
  .panel-subtitle {
    font-size: 12px; color: var(--sao-text-dim);
    letter-spacing: 2px; font-family: 'Cinzel', serif;
  }

  /* === MODAL === */
  .modal-overlay {

    align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.95), rgba(6, 26, 43, 0.98));

    padding: 24px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 0 40px rgba(77, 208, 225, 0.5);

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 16px; font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 16px;

  .modal-input:focus {

    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;

    border-radius: 3px;

  .modal-btn:hover {

  .modal-btn.primary {

  .modal-btn.primary:hover {

  /* Context menu */
  .context-menu {

  .context-menu.show { display: block; }
  .context-item {
    padding: 10px 16px;

    transition: all 0.15s;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;

  .context-item:last-child { border-bottom: none; }
  .context-item:hover {

  }
  .context-item.danger:hover {
    background: rgba(255, 80, 80, 0.2);
    color: #ff5050;
  }

  /* Editable text */
  .editable-text {
    cursor: pointer;
    position: relative;
    padding: 2px 4px;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .editable-text:hover {
    background: rgba(77, 208, 225, 0.1);
  }
  .inline-edit {
    display: inline;
    outline: none;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--sao-cyan);
    color: inherit;
    font-family: inherit;
    font-size: inherit;
    padding: 0 2px;
  }

  /* Section header (Daily/Weekly) */
  .section-header {
    display: flex; align-items: center; gap: 10px;

  .section-label {

  .section-meta {
    font-family: 'Cinzel', serif;
    font-size: 10px; color: var(--sao-text-dim);

  /* === QUEST LIST === */
  .quest-list { display: flex; flex-direction: column; gap: 8px; }

  .quest {
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(90deg, rgba(22, 58, 85, 0.5), rgba(13, 41, 66, 0.3));
    border: 1px solid rgba(77, 208, 225, 0.25);
    padding: 10px 14px;
    cursor: pointer; transition: all 0.2s;
    position: relative; border-radius: 4px;
  }

  .quest:hover {
    background: linear-gradient(90deg, rgba(30, 80, 110, 0.6), rgba(22, 58, 85, 0.4));
    border-color: rgba(77, 208, 225, 0.5);
    box-shadow: 0 0 12px rgba(77, 208, 225, 0.2);
  }

  .quest.completed {
    opacity: 0.65;

  .quest.completed .check-ring {
    background: linear-gradient(135deg, #b9f6ca, var(--sao-green-bar));
    box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.4), 0 0 8px var(--sao-green);
  }

  .quest.completed .quest-text {
    text-decoration: line-through;

  .check-ring {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid rgba(77, 208, 225, 0.5);
    border-radius: 50%;
    background: transparent;
    transition: all 0.3s;
  }

  .quest-text {
    flex: 1; min-width: 0;
    font-size: 14px; color: var(--sao-text);
    line-height: 1.4;
  }

  .tier-badge {
    display: inline-block;
    margin-left: 8px;
    background: rgba(255, 193, 7, 0.2);
    border: 1px solid var(--sao-gold);
    color: var(--sao-gold-soft);
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    text-shadow: 0 0 4px var(--sao-gold);
  }

  .scalable-mark {
    display: inline-block;
    margin-left: 6px;
    color: var(--sao-gold-soft);
    font-size: 12px;
    opacity: 0.7;
  }

  .gains {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;
  }

  .gain-chip {
    display: inline-block;
    background: rgba(0, 10, 20, 0.9);
    border: 1px solid;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 1px;
    text-shadow: 0 0 4px currentColor;
  }

  .gain-chip.gain-STR { border-color: #ff8a80; color: #ff8a80; }
  .gain-chip.gain-DEX { border-color: #b9f6ca; color: #b9f6ca; }
  .gain-chip.gain-CON { border-color: #ffd180; color: #ffd180; }
  .gain-chip.gain-INT { border-color: #82b1ff; color: #82b1ff; }
  .gain-chip.gain-VOL { border-color: #ce93d8; color: #ce93d8; }
  .gain-chip.gain-CHA { border-color: #ffe082; color: #ffe082; }

  .delete-btn {
    display: none;
    background: transparent;
    border: 1px solid rgba(255, 80, 80, 0.5);
    color: #ff6b6b;
    width: 20px; height: 20px; min-width: 20px;
    padding: 0;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1;
  }
  .quest:hover .delete-btn { display: block; opacity: 0.7; }
  .delete-btn:hover { opacity: 1; background: rgba(255, 80, 80, 0.18); }

  /* Tier selector */
  .tier-selector {
    background: linear-gradient(180deg, rgba(255, 193, 7, 0.06), rgba(13, 41, 66, 0.5));
    border: 1px solid rgba(255, 193, 7, 0.4);
    border-left: 3px solid var(--sao-gold);
    margin-top: -2px;
    padding: 12px 14px;
    border-radius: 0 4px 4px 4px;
    display: none;
    animation: slideDown 0.25s ease-out;
  }
  .tier-selector.show { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tier-prompt {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 2px;
    color: var(--sao-gold-soft);
    text-shadow: 0 0 4px var(--sao-gold);
    margin-bottom: 10px;
  }

  .tier-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  @media (min-width: 600px) {
    .tier-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .tier-btn {
    background: rgba(13, 41, 66, 0.7);
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-text);
    padding: 8px 6px;
    cursor: pointer; border-radius: 3px;
    display: flex; flex-direction: column;
    gap: 3px; align-items: center;
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }
  .tier-btn:hover {
    background: rgba(77, 208, 225, 0.18);
    border-color: var(--sao-cyan);
    box-shadow: 0 0 12px rgba(77, 208, 225, 0.4);
    transform: translateY(-2px);
  }
  .tier-btn.elite { border-color: rgba(255, 193, 7, 0.6); }
  .tier-btn.elite:hover {
    background: rgba(255, 193, 7, 0.15);
    border-color: var(--sao-gold);
    box-shadow: 0 0 14px rgba(255, 193, 7, 0.5);
  }

  .tier-time {
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 1px;
    color: var(--sao-cyan-bright);
    text-shadow: 0 0 4px var(--sao-cyan);
  }
  .tier-btn.elite .tier-time {
    color: var(--sao-gold-soft);
    text-shadow: 0 0 4px var(--sao-gold);
  }
  .tier-gains-line {
    font-size: 10px; color: var(--sao-text-dim);
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 30px 20px; color: var(--sao-text-dim); }
  .empty-icon { font-size: 38px; margin-bottom: 6px; opacity: 0.6; color: var(--sao-cyan); }
  .empty-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; margin-bottom: 4px; color: var(--sao-cyan-bright); }
  .empty-sub { font-size: 13px; color: var(--sao-text-dim); }

  /* Add task form */
  .add-task-form {
    display: flex; gap: 8px;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }
  .add-task-input {
    flex: 1;
    background: rgba(0, 10, 20, 0.8);
    border: 1px solid rgba(77, 208, 225, 0.4);
    color: var(--sao-text);
    padding: 9px 12px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    outline: none; border-radius: 3px;

  }
  .add-task-input:focus { border-color: var(--sao-cyan); box-shadow: 0 0 12px rgba(77, 208, 225, 0.3); }
  .add-task-input::placeholder { color: rgba(123, 167, 192, 0.6); }

  .add-btn {
    background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep));
    border: 1px solid var(--sao-gold);
    color: #042430;
    padding: 9px 16px;
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer; border-radius: 3px;
    transition: all 0.25s;
  }
  .add-btn:hover {
    box-shadow: 0 0 16px rgba(77, 208, 225, 0.6), 0 0 4px var(--sao-gold);
    transform: translateY(-1px);
  }

  /* Footer */
  .footer-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid rgba(77, 208, 225, 0.2);
  }
  .progress-text {
    font-family: 'Cinzel', serif; font-size: 10px;
    color: var(--sao-text-dim); letter-spacing: 2px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255, 193, 7, 0.5);
    color: var(--sao-gold-soft);
    padding: 5px 12px;
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 2px; cursor: pointer;
    border-radius: 3px; transition: all 0.25s;
  }
  .reset-btn:hover { background: rgba(255, 193, 7, 0.12); box-shadow: 0 0 10px rgba(255, 193, 7, 0.3); }

  /* Notification */
  .notification {
    position: fixed; top: 18px; right: 18px;
    background: linear-gradient(180deg, rgba(13, 41, 66, 0.98), rgba(6, 26, 43, 0.98));
    border: 1px solid var(--sao-cyan); color: #fff;
    font-family: 'Cinzel', serif;
    box-shadow: 0 0 24px rgba(77, 208, 225, 0.6), 0 0 4px var(--sao-gold);
    z-index: 100;
    transform: translateX(140%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 4px; overflow: hidden; min-width: 220px;
  }
  .notification.show { transform: translateX(0); }
  .notif-bar {
    background: linear-gradient(90deg, rgba(255, 193, 7, 0.3), rgba(77, 208, 225, 0.2));
    padding: 4px 12px; font-size: 9px; letter-spacing: 3px;
    color: var(--sao-gold-soft);
    border-bottom: 1px solid var(--sao-gold);
    text-shadow: 0 0 6px var(--sao-gold);
  }
  .notif-body {
    padding: 10px 14px; font-size: 13px; letter-spacing: 1px;
    color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan);
  }

  @keyframes lvlFlash {
    0%, 100% { box-shadow: 0 0 0 1px rgba(77,208,225,0.2), 0 6px 30px rgba(77,208,225,0.18); }
    50% { box-shadow: 0 0 0 2px var(--sao-gold), 0 0 60px rgba(255,193,7,0.6); }
  }
  .level-up { animation: lvlFlash 0.7s ease-in-out 3; }

  @media (max-width: 600px) {
    .player-name { font-size: 17px; }
    .tab { font-size: 10px; letter-spacing: 2px; padding: 9px 6px; }
    .panel-title { font-size: 13px; letter-spacing: 2px; }
    .quest-text { font-size: 14px; }
    .gains { max-width: 110px; }
  }
</style>

  <div class="notif-bar">⟦ NOTIFICATION ⟧</div>
  <div class="notif-body" id="notifMsg">--</div>

<script>
  const STORAGE_KEY = 'sao_habit_tracker_v3';
  let soundEnabled = true;
  let _ACtx = null;

  function _getCtx() {
    if (!_ACtx) _ACtx = new (window.AudioContext || window.webkitAudioContext)();
    return _ACtx;
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundToggle').classList.toggle('muted');
  }

  // AUDIO FUNCTIONS (placeholders - incluir las originales si es necesario)
  function playLevelUp() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;
      const comp = ctx.createDynamicsCompressor();
      comp.connect(ctx.destination);

      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const start = i * 0.12;
        const dur = 0.35;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t + start);
        g.gain.linearRampToValueAtTime(0.17, t + start + 0.008);
        g.gain.setValueAtTime(0.17, t + start + dur * 0.55);
        g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
        osc.connect(g); g.connect(comp);
        osc.start(t + start); osc.stop(t + start + dur + 0.05);
      });
    } catch(e) { console.warn('Audio levelUp error:', e); }
  }

  function playSwordSlash() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;
      const len = Math.floor(ctx.sampleRate * 0.22);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const env = Math.pow(1 - i / len, 1.3);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.setValueAtTime(5500, t);
      filt.frequency.exponentialRampToValueAtTime(700, t + 0.17);
      filt.Q.value = 1.4;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.60, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
      noise.connect(filt); filt.connect(ng); ng.connect(ctx.destination);
      noise.start(t); noise.stop(t + 0.24);
    } catch(e) { console.warn('Audio slash error:', e); }
  }

  function playAllComplete() {
    if (!soundEnabled || !_ACtx) return;
    try {
      const ctx = _getCtx();
      const t = ctx.currentTime;
      [440, 880, 1320, 1760].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        const st = t + 0.30;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.14 / (i + 1), st + 0.025);
        g.gain.exponentialRampToValueAtTime(0.001, st + 1.8 / (i * 0.4 + 1));
        osc.connect(g); g.connect(ctx.destination);
        osc.start(st); osc.stop(st + 2.2);
      });
    } catch(e) { console.warn('Audio complete error:', e); }
  }

  // STAT KEYS
  const STAT_KEYS = ['STR', 'DEX', 'CON', 'INT', 'VOL', 'CHA'];
  const STAT_NAMES = {
    STR: 'Strength · Fuerza',
    DEX: 'Dexterity · Destreza',
    CON: 'Constitution · Vitalidad',
    INT: 'Intelligence · Mente',
    VOL: 'Volition · Voluntad',
    CHA: 'Charisma · Carisma'
  };

  // DEFAULT DATA
  const DEFAULT_HABITOS = [
    { id: 'h0', text: 'Levantarse a las 7am', xp: 10, gains: { CON: 1, VOL: 1 } },
    { id: 'h1', text: 'Tomar un vaso de agua grande', xp: 8, gains: { CON: 1 } },
    { id: 'h2', text: 'No tocar el teléfono los primeros 30 min', xp: 12, gains: { VOL: 2 } },
    { id: 'h3', text: 'Caminata al parque', xp: 10, gains: { DEX: 1, CON: 1 } },
    { id: 'h4', text: 'Meditación (10 min)', xp: 12, gains: { INT: 1, VOL: 1 } }
  ];

  const DEFAULT_WEEKLY = [
    { id: 'w0', text: 'Pádel', xp: 28, gains: { DEX: 4, STR: 2, CON: 2 } },
    { id: 'w1', text: 'Fútbol', xp: 32, gains: { DEX: 3, STR: 3, CON: 3 } }
  ];

  const TIERS = [
    { t: 'F',  min: 0   },
    { t: 'E',  min: 20  },
    { t: 'D',  min: 50  },
    { t: 'C',  min: 100 },
    { t: 'B',  min: 175 },
    { t: 'A',  min: 275 },
    { t: 'S',  min: 400 },
    { t: 'SS', min: 600 }
  ];

  function tierFor(points) {
    let curr = TIERS[0], next = TIERS[1];
    for (let i = 0; i < TIERS.length; i++) {
      if (points >= TIERS[i].min) { curr = TIERS[i]; next = TIERS[i+1]; }
    }
    if (!next) return { tier: curr.t, pctToNext: 100, currentMin: curr.min, nextMin: curr.min, capped: true };
    const span = next.min - curr.min;
    const into = points - curr.min;
    return { tier: curr.t, pctToNext: Math.min(100, (into / span) * 100), currentMin: curr.min, nextMin: next.min, capped: false };
  }

  const todayKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  const yesterdayKey = () => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  function isoWeekKey(date) {
    const d = new Date(date || new Date());
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const week1 = new Date(d.getFullYear(), 0, 4);
    const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
  }

  // STATE
  let state = loadState();
  let currentTab = 'habitos';
  let openTierFor = null;
  let radarChart = null;
  let contextTaskId = null;
  let contextListKey = null;

  function defaultStats() {
    return STAT_KEYS.reduce((acc, k) => { acc[k] = 0; return acc; }, {});
  }

  function loadState() {
    try {
      const rawV3 = localStorage.getItem(STORAGE_KEY);
      if (rawV3) {
        const s = JSON.parse(rawV3);
        if (!s.stats) s.stats = defaultStats();
        if (!s.habitos) s.habitos = DEFAULT_HABITOS.map(h => ({ ...h, done: {} }));
        if (!s.weekly) s.weekly = DEFAULT_WEEKLY.map(w => ({ ...w, done: {} }));
        if (!s.trabajo) s.trabajo = [];
        if (typeof s.totalXp !== 'number') s.totalXp = 0;
        if (typeof s.streak !== 'number') s.streak = 0;
        if (!s.lastActiveDay) s.lastActiveDay = todayKey();
        if (typeof s.col !== 'number') s.col = 0;
        return s;
      }
    } catch (e) { console.warn('load failed', e); }
    return {
      habitos: DEFAULT_HABITOS.map(h => ({ ...h, done: {} })),
      weekly: DEFAULT_WEEKLY.map(w => ({ ...w, done: {} })),
      trabajo: [],
      stats: defaultStats(),
      totalXp: 0,
      streak: 0,
      lastActiveDay: todayKey(),
      col: 0
    };
  }

  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function updateStreakOnLoad() {
    const today = todayKey();
    if (state.lastActiveDay !== today) {
      const y = yesterdayKey();
      const yDone = state.habitos.filter(h => h.done[y]).length;
      const yPct = state.habitos.length ? yDone / state.habitos.length : 0;
      if (state.lastActiveDay === y && yPct >= 0.7) state.streak += 1;
      else if (state.lastActiveDay !== y) state.streak = 0;
      state.lastActiveDay = today;
      saveState();
    }
  }

  function getCompletion(task, key) {
    const d = task.done[key];
    if (!d) return null;
    if (typeof d === 'object') return d;
    return { gains: task.gains, xp: task.xp };
  }

  function applyGains(gains, multiplier) {
    Object.entries(gains || {}).forEach(([k, v]) => {
      state.stats[k] = Math.max(0, (state.stats[k] || 0) + v * multiplier);
    });
  }

  function calcLevel(totalXp) {
    let level = 1, needed = 100, accumulated = 0;
    while (totalXp >= accumulated + needed) {
      accumulated += needed; level++;
      needed = 100 + (level - 1) * 50;
    }
    return { level, currentLevelXp: totalXp - accumulated, neededForNext: needed };
  }

  function calcHpPct() {
    const today = todayKey();
    const total = state.habitos.length;
    if (!total) return 100;
    const done = state.habitos.filter(h => h.done[today]).length;
    return Math.round(60 + (done / total) * 40);
  }

  // DOM REFS
  const dateLabel = document.getElementById('dateLabel');
  const lvNum = document.getElementById('lvNum');
  const hpText = document.getElementById('hpText');
  const hpFill = document.getElementById('hpFill');
  const xpText = document.getElementById('xpText');
  const xpFill = document.getElementById('xpFill');
  const statStreak = document.getElementById('statStreak');
  const statQuests = document.getElementById('statQuests');
  const statWeek = document.getElementById('statWeek');
  const statCol = document.getElementById('statCol');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  const panelContent = document.getElementById('panelContent');
  const notification = document.getElementById('notification');
  const notifMsg = document.getElementById('notifMsg');
  const contextMenu = document.getElementById('contextMenu');
  const addHabitModal = document.getElementById('addHabitModal');
  const habitInputModal = document.getElementById('habitInputModal');

  function setDateLabel() {
    const d = new Date();
    const days = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
    const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    dateLabel.textContent = `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function renderHeader() {
    const today = todayKey();
    const week = isoWeekKey();
    const dailyDone = state.habitos.filter(h => h.done[today]).length;
    const weeklyDone = state.weekly.filter(w => w.done[week]).length;
    const lv = calcLevel(state.totalXp);
    lvNum.textContent = lv.level;
    statStreak.textContent = state.streak;
    statQuests.textContent = `${dailyDone}/${state.habitos.length}`;
    statWeek.textContent = `${weeklyDone}/${state.weekly.length}`;
    statCol.textContent = state.col;
    xpText.textContent = `${lv.currentLevelXp}/${lv.neededForNext}`;
    xpFill.style.width = `${(lv.currentLevelXp/lv.neededForNext)*100}%`;
    const hpPct = calcHpPct();
    hpText.textContent = `${hpPct}/100`;
    hpFill.style.width = `${hpPct}%`;
  }

  function renderQuestItem(task, opts) {
    const done = !!task.done[opts.periodKey];
    const completion = getCompletion(task, opts.periodKey);
    const wrap = document.createElement('div');
    const el = document.createElement('div');
    el.className = 'quest' + (done ? ' completed' : '') + (opts.isWeekly ? ' weekly' : '');
    el.dataset.taskId = task.id;
    el.dataset.listKey = opts.listKey;

    const ring = document.createElement('div');
    ring.className = 'check-ring';

    const txt = document.createElement('div');
    txt.className = 'quest-text';
    txt.dataset.isEditable = opts.allowDelete ? '1' : '0';

    const textSpan = document.createElement('span');
    textSpan.className = 'editable-text';
    textSpan.textContent = task.text;
    textSpan.dataset.taskId = task.id;
    textSpan.dataset.listKey = opts.listKey;
    textSpan.addEventListener('contextmenu', (e) => showContextMenu(e, task.id, opts.listKey));
    txt.appendChild(textSpan);

    if (done && completion && completion.tierId) {
      const badge = document.createElement('span');
      badge.className = 'tier-badge';
      badge.textContent = completion.label || completion.tierId;
      txt.appendChild(badge);
    }

    const gains = document.createElement('div');
    gains.className = 'gains';
    const showGains = (done && completion) ? completion.gains : task.gains;
    Object.entries(showGains || {}).forEach(([stat, val]) => {
      const chip = document.createElement('span');
      chip.className = `gain-chip gain-${stat}`;
      chip.textContent = `${stat}+${val}`;
      gains.appendChild(chip);
    });

    el.appendChild(ring);
    el.appendChild(txt);
    el.appendChild(gains);

    if (opts.allowDelete) {
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.title = 'Eliminar';
      del.textContent = '✕';
      del.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(opts.listKey, task.id); });
      el.appendChild(del);
    }

    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn') || e.target.closest('.editable-text')) return;
      toggleQuest(opts.listKey, opts.periodKey, task.id);
    });

    wrap.appendChild(el);
    return wrap;
  }

  function renderQuestList(list, opts) {
    const wrap = document.createElement('div');
    wrap.className = 'quest-list';
    list.forEach(task => wrap.appendChild(renderQuestItem(task, opts)));
    return wrap;
  }

  function renderHabitos() {
    panelTitle.textContent = 'DAILY QUESTS';
    panelSubtitle.textContent = 'Misiones del día';
    panelContent.innerHTML = '';
    const today = todayKey();
    const week = isoWeekKey();

    const dHeader = document.createElement('div');
    dHeader.className = 'section-header';
    dHeader.innerHTML = `
      <span class="section-label">⟦ DAILY ⟧</span>
      <div class="section-line"></div>
      <span class="section-meta">${state.habitos.filter(h => h.done[today]).length}/${state.habitos.length}</span>
    `;
    panelContent.appendChild(dHeader);
    panelContent.appendChild(renderQuestList(state.habitos, { listKey: 'habitos', periodKey: today, isWeekly: false, allowDelete: true }));

    const wHeader = document.createElement('div');
    wHeader.className = 'section-header weekly';
    wHeader.innerHTML = `
      <span class="section-label gold">⟦ WEEKLY ⟧</span>
      <div class="section-line gold"></div>
      <span class="section-meta">${state.weekly.filter(w => w.done[week]).length}/${state.weekly.length} esta semana</span>
    `;
    panelContent.appendChild(wHeader);
    panelContent.appendChild(renderQuestList(state.weekly, { listKey: 'weekly', periodKey: week, isWeekly: true, allowDelete: true }));

    const formDiv = document.createElement('div');
    formDiv.className = 'add-task-form';
    const btn = document.createElement('button');
    btn.className = 'add-btn';
    btn.textContent = '+ ADD QUEST';
    btn.addEventListener('click', showAddModal);
    formDiv.appendChild(btn);
    panelContent.appendChild(formDiv);

    panelContent.appendChild(renderFooter('habitos'));
  }

  function renderTrabajo() {
    panelTitle.textContent = 'WORK MISSIONS';
    panelSubtitle.textContent = 'Tareas de trabajo';
    panelContent.innerHTML = '';
    const today = todayKey();

    if (state.trabajo.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-icon">⚔</div>
        <div class="empty-text">⟦ NO ACTIVE QUESTS ⟧</div>
        <div class="empty-sub">Agregá tareas de trabajo para empezar tu jornada.</div>
      `;
      panelContent.appendChild(empty);
    } else {
      panelContent.appendChild(renderQuestList(state.trabajo, { listKey: 'trabajo', periodKey: today, isWeekly: false, allowDelete: true }));
    }

    const form = document.createElement('div');
    form.className = 'add-task-form';
    form.innerHTML = `
      <input type="text" class="add-task-input" id="taskInput" placeholder="Nueva misión... (ej: Revisar PR #42)" maxlength="80">
      <button class="add-btn" id="addBtn">+ ADD</button>
    `;
    panelContent.appendChild(form);
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    panelContent.appendChild(renderFooter('trabajo'));
  }

  function renderFooter(tabKey) {
    const today = todayKey();
    const week = isoWeekKey();
    let text = '';
    if (tabKey === 'habitos') {
      const dDone = state.habitos.filter(t => t.done[today]).length;
      const wDone = state.weekly.filter(t => t.done[week]).length;
      text = `${dDone}/${state.habitos.length} DAY · ${wDone}/${state.weekly.length} WEEK`;
    } else {
      const done = state.trabajo.filter(t => t.done[today]).length;
      text = `${done}/${state.trabajo.length} COMPLETE`;
    }
    const f = document.createElement('div');
    f.className = 'footer-actions';
    f.innerHTML = `
      <div class="progress-text">${text}</div>
      <button class="reset-btn" id="resetBtn">⟲ RESET DAY</button>
    `;
    f.querySelector('#resetBtn').addEventListener('click', () => {
      if (!confirm('¿Resetear el progreso de hoy? Se quitarán los checks y los stats que ganaste hoy se descontarán.')) return;
      [...state.habitos, ...state.trabajo].forEach(t => {
        if (t.done[today]) {
          const c = getCompletion(t, today);
          if (c) {
            applyGains(c.gains, -1);
            state.totalXp = Math.max(0, state.totalXp - (c.xp || 0));
            state.col = Math.max(0, state.col - (c.xp || 0));
          }
          delete t.done[today];
        }
      });
      saveState();
      renderAll();
    });
    return f;
  }

  function renderPersonaje() {
    panelTitle.textContent = 'CHARACTER STATUS';
    panelSubtitle.textContent = 'Atributos del jugador';

    const totalPoints = STAT_KEYS.reduce((s, k) => s + state.stats[k], 0);
    const sorted = STAT_KEYS.slice().sort((a, b) => state.stats[b] - state.stats[a]);
    const top1 = sorted[0], top2 = sorted[1];

    const COMBO = {
      'STR+CON': { name: 'PALADIN', tag: 'Tanque ofensivo. Escudo y espada' },
      'STR+DEX': { name: 'DUELIST', tag: 'Espadachín ágil al estilo Kirito' },
      'STR+VOL': { name: 'CRUSADER', tag: 'Guerrero con propósito' },
      'STR+INT': { name: 'BATTLE MAGE', tag: 'Hechicero de guerra' },
      'DEX+CON': { name: 'RANGER', tag: 'Cazador resistente, explorador' },
      'DEX+INT': { name: 'ASSASSIN', tag: 'Veneno y precisión calculada' },
      'INT+VOL': { name: 'ARCHMAGE', tag: 'Mente afilada con voluntad de hierro' }
    };

    const SOLO = {
      STR: { name: 'BERSERKER', tag: 'Pura fuerza bruta' },
      DEX: { name: 'SCOUT', tag: 'Velocidad, sigilo, precisión' },
      CON: { name: 'GUARDIAN', tag: 'Resistencia inquebrantable' },
      INT: { name: 'MAGE', tag: 'Conocimiento profundo' },
      VOL: { name: 'MONK', tag: 'Disciplina y dominio interior' },
      CHA: { name: 'BARD', tag: 'Voz que mueve corazones' }
    };

    let klass;
    if (totalPoints === 0) {
      klass = { name: 'BEGINNER', tag: 'Tu camino recién empieza' };
    } else if (state.stats[top2] === 0 || state.stats[top2] < state.stats[top1] * 0.4) {
      klass = SOLO[top1];
    } else {
      const key = [top1, top2].sort().join('+');
      klass = COMBO[key] || SOLO[top1];
    }

    panelContent.innerHTML = `
      <div class="character-grid">
        <div class="radar-card">
          <div class="radar-title">⟦ STAT MATRIX ⟧</div>
          <canvas id="radarCanvas"></canvas>
        </div>
        <div class="stats-list" id="statsList"></div>
      </div>
      <div class="character-summary">
        <div class="summary-class">⟦ ${klass.name} ⟧</div>
        <div class="summary-tagline">${klass.tag}</div>
      </div>
    `;

    const statsList = document.getElementById('statsList');
    STAT_KEYS.forEach(k => {
      const pts = state.stats[k];
      const t = tierFor(pts);
      const row = document.createElement('div');
      row.className = `stat-row ${k}`;
      const nextTier = TIERS[TIERS.findIndex(x => x.t === t.tier) + 1];
      row.innerHTML = `
        <div class="stat-row-top">
          <div class="stat-name-block">
            <span class="stat-code">${k}</span>
          </div>
          <div class="stat-tier">RANK ${t.tier}</div>
        </div>
        <div class="stat-row-bar"><div class="stat-row-fill" style="width: ${t.pctToNext}%"></div></div>
        <div class="stat-row-foot">
          <span class="stat-points">${pts} PTS</span>
        </div>
      `;
      statsList.appendChild(row);
    });

    drawRadar();
  }

  function drawRadar() {
    const canvas = document.getElementById('radarCanvas');
    if (!canvas) return;
    if (radarChart) radarChart.destroy();
    const data = STAT_KEYS.map(k => state.stats[k]);
    const maxData = Math.max(20, Math.max(...data) * 1.2);
    radarChart = new Chart(canvas, {
      type: 'radar',
      data: {
        labels: STAT_KEYS,
        datasets: [{
          data, fill: true,
          backgroundColor: 'rgba(77, 208, 225, 0.25)',
          borderColor: 'rgba(77, 208, 225, 0.9)',
          borderWidth: 2,
          pointBackgroundColor: '#ffc107',
          pointBorderColor: '#fff',
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            min: 0, max: maxData,
            angleLines: { color: 'rgba(77, 208, 225, 0.25)' },
            grid: { color: 'rgba(77, 208, 225, 0.18)' }
          }
        }
      }
    });
  }

  function renderAll() {
    renderHeader();
    if (currentTab === 'habitos') renderHabitos();
    else if (currentTab === 'trabajo') renderTrabajo();
    else if (currentTab === 'personaje') renderPersonaje();
  }

  // ACTIONS
  function toggleQuest(listKey, periodKey, id) {
    const task = state[listKey].find(t => t.id === id);
    if (!task) return;
    const wasDone = !!task.done[periodKey];

    if (wasDone) {
      const c = getCompletion(task, periodKey);
      if (c) {
        applyGains(c.gains, -1);
        state.totalXp = Math.max(0, state.totalXp - (c.xp || 0));
        state.col = Math.max(0, state.col - (c.xp || 0));
      }
      delete task.done[periodKey];
    } else {
      task.done[periodKey] = true;
      const prevLevel = calcLevel(state.totalXp).level;
      state.totalXp += (task.xp || 0);
      state.col += (task.xp || 0);
      applyGains(task.gains, 1);
      const newLevel = calcLevel(state.totalXp).level;

      playSwordSlash();

      const gainStrs = Object.entries(task.gains || {}).map(([k, v]) => `${k}+${v}`).join(' ');
      showNotif(`+${task.xp} EXP · ${gainStrs}`);

      if (newLevel > prevLevel) afterLevelUp(newLevel);
      checkAllDone(listKey, periodKey);
    }
    openTierFor = null;
    saveState();
    renderAll();
  }

  function afterLevelUp(newLevel) {
    setTimeout(() => {
      playLevelUp();
      showNotif(`★ LEVEL UP! → LV.${newLevel}`);
      document.getElementById('mainPanel').classList.add('level-up');
      setTimeout(() => document.getElementById('mainPanel').classList.remove('level-up'), 2400);
    }, 700);
  }

  function checkAllDone(listKey, periodKey) {
    const list = state[listKey];
    if (list.length === 0) return;
    const allDone = list.every(t => t.done[periodKey]);
    if (allDone) {
      const msg = listKey === 'weekly' ? '⟦ ALL WEEKLY QUESTS CLEARED ⟧' :
                  listKey === 'habitos' ? '⟦ ALL DAILY QUESTS CLEARED ⟧' :
                  '⟦ ALL MISSIONS CLEARED ⟧';
      setTimeout(() => {
        playAllComplete();
        showNotif(msg);
      }, 1300);
    }
  }

  function deleteTask(listKey, id) {
    state[listKey] = state[listKey].filter(t => t.id !== id);
    saveState();
    renderAll();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    state.trabajo.push({ id: 't' + Date.now(), text, xp: 15, gains: { INT: 1 }, done: {} });
    input.value = '';
    saveState();
    renderAll();
  }

  function showNotif(msg) {
    notifMsg.textContent = msg;
    notification.classList.add('show');
    clearTimeout(notification._t);
    notification._t = setTimeout(() => notification.classList.remove('show'), 2400);
  }

  // MODAL FUNCTIONS
  function showAddModal() {
    habitInputModal.value = '';
    addHabitModal.classList.add('show');
    habitInputModal.focus();
  }

  function closeAddModal() {
    addHabitModal.classList.remove('show');
  }

  function addHabitDaily() {
    const text = habitInputModal.value.trim();
    if (!text) return;
    state.habitos.push({ id: 'h' + Date.now(), text, xp: 10, gains: { VOL: 1 }, done: {} });
    closeAddModal();
    saveState();
    renderAll();
  }

  function addHabitWeekly() {
    const text = habitInputModal.value.trim();
    if (!text) return;
    state.weekly.push({ id: 'w' + Date.now(), text, xp: 25, gains: { STR: 2, CON: 1 }, done: {} });
    closeAddModal();
    saveState();
    renderAll();
  }

  // CONTEXT MENU & INLINE EDIT
  function showContextMenu(e, taskId, listKey) {
    e.preventDefault();
    contextTaskId = taskId;
    contextListKey = listKey;
    const menu = document.getElementById('contextMenu');
    menu.style.top = (e.clientY) + 'px';
    menu.style.left = (e.clientX) + 'px';
    menu.classList.add('show');
  }

  function confirmDeleteTask() {
    if (contextTaskId && contextListKey) {
      deleteTask(contextListKey, contextTaskId);
      contextMenu.classList.remove('show');
      contextTaskId = null;
      contextListKey = null;
    }
  }

  function startInlineEdit() {
    if (!contextTaskId || !contextListKey) return;
    const task = state[contextListKey].find(t => t.id === contextTaskId);
    if (!task) return;

    const span = document.querySelector(`.editable-text[data-task-id="${contextTaskId}"]`);
    if (!span) return;

    const input = document.createElement('input');
    input.className = 'inline-edit';
    input.type = 'text';
    input.value = task.text;
    input.maxLength = 80;

    span.replaceWith(input);
    input.focus();
    input.select();

    function saveEdit() {
      const newText = input.value.trim();
      if (newText && newText !== task.text) {
        task.text = newText;
        saveState();
      }
      contextMenu.classList.remove('show');
      renderAll();
    }

    input.addEventListener('blur', saveEdit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveEdit();
      if (e.key === 'Escape') {
        contextMenu.classList.remove('show');
        renderAll();
      }
    });
  }

  // TABS
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      openTierFor = null;
      renderAll();
    });
  });

  // CLOSE MODAL / CONTEXT MENU
  document.addEventListener('click', (e) => {
    if (e.target.closest('.modal-box')) return;
    if (addHabitModal.classList.contains('show') && !e.target.closest('.modal-box')) {
      closeAddModal();
    }
    if (contextMenu.classList.contains('show') && !e.target.closest('.context-menu') && !e.target.closest('.editable-text')) {
      contextMenu.classList.remove('show');
    }
  });

  // INIT
  setDateLabel();
  updateStreakOnLoad();
  renderAll();
</script>

</body>
</html>
