  "name": "Habit Tracker Rpg",
  "schemaVersion": 1,
  "description": "Habit tracker estilo Solo Leveling / SAO. Crear, editar y eliminar hábitos con selector de STATS y modo ÚNICO o POR SESIÓN (tiers). Sistema de XP, nivel, racha y notificaciones de level up."

<html lang="es">
<head>
<meta charset="UTF-8">
<title>SAO MENU // Daily Quests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --sao-cyan: #4dd0e1;
    --sao-cyan-bright: #80deea;
    --sao-cyan-deep: #00b8d4;
    --sao-gold: #ffc107;
    --sao-gold-soft: #ffd54f;
    --sao-bg-deep: #061a2b;
    --sao-bg-mid: #0d2942;
    --sao-bg-soft: #163a55;
    --sao-text: #e0f7fa;
    --sao-text-dim: #7ba7c0;
    --sao-green: #76ff03;
    --sao-green-bar: #64dd17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #1a4566 0%, #0a2440 40%, #04111d 100%);
    color: var(--sao-text);
    min-height: 100vh;
    padding: 18px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 60%, rgba(128,222,234,0.5), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,215,100,0.3), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 10% 70%, rgba(128,222,234,0.4), transparent);
    background-size: 600px 600px;
    pointer-events: none; z-index: 0;
    animation: drift 60s linear infinite;
  }
  @keyframes drift { 0% { background-position: 0 0; } 100% { background-position: 600px 600px; } }

  body::after {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(77,208,225,0.06), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255,193,7,0.04), transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; }

  /* STATUS PANEL */
  .status-panel {
    background: linear-gradient(180deg, rgba(13,41,66,0.85), rgba(6,26,43,0.92));
    border: 1px solid var(--sao-cyan); border-radius: 6px; margin-bottom: 14px;
    box-shadow: 0 0 0 1px rgba(77,208,225,0.2), 0 0 24px rgba(77,208,225,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .status-top-bar {
    background: linear-gradient(90deg, rgba(77,208,225,0.25) 0%, rgba(77,208,225,0.05) 50%, rgba(77,208,225,0.25) 100%);
    border-bottom: 1px solid rgba(77,208,225,0.5);
    padding: 6px 16px; display: flex; justify-content: space-between; align-items: center;
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px;
    color: var(--sao-cyan-bright); text-shadow: 0 0 8px var(--sao-cyan);
  }
  .blink-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--sao-green); box-shadow: 0 0 8px var(--sao-green);
    margin-right: 6px; vertical-align: middle;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .sound-toggle {
    background: transparent; border: 1px solid rgba(77,208,225,0.4); color: var(--sao-cyan-bright);
    cursor: pointer; font-size: 14px; padding: 2px 7px; border-radius: 3px; transition: all 0.2s; line-height: 1; letter-spacing: 0;
  }
  .sound-toggle:hover { background: rgba(77,208,225,0.15); border-color: var(--sao-cyan); box-shadow: 0 0 8px rgba(77,208,225,0.4); }
  .sound-toggle.muted { opacity: 0.45; }

  .status-body { padding: 14px 18px 16px; }
  .player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .avatar-frame {
    width: 44px; height: 44px; border: 2px solid var(--sao-cyan); border-radius: 50%;
    background: linear-gradient(135deg, rgba(77,208,225,0.25), rgba(255,193,7,0.15));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700;
    color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold); flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(6,26,43,1), 0 0 0 3px rgba(77,208,225,0.5), 0 0 14px rgba(77,208,225,0.4);
    cursor: pointer; position: relative; overflow: hidden;
  }
  .avatar-frame:hover::after {
    content: '📷'; position: absolute; inset: 0; background: rgba(4,17,29,0.72);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; border-radius: 50%;
  }
  .avatar-frame img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    display: block;
  }
  #avatarInput { display: none; }
  .player-info-wrap { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
  .player-info-wrap .player-info { flex: 1; min-width: 0; }
  .player-edit-btn { background: transparent; border: 1px solid rgba(77,208,225,0.4); color: var(--sao-cyan-bright); cursor: pointer; width: 22px; height: 22px; border-radius: 3px; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; opacity: 0; flex-shrink: 0; }
  .player-row:hover .player-edit-btn { opacity: 1; }
  .player-edit-btn:hover { background: rgba(77,208,225,0.18); }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #fff;
    letter-spacing: 1px; text-shadow: 0 0 8px var(--sao-cyan), 0 0 2px #fff; line-height: 1.1;
  }
  .player-tag { font-size: 11px; color: var(--sao-gold-soft); letter-spacing: 3px; margin-top: 2px; text-transform: uppercase; }
  .lvl-pill {
    background: linear-gradient(135deg, rgba(255,193,7,0.2), rgba(255,193,7,0.05));
    border: 1px solid var(--sao-gold); color: var(--sao-gold-soft);
    padding: 4px 12px; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; text-shadow: 0 0 6px var(--sao-gold); border-radius: 3px; flex-shrink: 0;
  }
  .bars-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .bar-block { display: flex; flex-direction: column; gap: 3px; }
  .bar-label { display: flex; justify-content: space-between; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-text-dim); }
  .bar-name { color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan); }
  .bar-track { height: 7px; background: rgba(0,10,20,0.85); border: 1px solid rgba(77,208,225,0.4); border-radius: 2px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.6); }
  .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); position: relative; }
  .bar-fill.hp { background: linear-gradient(180deg, #b9f6ca, var(--sao-green-bar) 50%, #33691e); box-shadow: 0 0 6px var(--sao-green); }
  .bar-fill.exp { background: linear-gradient(180deg, #fff176, #fdd835 50%, #f9a825); box-shadow: 0 0 6px #fdd835; }
  .bar-fill.mp { background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep)); box-shadow: 0 0 6px var(--sao-cyan); }
  .bar-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 40%); }

  .micro-stats { display: flex; gap: 14px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(77,208,225,0.18); }
  .micro { flex: 1; text-align: center; }
  .micro-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-text-dim); margin-bottom: 2px; }
  .micro-value { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--sao-cyan-bright); text-shadow: 0 0 8px var(--sao-cyan); }
  .micro-value.gold { color: var(--sao-gold-soft); text-shadow: 0 0 8px var(--sao-gold); }

  /* TABS */
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid rgba(77,208,225,0.4); flex-wrap: wrap; }
  .tab {
    flex: 1; background: linear-gradient(180deg, rgba(13,41,66,0.4), rgba(6,26,43,0.7));
    border: 1px solid rgba(77,208,225,0.25); border-bottom: none;
    color: var(--sao-text-dim); padding: 11px 14px;
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.25s; text-align: center; border-radius: 6px 6px 0 0;
  }
  .tab + .tab { margin-left: 3px; }
  .tab:hover:not(.active) { color: var(--sao-cyan-bright); border-color: rgba(77,208,225,0.5); background: linear-gradient(180deg, rgba(13,41,66,0.6), rgba(6,26,43,0.85)); }
  .tab.active {
    color: #fff; background: linear-gradient(180deg, rgba(77,208,225,0.25), rgba(13,41,66,0.95));
    border-color: var(--sao-cyan); text-shadow: 0 0 10px var(--sao-cyan), 0 0 2px #fff;
    box-shadow: 0 -2px 16px rgba(77,208,225,0.35), inset 0 -2px 0 var(--sao-gold);
  }

  /* MAIN PANEL */
  .panel {
    background: linear-gradient(180deg, rgba(13,41,66,0.92), rgba(6,26,43,0.95));
    border: 1px solid var(--sao-cyan); border-top: none; border-radius: 0 0 6px 6px;
    padding: 18px 22px 22px;
    box-shadow: 0 0 0 1px rgba(77,208,225,0.2), 0 6px 30px rgba(77,208,225,0.18);
    min-height: 380px;
  }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 12px; margin-bottom: 16px;
    border-bottom: 1px solid rgba(77,208,225,0.3); position: relative;
  }
  .panel-header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 60px; height: 1px;
    background: var(--sao-gold); box-shadow: 0 0 6px var(--sao-gold);
  }
  .panel-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 4px; text-shadow: 0 0 8px var(--sao-cyan); }
  .panel-subtitle { font-size: 12px; color: var(--sao-text-dim); letter-spacing: 2px; font-family: 'Cinzel', serif; }

  .section-header { display: flex; align-items: center; gap: 10px; margin: 4px 0 10px; }
  .section-header.weekly { margin-top: 22px; }
  .section-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan); white-space: nowrap; }
  .section-label.gold { color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold); }
  .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(77,208,225,0.5), rgba(77,208,225,0.05)); }
  .section-line.gold { background: linear-gradient(90deg, rgba(255,193,7,0.5), rgba(255,193,7,0.05)); }
  .section-meta { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-text-dim); letter-spacing: 1px; }

  /* ADD HABIT BUTTON in section header */
  .add-habit-btn {
    background: transparent; border: 1px solid rgba(77,208,225,0.5); color: var(--sao-cyan-bright);
    width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
    font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; font-family: 'Cinzel', serif;
  }
  .add-habit-btn:hover { background: rgba(77,208,225,0.2); box-shadow: 0 0 10px rgba(77,208,225,0.5); }
  .add-habit-btn.gold { border-color: rgba(255,193,7,0.5); color: var(--sao-gold-soft); }
  .add-habit-btn.gold:hover { background: rgba(255,193,7,0.15); box-shadow: 0 0 10px rgba(255,193,7,0.4); }
  .bulk-btn { background: transparent; border: 1px solid; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1px; padding: 3px 8px; cursor: pointer; border-radius: 3px; transition: all 0.2s; white-space: nowrap; }
  .bulk-btn.mark   { border-color: rgba(77,208,225,0.4); color: var(--sao-cyan-bright); }
  .bulk-btn.mark:hover { background: rgba(77,208,225,0.15); }
  .bulk-btn.unmark { border-color: rgba(255,100,100,0.35); color: #ff9090; }
  .bulk-btn.unmark:hover { background: rgba(255,80,80,0.12); }

  /* QUEST LIST */
  .quest-list { display: flex; flex-direction: column; gap: 8px; }
  /* XP FLOAT */
  .xp-float {
    position: fixed; left: 50%; top: 42%;
    transform: translateX(-50%);
    text-align: center; pointer-events: none;
    z-index: 9999;
    animation: xp-float-up 1.3s ease forwards;
  }
  .xp-float-pct { font-size: 16px; font-weight: 400; color: rgba(255,193,7,0.65); letter-spacing: 1px; }
  .xp-float-xp {
    font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700;
    color: var(--sao-gold); letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(255,193,7,0.9), 0 0 36px rgba(255,193,7,0.4);
  }
  .xp-float-gains {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 8px; flex-wrap: wrap;
  }
  .xp-float-chip {
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
    padding: 4px 10px; border-radius: 3px; border: 1px solid;
  }
  .xf-STR { color: #ff8a80; border-color: rgba(255,138,128,0.5); background: rgba(255,138,128,0.15); text-shadow: 0 0 8px rgba(255,138,128,0.6); }
  .xf-DEX { color: #b9f6ca; border-color: rgba(185,246,202,0.5); background: rgba(185,246,202,0.15); text-shadow: 0 0 8px rgba(185,246,202,0.6); }
  .xf-CON { color: #ffd180; border-color: rgba(255,209,128,0.5); background: rgba(255,209,128,0.15); text-shadow: 0 0 8px rgba(255,209,128,0.6); }
  .xf-INT { color: #82b1ff; border-color: rgba(130,177,255,0.5); background: rgba(130,177,255,0.15); text-shadow: 0 0 8px rgba(130,177,255,0.6); }
  .xf-VOL { color: #e040fb; border-color: rgba(224,64,251,0.5); background: rgba(224,64,251,0.15); text-shadow: 0 0 8px rgba(224,64,251,0.6); }
  .xf-CHA { color: #ff8a65; border-color: rgba(255,138,101,0.5); background: rgba(255,138,101,0.15); text-shadow: 0 0 8px rgba(255,138,101,0.6); }
  @keyframes xp-float-up {
    0%   { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.82); }
    18%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
    65%  { opacity: 1; transform: translateX(-50%) translateY(-44px) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-72px) scale(0.96); }
  }

  .quest-completing {
    animation: quest-complete-exit 0.32s ease forwards;
    pointer-events: none;
  }
  @keyframes quest-complete-exit {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    35%  { opacity: 0.7; transform: translateY(4px) scale(0.99); }
    100% { opacity: 0; transform: translateY(14px) scale(0.98); }
  }

  .quest-done-separator {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 0 2px;
  }
  .quest-done-separator::before,
  .quest-done-separator::after {
    content: ''; flex: 1; height: 1px; background: rgba(118,255,3,0.15);
  }
  .quest-done-separator-label {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px;
    color: var(--sao-green); opacity: 0.65; white-space: nowrap;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: rgba(77,208,225,0.04);
    border: 1px solid rgba(77,208,225,0.2);
    border-radius: 5px;
    padding: 8px 12px 10px;
    margin: 0 0 14px;
  }
  .progress-bar-wrap.weekly {
    background: rgba(255,193,7,0.04);
    border-color: rgba(255,193,7,0.2);
  }
  .progress-bar-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-bar-label {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px;
    color: var(--sao-cyan); opacity: 0.75;
  }
  .progress-bar-label.weekly { color: var(--sao-gold); }
  .progress-bar-pct {
    font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
    color: var(--sao-cyan); letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(77,208,225,0.7);
  }
  .progress-bar-pct.weekly { color: var(--sao-gold); text-shadow: 0 0 12px rgba(255,193,7,0.7); }
  .progress-bar-pct.complete { color: var(--sao-green); text-shadow: 0 0 14px rgba(118,255,3,0.9); }
  .progress-bar-track {
    height: 10px;
    background: rgba(0,10,20,0.6);
    border-radius: 5px;
    border: 1px solid rgba(77,208,225,0.12);
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }
  .progress-bar-track.weekly { border-color: rgba(255,193,7,0.12); }
  .progress-bar-fill {
    height: 100%; border-radius: 5px;
    background: linear-gradient(90deg, rgba(77,208,225,0.65), var(--sao-cyan-bright));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px rgba(77,208,225,0.55), 0 0 20px rgba(77,208,225,0.2);
    position: relative; overflow: hidden;
  }
  .progress-bar-fill::after {
    content: '';
    position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: bar-shimmer 2.5s ease-in-out infinite;
  }
  .progress-bar-fill.weekly {
    background: linear-gradient(90deg, rgba(255,193,7,0.65), var(--sao-gold-soft));
    box-shadow: 0 0 10px rgba(255,193,7,0.55), 0 0 20px rgba(255,193,7,0.2);
  }
  .progress-bar-fill.complete {
    background: linear-gradient(90deg, rgba(118,255,3,0.8), var(--sao-green));
    box-shadow: 0 0 14px var(--sao-green), 0 0 30px rgba(118,255,3,0.35);
    animation: bar-flash 0.8s ease;
  }
  @keyframes bar-shimmer {
    0% { left: -80%; }
    100% { left: 130%; }
  }
  @keyframes bar-flash {
    0%,100% { box-shadow: 0 0 14px var(--sao-green), 0 0 30px rgba(118,255,3,0.35); }
    50% { box-shadow: 0 0 26px var(--sao-green), 0 0 60px rgba(118,255,3,0.55); }
  }
  .quests-complete-banner {
    margin-top: 9px;
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
    color: var(--sao-green); text-align: center;
    text-shadow: 0 0 12px rgba(118,255,3,0.8);
    animation: complete-pulse 2s ease-in-out infinite;
  }
  .quests-complete-banner.weekly {
    color: var(--sao-gold);
    text-shadow: 0 0 12px rgba(255,193,7,0.8);
    animation: complete-pulse-gold 2s ease-in-out infinite;
  }
  @keyframes complete-pulse {
    0%,100% { opacity: 0.8; text-shadow: 0 0 12px rgba(118,255,3,0.7); }
    50% { opacity: 1; text-shadow: 0 0 22px rgba(118,255,3,1), 0 0 44px rgba(118,255,3,0.4); }
  }
  @keyframes complete-pulse-gold {
    0%,100% { opacity: 0.8; text-shadow: 0 0 12px rgba(255,193,7,0.7); }
    50% { opacity: 1; text-shadow: 0 0 22px rgba(255,193,7,1), 0 0 44px rgba(255,193,7,0.4); }
  }
  .quest {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: linear-gradient(90deg, rgba(22,58,85,0.5), rgba(13,41,66,0.3));
    border: 1px solid rgba(77,208,225,0.25); padding: 10px 14px;
    cursor: pointer; transition: all 0.2s; position: relative; border-radius: 4px;
  }
  .quest::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; background: var(--sao-cyan); box-shadow: 0 0 8px var(--sao-cyan); border-radius: 2px;
  }
  .quest.weekly::before { background: var(--sao-gold); box-shadow: 0 0 8px var(--sao-gold); }
  .quest:hover { background: linear-gradient(90deg, rgba(30,80,110,0.7), rgba(22,58,85,0.4)); border-color: var(--sao-cyan); transform: translateX(3px); box-shadow: 0 0 16px rgba(77,208,225,0.25); }

  .quest.completed { opacity: 0.55; background: linear-gradient(90deg, rgba(118,255,3,0.08), rgba(13,41,66,0.3)); }
  .quest.completed::before { background: var(--sao-green); box-shadow: 0 0 8px var(--sao-green); }
  .quest.completed .quest-text { text-decoration: line-through; color: var(--sao-text-dim); }

  .check-ring {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--sao-cyan);
    background: rgba(0,10,20,0.8); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.25s; position: relative;
  }
  .quest.weekly .check-ring { border-color: var(--sao-gold); }

  .quest.weekly:hover .check-ring { border-color: var(--sao-gold-soft); box-shadow: 0 0 10px var(--sao-gold); }
  .quest.completed .check-ring { border-color: var(--sao-green); background: rgba(118,255,3,0.15); box-shadow: 0 0 12px var(--sao-green); }
  .quest.completed .check-ring::after { content: '✓'; color: var(--sao-green); font-size: 14px; font-weight: 900; text-shadow: 0 0 6px var(--sao-green); }

  .quest-text { flex: 1; font-size: 15px; color: var(--sao-text); letter-spacing: 0.3px; line-height: 1.3; }
  .tier-badge { display: inline-block; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--sao-gold-soft); border: 1px solid rgba(255,193,7,0.5); padding: 1px 5px; margin-left: 6px; border-radius: 2px; vertical-align: middle; }
  .scalable-mark { font-size: 10px; color: var(--sao-gold); letter-spacing: 1px; margin-left: 4px; opacity: 0.7; }

  .gains { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 220px; }
  .gain-chip { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; padding: 3px 7px; border-radius: 2px; border: 1px solid; font-weight: 600; white-space: nowrap; }
  .gain-STR { color: #ff8a80; border-color: rgba(255,138,128,0.5); background: rgba(255,138,128,0.1); }
  .gain-DEX { color: #b9f6ca; border-color: rgba(185,246,202,0.5); background: rgba(185,246,202,0.1); }
  .gain-CON { color: #ffd180; border-color: rgba(255,209,128,0.5); background: rgba(255,209,128,0.1); }
  .gain-INT { color: #82b1ff; border-color: rgba(130,177,255,0.5); background: rgba(130,177,255,0.1); }
  .gain-VOL { color: #ce93d8; border-color: rgba(206,147,216,0.5); background: rgba(206,147,216,0.1); }
  .gain-CHA { color: #ffe082; border-color: rgba(255,224,130,0.5); background: rgba(255,224,130,0.1); }
  /* Class bonus chip — shown next to base gain chip when class boosts that stat */
  .gain-chip-bonus { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.5px; padding:3px 5px; border-radius:2px; border:1px solid; font-weight:700; white-space:nowrap; opacity:0.9; }
  /* Glow on done chips that were class-boosted */
  .gain-chip.cls-boosted { box-shadow:0 0 6px currentColor; font-style:italic; }

  .quest-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
  .quest:hover .quest-actions { opacity: 1; }
  .quest-action-btn {
    background: transparent; border: 1px solid; width: 22px; height: 22px;
    cursor: pointer; font-size: 11px; border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .quest-action-btn.edit { border-color: rgba(77,208,225,0.4); color: var(--sao-cyan-bright); }
  .quest-action-btn.edit:hover { background: rgba(77,208,225,0.18); }
  .quest-action-btn.del { border-color: rgba(255,100,100,0.4); color: #ff6464; }
  .quest-action-btn.del:hover { background: rgba(255,80,80,0.18); }

  .drag-handle { color: rgba(77,208,225,0.3); font-size: 15px; cursor: grab; padding-right: 5px; flex-shrink: 0; user-select: none; touch-action: none; opacity: 0; transition: opacity 0.2s; line-height: 1; }
  .quest:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .quest.dragging { opacity: 0.3; }
  .quest.drag-over-top { box-shadow: 0 -2px 0 var(--sao-cyan), inset 0 0 0 1px rgba(77,208,225,0.2); }
  .quest.drag-over-bottom { box-shadow: 0 2px 0 var(--sao-cyan), inset 0 0 0 1px rgba(77,208,225,0.2); }

  /* TIER SELECTOR */
  .tier-selector {
    background: linear-gradient(180deg, rgba(255,193,7,0.06), rgba(13,41,66,0.5));
    border: 1px solid rgba(255,193,7,0.4); border-left: 3px solid var(--sao-gold);

    display: none; animation: slideDown 0.25s ease-out;
  }
  .tier-selector.show { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .tier-prompt { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-gold-soft); text-shadow: 0 0 4px var(--sao-gold); margin-bottom: 10px; }
  .tier-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  @media (min-width: 600px) { .tier-grid { grid-template-columns: repeat(4, 1fr); } }
  .tier-btn {
    background: rgba(13,41,66,0.7); border: 1px solid rgba(77,208,225,0.4); color: var(--sao-text);
    padding: 8px 6px; cursor: pointer; border-radius: 3px;

    font-family: 'Rajdhani', sans-serif;

  .tier-btn.elite { border-color: rgba(255,193,7,0.6); }
  .tier-btn.elite:hover { background: rgba(255,193,7,0.15); border-color: var(--sao-gold); box-shadow: 0 0 14px rgba(255,193,7,0.5); }
  .tier-btn.sel-tier { background: rgba(77,208,225,0.22); border-color: var(--sao-cyan); box-shadow: 0 0 12px rgba(77,208,225,0.45); }
  .tier-btn.elite.sel-tier { background: rgba(255,193,7,0.2); border-color: var(--sao-gold); box-shadow: 0 0 12px rgba(255,193,7,0.45); }
  .mark-all-info { font-size: 12px; color: var(--sao-text-dim); padding: 8px 12px; background: rgba(77,208,225,0.06); border: 1px solid rgba(77,208,225,0.15); border-radius: 3px; margin-bottom: 14px; }
  .tier-time { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--sao-cyan-bright); text-shadow: 0 0 4px var(--sao-cyan); }
  .tier-btn.elite .tier-time { color: var(--sao-gold-soft); text-shadow: 0 0 4px var(--sao-gold); }
  .tier-gains-line { font-size: 10px; color: var(--sao-text-dim); letter-spacing: 0.5px; text-align: center; line-height: 1.3; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 30px 20px; color: var(--sao-text-dim); }
  .empty-icon { font-size: 38px; margin-bottom: 6px; opacity: 0.6; color: var(--sao-cyan); }
  .empty-text { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; margin-bottom: 4px; color: var(--sao-cyan-bright); }
  .empty-sub { font-size: 13px; color: var(--sao-text-dim); }

  /* ADD TASK FORM (trabajo) */
  .add-task-form { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(77,208,225,0.2); }
  .add-task-input {
    flex: 1; background: rgba(0,10,20,0.8); border: 1px solid rgba(77,208,225,0.4);
    color: var(--sao-text); padding: 9px 12px; font-family: 'Rajdhani', sans-serif; font-size: 14px;
    outline: none; border-radius: 3px; transition: all 0.25s;
  }
  .add-task-input:focus { border-color: var(--sao-cyan); box-shadow: 0 0 12px rgba(77,208,225,0.3); }
  .add-task-input::placeholder { color: rgba(123,167,192,0.6); }
  .add-btn {
    background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep));
    border: 1px solid var(--sao-gold); color: #042430;
    padding: 9px 16px; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; border-radius: 3px; transition: all 0.25s;
  }
  .add-btn:hover { box-shadow: 0 0 16px rgba(77,208,225,0.6), 0 0 4px var(--sao-gold); transform: translateY(-1px); }

  /* FOOTER */
  .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(77,208,225,0.2); }
  .progress-text { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-text-dim); letter-spacing: 2px; }
  .reset-btn { background: transparent; border: 1px solid rgba(255,193,7,0.5); color: var(--sao-gold-soft); padding: 5px 12px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; cursor: pointer; border-radius: 3px; transition: all 0.25s; }
  .reset-btn:hover { background: rgba(255,193,7,0.12); box-shadow: 0 0 10px rgba(255,193,7,0.3); }

  /* PERSONAJE */
  .character-grid { display: grid; grid-template-columns: minmax(260px, 1.35fr) 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 600px) { .character-grid { grid-template-columns: 1fr; } }
  .radar-card { background: linear-gradient(180deg, rgba(22,58,85,0.6), rgba(13,41,66,0.85)); border: 1px solid rgba(77,208,225,0.4); border-radius: 4px; padding: 12px 8px; position: relative; display: flex; flex-direction: column; justify-content: center; }
  .radar-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--sao-gold); box-shadow: 0 0 6px var(--sao-gold); }
  .radar-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--sao-cyan-bright); text-align: center; margin-bottom: 6px; text-shadow: 0 0 6px var(--sao-cyan); }
  #radarCanvas { width: 100% !important; height: 320px !important; }

  .stats-list { display: flex; flex-direction: column; gap: 8px; }
  .stat-row { background: linear-gradient(90deg, rgba(22,58,85,0.55), rgba(13,41,66,0.3)); border: 1px solid rgba(77,208,225,0.25); border-left: 3px solid; padding: 8px 12px; border-radius: 3px; transition: all 0.25s; }
  .stat-row:hover { background: linear-gradient(90deg, rgba(30,80,110,0.7), rgba(22,58,85,0.4)); box-shadow: 0 0 12px rgba(77,208,225,0.2); }
  .stat-row.STR { border-left-color: #ff6b6b; } .stat-row.DEX { border-left-color: #40e0ff; }
  .stat-row.CON { border-left-color: #81c784; } .stat-row.INT { border-left-color: #7b9dff; }
  .stat-row.VOL { border-left-color: #e060f5; } .stat-row.CHA { border-left-color: #ffe57f; }

  .stat-row.STR .stat-code { color: #ff6b6b; text-shadow: 0 0 6px rgba(255,107,107,0.6); }
  .stat-row.DEX .stat-code { color: #40e0ff; text-shadow: 0 0 6px rgba(64,224,255,0.6); }

  .stat-full-name { font-size: 11px; color: var(--sao-text-dim); letter-spacing: 1px; }
  .stat-tier { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold); letter-spacing: 1px; }
  .stat-row-bar { height: 6px; background: rgba(0,10,20,0.8); border: 1px solid rgba(77,208,225,0.3); overflow: hidden; border-radius: 2px; margin-top: 6px; }
  .stat-row-fill { height: 100%; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 6px currentColor; }
  .stat-row.STR .stat-row-fill { background: #ff6b6b; color: #ff6b6b; }
  .stat-row.DEX .stat-row-fill { background: #40e0ff; color: #40e0ff; }
  .stat-row.CON .stat-row-fill { background: #81c784; color: #81c784; }
  .stat-row.INT .stat-row-fill { background: #7b9dff; color: #7b9dff; }
  .stat-row.VOL .stat-row-fill { background: #e060f5; color: #e060f5; }
  .stat-row.CHA .stat-row-fill { background: #ffe57f; color: #ffe57f; }
  .stat-row-foot { display: flex; justify-content: space-between; margin-top: 4px; font-family: 'Cinzel', serif; font-size: 9px; color: var(--sao-text-dim); letter-spacing: 1px; }
  .stat-row { cursor: pointer; }

  .stat-row-wrap { margin-bottom: 8px; }
  .stat-row-wrap .stat-row { margin-bottom: 0; }

  /* STAT DETAIL EXPAND */
  .stat-detail {
    background: rgba(4,17,29,0.7);
    border: 1px solid rgba(77,208,225,0.25); border-top: none;
    border-radius: 0 0 4px 4px; padding: 12px 14px 10px;
    animation: slideDown 0.2s ease-out;
  }
  .stat-detail-sources { font-size: 11px; color: var(--sao-text-dim); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(77,208,225,0.1); line-height: 1.6; }
  .stat-detail-sources strong { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-cyan-bright); display: block; margin-bottom: 3px; }
  .stat-detail-table { width: 100%; border-collapse: collapse; }
  .stat-detail-thead th { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: var(--sao-text-dim); text-align: left; padding: 0 8px 6px 0; border-bottom: 1px solid rgba(77,208,225,0.12); }
  .stat-detail-thead th:last-child { text-align: right; padding-right: 0; }
  .stat-detail-tr.is-current td { background: rgba(77,208,225,0.06); }
  .stat-detail-td { font-family: 'Cinzel', serif; font-size: 11px; padding: 5px 8px 5px 0; vertical-align: middle; border-bottom: 1px solid rgba(77,208,225,0.05); }
  .stat-detail-td:last-child { text-align: right; padding-right: 0; }
  .stat-detail-maxgain { display: flex; align-items: center; gap: 8px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--sao-text-dim); margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(77,208,225,0.1); }
  .stat-points { color: var(--sao-cyan-bright); text-shadow: 0 0 4px var(--sao-cyan); }

  .character-summary { background: linear-gradient(135deg, rgba(255,193,7,0.08), rgba(77,208,225,0.05)); border: 1px solid rgba(255,193,7,0.4); padding: 12px 16px; border-radius: 4px; text-align: center; margin-top: 6px; }
  .summary-class { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 4px; color: var(--sao-gold-soft); text-shadow: 0 0 8px var(--sao-gold); margin-bottom: 4px; }
  .summary-tagline { font-size: 12px; color: var(--sao-text); letter-spacing: 1px; }

  /* COMBAT DERIVED STATS */
  .combat-stats-section { margin-top: 18px; }
  .cstat-category { margin-bottom: 16px; }
  .cstat-cat-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cstat-cat-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--sao-text-dim); white-space: nowrap; }
  .cstat-cat-line { flex: 1; height: 1px; }
  .cstat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  @media (max-width: 600px) { .cstat-grid { grid-template-columns: repeat(2, 1fr); } }
  .cstat-card {
    background: linear-gradient(180deg, rgba(22,58,85,0.55), rgba(13,41,66,0.75));
    border: 1px solid rgba(77,208,225,0.18); border-radius: 4px;
    padding: 9px 8px 8px; text-align: center; position: relative; overflow: hidden;

  .cstat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--cc, #4dd0e1); opacity: 0.6; box-shadow: 0 0 6px var(--cc, #4dd0e1); }
  .cstat-icon { font-size: 15px; line-height: 1; margin-bottom: 3px; }

  .cstat-unit { font-size: 11px; font-weight: 400; opacity: 0.8; }
  .cstat-source { font-size: 8.5px; color: var(--sao-text-dim); margin-top: 3px; opacity: 0.55; letter-spacing: 0.3px; }
  .cstat-zero { opacity: 0.35; }
  .cstat-zero .cstat-value { color: var(--sao-text-dim) !important; text-shadow: none !important; }

  /* NOTIFICATION */
  .notification {
    position: fixed; top: 18px; right: 18px;
    background: linear-gradient(180deg, rgba(13,41,66,0.98), rgba(6,26,43,0.98));
    border: 1px solid var(--sao-cyan); color: #fff; font-family: 'Cinzel', serif;

  .notif-body { padding: 10px 14px; font-size: 13px; letter-spacing: 1px; color: var(--sao-cyan-bright); text-shadow: 0 0 6px var(--sao-cyan); }

  @keyframes lvlFlash {

  @media (max-width: 600px) {
    .player-name { font-size: 17px; }

    .panel-title { font-size: 13px; letter-spacing: 2px; }
    .quest-text { font-size: 14px; }
    .gains { max-width: 110px; }
  }

  /* === LOGROS TAB === */
  .logros-wrap { display: flex; flex-direction: column; gap: 22px; }
  .logro-cat-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logro-cat-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold); white-space: nowrap; }
  .logro-cat-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,193,7,0.4), transparent); }
  .logros-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (min-width: 480px) { .logros-grid { grid-template-columns: repeat(4, 1fr); } }

  .logro-card {
    background: linear-gradient(180deg, rgba(22,58,85,0.6), rgba(13,41,66,0.85));
    border: 1px solid rgba(77,208,225,0.22); border-radius: 5px;
    padding: 12px 8px 10px; cursor: pointer; transition: all 0.22s;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    text-align: center; position: relative;
  }

  .logro-card.tier-1 { border-color: rgba(205,127,50,0.55); }
  .logro-card.tier-2 { border-color: rgba(192,192,192,0.55); }
  .logro-card.tier-3 { border-color: rgba(255,193,7,0.65); box-shadow: 0 0 10px rgba(255,193,7,0.18); }
  .logro-card.tier-4 { border-color: rgba(130,177,255,0.65); box-shadow: 0 0 12px rgba(130,177,255,0.22); }

  .logro-icon { font-size: 24px; line-height: 1; }

  .logro-tier-badge.t0 { color: rgba(123,167,192,0.6); border-color: rgba(123,167,192,0.15); }
  .logro-tier-badge.t1 { color: #cd7f32; border-color: rgba(205,127,50,0.5); background: rgba(205,127,50,0.08); }
  .logro-tier-badge.t2 { color: #c0c0c0; border-color: rgba(192,192,192,0.45); background: rgba(192,192,192,0.08); }
  .logro-tier-badge.t3 { color: var(--sao-gold-soft); border-color: rgba(255,193,7,0.5); background: rgba(255,193,7,0.08); }
  .logro-tier-badge.t4 { color: #82b1ff; border-color: rgba(130,177,255,0.5); background: rgba(130,177,255,0.08); }
  .logro-tier-badge.t5 { color: var(--sao-cyan-bright); border-color: var(--sao-cyan); background: rgba(77,208,225,0.12); text-shadow: 0 0 5px var(--sao-cyan); }

  .logro-prog-wrap { width: 100%; }
  .logro-prog-track { height: 4px; background: rgba(0,10,20,0.8); border: 1px solid rgba(77,208,225,0.18); border-radius: 2px; overflow: hidden; }
  .logro-prog-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .logro-prog-fill.t0,.logro-prog-fill.t1 { background: #cd7f32; }
  .logro-prog-fill.t2 { background: #c0c0c0; }
  .logro-prog-fill.t3 { background: var(--sao-gold); }
  .logro-prog-fill.t4 { background: #82b1ff; }
  .logro-prog-fill.t5 { background: var(--sao-cyan); }
  .logro-prog-label { font-family: 'Cinzel', serif; font-size: 8px; color: var(--sao-text-dim); text-align: center; margin-top: 3px; letter-spacing: 1px; }

  /* Logro summary bar */
  .logros-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 10px 16px; background: rgba(255,193,7,0.06); border: 1px solid rgba(255,193,7,0.25); border-radius: 4px; }
  .logros-summary-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--sao-gold-soft); margin-bottom: 2px; }
  .logros-summary-val { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 0 8px var(--sao-gold); line-height: 1; }
  .logros-summary-sub { font-size: 12px; color: var(--sao-gold-soft); margin-left: 3px; }

  /* Logro detail modal */
  .logro-detail-hdr { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid rgba(77,208,225,0.2); }
  .logro-detail-icon { font-size: 38px; flex-shrink: 0; }
  .logro-detail-name { font-family: 'Cinzel', serif; font-size: 15px; color: #fff; letter-spacing: 2px; margin-bottom: 4px; }
  .logro-detail-desc { font-size: 13px; color: var(--sao-text-dim); letter-spacing: 0.3px; }
  .logro-detail-stat { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; margin-top: 5px; }

  .logro-tier-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 4px; border: 1px solid rgba(77,208,225,0.12); background: rgba(0,10,20,0.35); margin-bottom: 6px; transition: all 0.2s; }
  .logro-tier-row.unlocked { border-color: rgba(255,193,7,0.3); background: rgba(255,193,7,0.04); }
  .logro-tier-row.is-current { border-color: var(--sao-cyan); background: rgba(77,208,225,0.07); box-shadow: 0 0 8px rgba(77,208,225,0.15); }
  .logro-tier-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(77,208,225,0.25); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; color: transparent; }
  .logro-tier-row.unlocked .logro-tier-check { background: rgba(118,255,3,0.15); border-color: var(--sao-green); color: var(--sao-green); box-shadow: 0 0 6px var(--sao-green); }
  .logro-tier-info { flex: 1; min-width: 0; }
  .logro-tier-label { font-family: 'Cinzel', serif; font-size: 11px; color: var(--sao-text-dim); letter-spacing: 1px; }
  .logro-tier-row.unlocked .logro-tier-label { color: var(--sao-gold-soft); }
  .logro-tier-count { font-size: 11px; color: var(--sao-text-dim); margin-top: 2px; opacity: 0.7; }
  .logro-tier-rewards { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .logro-reward-chip { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; border: 1px solid; white-space: nowrap; }
  .logro-reward-stat { color: var(--sao-cyan-bright); border-color: rgba(77,208,225,0.4); background: rgba(77,208,225,0.08); }
  .logro-reward-title { color: var(--sao-gold-soft); border-color: rgba(255,193,7,0.4); background: rgba(255,193,7,0.06); }
  .logro-detail-prog { margin-top: 14px; padding: 10px 14px; background: rgba(77,208,225,0.05); border: 1px solid rgba(77,208,225,0.18); border-radius: 4px; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; color: var(--sao-text-dim); letter-spacing: 2px; }

  /* STREAK BADGE */
  .streak-badge { display: flex; align-items: center; gap: 3px; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; color: var(--sao-gold-soft); text-shadow: 0 0 5px rgba(255,193,7,0.5); flex-shrink: 0; padding: 2px 7px; background: rgba(255,193,7,0.07); border: 1px solid rgba(255,193,7,0.3); border-radius: 3px; letter-spacing: 1px; white-space: nowrap; user-select: none; }
  .streak-badge .streak-fire { font-size: 13px; line-height: 1; filter: drop-shadow(0 0 3px rgba(255,120,0,0.7)); }
  .streak-badge.milestone { background: rgba(255,193,7,0.18); border-color: var(--sao-gold); box-shadow: 0 0 10px rgba(255,193,7,0.45); color: #fff; text-shadow: 0 0 8px var(--sao-gold); }

  /* ── Class synergy highlight ── */
  .quest.cls-synergy:not(.completed) {
    border-left: 2px solid var(--cls-color);
    background: linear-gradient(90deg, var(--cls-tint) 0%, rgba(13,41,66,0.3) 55%) !important;
    box-shadow: -5px 0 22px var(--cls-glow);
  }
  .quest.cls-synergy::before {
    background: var(--cls-color) !important;
    box-shadow: 0 0 12px var(--cls-color) !important;
  }
  .cls-synergy-tag {
    margin-left: auto; font-family: 'Cinzel', serif; font-size: 7px;
    letter-spacing: 1.2px; opacity: 0.55; white-space: nowrap;
    align-self: flex-end; padding-bottom: 1px;
  }

  /* ── 7-day history dots ── */
  .habit-dots {
    flex: 0 0 100%; display: flex; gap: 6px; align-items: flex-end;
    padding-left: 36px; /* align under text, past the ring+gap */
    padding-top: 5px; padding-bottom: 1px;
  }
  .habit-dot-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .habit-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .habit-dot.today:not(.done) { background: rgba(255,255,255,0.04); }
  .habit-dot-label {
    font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 0;
    color: rgba(255,255,255,0.18); line-height: 1; user-select: none;
  }
  /* today = last dot: brighter label */
  .habit-dot-wrap:last-child .habit-dot-label { color: rgba(255,255,255,0.5); font-weight: 700; }

  .quest.streak-milestone { border-color: var(--sao-gold) !important; background: linear-gradient(90deg, rgba(255,193,7,0.10), rgba(13,41,66,0.3)) !important; animation: milestonePulse 2.4s ease-in-out infinite !important; }
  .quest.streak-milestone::before { background: var(--sao-gold) !important; box-shadow: 0 0 12px var(--sao-gold) !important; }
  @keyframes milestonePulse { 0%, 100% { box-shadow: 0 0 14px rgba(255,193,7,0.35); } 50% { box-shadow: 0 0 34px rgba(255,193,7,0.78), 0 0 6px var(--sao-gold); } }

  @keyframes streakFlash7 {
    0%   { box-shadow: none; border-color: rgba(77,208,225,0.25); background: linear-gradient(90deg,rgba(22,58,85,0.5),rgba(13,41,66,0.3)); }
    20%  { box-shadow: 0 0 48px rgba(255,193,7,0.9), inset 0 0 22px rgba(255,193,7,0.22); border-color: var(--sao-gold); background: linear-gradient(90deg,rgba(255,193,7,0.28),rgba(255,193,7,0.09)); }
    80%  { box-shadow: 0 0 48px rgba(255,193,7,0.9), inset 0 0 22px rgba(255,193,7,0.22); border-color: var(--sao-gold); background: linear-gradient(90deg,rgba(255,193,7,0.28),rgba(255,193,7,0.09)); }
    100% { box-shadow: none; border-color: rgba(77,208,225,0.25); background: linear-gradient(90deg,rgba(22,58,85,0.5),rgba(13,41,66,0.3)); }
  }
  .quest.streak-7-flash { animation: streakFlash7 1s ease-in-out 1 !important; pointer-events: none; }

  /* ── AVOID CARD ─────────────────────────────────────────────── */
  .section-label.neg  { color: #ef9a9a; text-shadow: 0 0 6px rgba(239,83,80,0.5); }
  .section-line.neg   { background: linear-gradient(90deg, rgba(239,83,80,0.4), rgba(239,83,80,0.03)); }
  .add-habit-btn.neg  { border-color: rgba(239,83,80,0.5); color: #ef9a9a; }
  .add-habit-btn.neg:hover { background: rgba(239,83,80,0.15); }

  .avoid-card {
    border-left: 3px solid rgba(239,83,80,0.5);
    background: linear-gradient(90deg, rgba(30,6,6,0.55), rgba(13,41,66,0.3));
    border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column;
    gap: 10px; transition: all 0.25s;
  }
  .avoid-card.failed {
    border-left-color: rgba(239,83,80,0.25); opacity: 0.55;
    background: rgba(10,4,4,0.4);
  }
  .avoid-card.avoid-milestone-glow {
    border-left-color: #ef5350;
    box-shadow: 0 0 18px rgba(239,83,80,0.35), inset 0 0 12px rgba(239,83,80,0.06);
  }

  /* Header */
  .avoid-header { display: flex; align-items: flex-start; gap: 10px; }
  .avoid-name-block { flex: 1; min-width: 0; }
  .avoid-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px; color: #ef9a9a; text-shadow: 0 0 8px rgba(239,83,80,0.4); line-height: 1.3; }
  .avoid-penalty { font-size: 10px; color: rgba(239,83,80,0.55); margin-top: 3px; letter-spacing: 0.5px; }

  /* Badge wrapper — badge + adjust link stacked */
  .avoid-badge-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .avoid-adjust-btn {
    font-size: 9px; color: rgba(239,154,154,0.4); background: transparent; border: none;
    cursor: pointer; padding: 0; letter-spacing: 0.3px; white-space: nowrap;
    transition: color 0.18s;
  }
  .avoid-adjust-btn:hover { color: #ef9a9a; }

  /* Streak badge — shield style */
  .avoid-streak-badge {
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 5px 9px; border-radius: 4px; flex-shrink: 0; user-select: none;
    background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.3);
    min-width: 46px;
  }
  .avoid-streak-badge.milestone { background: rgba(239,83,80,0.2); border-color: #ef5350; box-shadow: 0 0 12px rgba(239,83,80,0.5); }
  .avoid-streak-badge.zero { border-color: rgba(255,255,255,0.08); background: transparent; opacity: 0.45; }
  .avoid-streak-icon { font-size: 15px; line-height: 1; }
  .avoid-streak-num  { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: #ef9a9a; letter-spacing: 1px; line-height: 1; }
  .avoid-streak-badge.milestone .avoid-streak-num { color: #fff; text-shadow: 0 0 8px #ef5350; }

  /* Milestone progress */
  .avoid-ms-wrap { display: flex; flex-direction: column; gap: 5px; }
  .avoid-ms-hdr  { display: flex; justify-content: space-between; align-items: center; }
  .avoid-ms-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: rgba(239,154,154,0.45); }
  .avoid-ms-next  { font-size: 10px; color: var(--sao-text-dim); }
  .avoid-ms-next strong { color: #ef9a9a; }
  .avoid-ms-track { height: 5px; background: rgba(0,10,20,0.8); border: 1px solid rgba(239,83,80,0.2); border-radius: 3px; overflow: hidden; }
  .avoid-ms-fill  { height: 100%; background: linear-gradient(90deg, rgba(239,83,80,0.6), #ef5350); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 6px rgba(239,83,80,0.5); }

  /* Awarded milestone chips */
  .avoid-awarded-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .avoid-awarded-chip  { font-size: 10px; color: rgba(239,154,154,0.7); border: 1px solid rgba(239,83,80,0.25); border-radius: 3px; padding: 2px 6px; background: rgba(239,83,80,0.06); }

  /* Relapse / undo buttons */
  .avoid-btn-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .avoid-relapse-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1.5px;
    padding: 6px 12px; border-radius: 3px; cursor: pointer; transition: all 0.2s;
    background: transparent; border: 1px solid rgba(239,83,80,0.4); color: rgba(239,154,154,0.7);
  }
  .avoid-relapse-btn:hover { border-color: #ef5350; color: #ef9a9a; background: rgba(239,83,80,0.1); box-shadow: 0 0 10px rgba(239,83,80,0.3); }
  .avoid-undo-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px;
    padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all 0.2s;
    background: transparent; border: 1px solid rgba(77,208,225,0.25); color: var(--sao-text-dim);
  }
  .avoid-undo-btn:hover { border-color: var(--sao-cyan); color: var(--sao-cyan-bright); }
  .avoid-failed-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: rgba(239,83,80,0.6); flex: 1; }

  @keyframes avoidMilestonePulse {
    0%, 100% { box-shadow: 0 0 10px rgba(239,83,80,0.2); }
    50%       { box-shadow: 0 0 28px rgba(239,83,80,0.55); }
  }
  .avoid-milestone-glow { animation: avoidMilestonePulse 2.5s ease-in-out infinite; }

  /* ── Elite complete overlay ── */
  @keyframes eliteIn {
    0%   { opacity:0; transform:scale(0.88); }
    60%  { opacity:1; transform:scale(1.03); }
    100% { transform:scale(1); }
  }
  @keyframes eliteOut {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.08); }
  }
  @keyframes ecStar {
    0%   { opacity:0; transform:scale(0.4) rotate(-15deg); }
    65%  { transform:scale(1.2) rotate(4deg); }
    100% { opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes ecScan {
    0%   { transform:translateY(-100%); opacity:0.5; }
    100% { transform:translateY(400%);  opacity:0; }
  }
  .elite-complete-overlay {
    position:fixed; inset:0; z-index:9985;
    background:rgba(2,8,18,0.92); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center;
    animation:eliteIn 0.35s cubic-bezier(0.2,0.8,0.3,1) forwards;
    cursor:pointer;
  }
  .elite-complete-overlay.ec-leaving { animation:eliteOut 0.38s ease forwards; }
  .ec-inner {
    display:flex; flex-direction:column; align-items:center; gap:14px;
    text-align:center; padding:40px 48px; border-radius:6px; position:relative; overflow:hidden;
    border:1px solid var(--ec-accent); min-width:240px;
    background:linear-gradient(180deg, var(--ec-glow) 0%, rgba(4,10,20,0.7) 100%);
    box-shadow:0 0 60px var(--ec-glow), 0 0 120px var(--ec-glow), inset 0 0 30px var(--ec-glow);
  }
  .ec-scan {
    position:absolute; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--ec-accent), transparent);
    animation:ecScan 1.1s linear 0.1s 1 forwards; pointer-events:none;
  }
  .ec-eyebrow {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--ec-accent); opacity:0.7;
  }
  .ec-stars {
    font-size:24px; letter-spacing:10px; color:var(--ec-accent);
    text-shadow:0 0 24px var(--ec-accent);
    animation:ecStar 0.5s cubic-bezier(0.2,0.8,0.3,1) 0.15s both;
  }
  .ec-label {
    font-family:'Cinzel',serif; font-size:22px; font-weight:700; letter-spacing:3px;
    color:#fff; text-shadow:0 0 30px var(--ec-accent), 0 0 60px var(--ec-accent);
    line-height:1.2;
  }
  .ec-gains {
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
  }
  .ec-gain-chip {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px;
    padding:3px 8px; border-radius:2px; border:1px solid; font-weight:700;
  }
  .ec-xp {
    font-family:'Cinzel',serif; font-size:16px; letter-spacing:2px;
    color:var(--ec-accent); text-shadow:0 0 12px var(--ec-accent);
  }
  .ec-tap {
    font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px;
    color:rgba(255,255,255,0.2); margin-top:6px;
  }

  /* ===================== MODAL ===================== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(4,17,29,0.88);
    backdrop-filter: blur(4px); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-box {
    background: linear-gradient(180deg, rgba(13,41,66,0.99), rgba(6,26,43,0.99));
    border: 1px solid var(--sao-cyan);
    border-radius: 6px; width: 100%; max-width: 560px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 1px rgba(77,208,225,0.2), 0 0 60px rgba(77,208,225,0.35), 0 0 4px var(--sao-gold);
    transform: translateY(20px); transition: transform 0.25s;
    overflow: hidden;
  }
  .modal-overlay.open .modal-box { transform: translateY(0); }

  .modal-header {
    background: linear-gradient(90deg, rgba(77,208,225,0.2) 0%, rgba(77,208,225,0.04) 60%, rgba(77,208,225,0.2) 100%);
    border-bottom: 1px solid rgba(77,208,225,0.45);
    padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .modal-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px; color: var(--sao-cyan-bright); text-shadow: 0 0 8px var(--sao-cyan); }
  .modal-close { background: transparent; border: 1px solid rgba(77,208,225,0.4); color: var(--sao-cyan-bright); cursor: pointer; width: 26px; height: 26px; border-radius: 3px; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { background: rgba(255,80,80,0.18); border-color: #ff6464; color: #ff9090; }

  .modal-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-track { background: rgba(0,10,20,0.5); }
  .modal-body::-webkit-scrollbar-thumb { background: rgba(77,208,225,0.3); border-radius: 3px; }

  .modal-footer { padding: 12px 20px; border-top: 1px solid rgba(77,208,225,0.2); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

  /* Modal form fields */
  .m-field { margin-bottom: 14px; }
  .m-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: var(--sao-cyan-bright); text-shadow: 0 0 4px var(--sao-cyan); margin-bottom: 6px; display: block; }
  .m-input {
    width: 100%; background: rgba(0,10,20,0.8); border: 1px solid rgba(77,208,225,0.4);
    color: var(--sao-text); padding: 8px 12px; font-family: 'Rajdhani', sans-serif; font-size: 14px;
    outline: none; border-radius: 3px; transition: all 0.2s;
  }
  .m-input:focus { border-color: var(--sao-cyan); box-shadow: 0 0 10px rgba(77,208,225,0.3); }
  .m-input::placeholder { color: rgba(123,167,192,0.5); }
  .m-input.narrow { width: 80px; }

  /* Toggle row (DAILY/WEEKLY, ÚNICO/POR SESIÓN) */
  .m-toggle-row { display: flex; gap: 6px; }
  .m-toggle {
    flex: 1; padding: 8px 10px; background: rgba(0,10,20,0.7); border: 1px solid rgba(77,208,225,0.3);
    color: var(--sao-text-dim); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
    cursor: pointer; border-radius: 3px; text-align: center; transition: all 0.2s;
  }
  .m-toggle:hover { border-color: rgba(77,208,225,0.6); color: var(--sao-cyan-bright); }
  .m-toggle.active {
    background: rgba(77,208,225,0.18); border-color: var(--sao-cyan); color: #fff;
    text-shadow: 0 0 6px var(--sao-cyan); box-shadow: 0 0 10px rgba(77,208,225,0.3);
  }
  .m-toggle.gold-active { background: rgba(255,193,7,0.15); border-color: var(--sao-gold); color: var(--sao-gold-soft); text-shadow: 0 0 6px var(--sao-gold); box-shadow: 0 0 10px rgba(255,193,7,0.3); }

  /* STAT SELECTOR */
  .stat-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  @media (min-width: 500px) { .stat-selector { grid-template-columns: repeat(6, 1fr); } }
  .stat-sel-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: rgba(0,10,20,0.6); border: 1px solid rgba(77,208,225,0.2); border-radius: 4px; padding: 6px 4px; cursor: pointer; transition: all 0.2s; }
  .stat-sel-item:hover { border-color: rgba(77,208,225,0.5); }
  .stat-sel-item.on { border-color: var(--sao-cyan); background: rgba(77,208,225,0.12); }
  .stat-sel-item.on.STR { border-color: #ff8a80; background: rgba(255,138,128,0.1); }
  .stat-sel-item.on.DEX { border-color: #b9f6ca; background: rgba(185,246,202,0.1); }
  .stat-sel-item.on.CON { border-color: #ffd180; background: rgba(255,209,128,0.1); }
  .stat-sel-item.on.INT { border-color: #82b1ff; background: rgba(130,177,255,0.1); }
  .stat-sel-item.on.VOL { border-color: #ce93d8; background: rgba(206,147,216,0.1); }
  .stat-sel-item.on.CHA { border-color: #ffe082; background: rgba(255,224,130,0.1); }
  .stat-sel-code { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .stat-sel-item.STR .stat-sel-code { color: #ff8a80; } .stat-sel-item.DEX .stat-sel-code { color: #b9f6ca; }
  .stat-sel-item.CON .stat-sel-code { color: #ffd180; } .stat-sel-item.INT .stat-sel-code { color: #82b1ff; }
  .stat-sel-item.VOL .stat-sel-code { color: #ce93d8; } .stat-sel-item.CHA .stat-sel-code { color: #ffe082; }
  .stat-sel-amt { display: flex; align-items: center; gap: 2px; }
  .stat-sel-btn { background: transparent; border: none; color: var(--sao-text-dim); cursor: pointer; font-size: 13px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: background 0.15s; }
  .stat-sel-btn:hover { background: rgba(77,208,225,0.2); color: #fff; }
  .stat-sel-num { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; color: #fff; width: 28px; text-align: center; background: transparent; border: none; outline: none; padding: 0; }
  .stat-sel-num::-webkit-inner-spin-button, .stat-sel-num::-webkit-outer-spin-button { -webkit-appearance: none; }
  .stat-sel-num { -moz-appearance: textfield; }

  /* TIER BUILDER */
  .tier-builder { display: flex; flex-direction: column; gap: 8px; }
  .tier-row {
    background: rgba(0,10,20,0.6); border: 1px solid rgba(77,208,225,0.25); border-radius: 4px; padding: 10px 12px;
    position: relative;
  }
  .tier-row.elite-row { border-color: rgba(255,193,7,0.4); background: rgba(255,193,7,0.04); }
  .tier-row-top { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
  .tier-row-inputs { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .mini-field { display: flex; flex-direction: column; gap: 3px; }
  .mini-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-text-dim); }
  .mini-input { background: rgba(0,10,20,0.8); border: 1px solid rgba(77,208,225,0.3); color: var(--sao-text); padding: 5px 8px; font-family: 'Rajdhani', sans-serif; font-size: 13px; outline: none; border-radius: 3px; transition: border-color 0.2s; }
  .mini-input:focus { border-color: var(--sao-cyan); }
  .mini-input.w80 { width: 80px; }
  .mini-input.w55 { width: 55px; }
  .tier-row-remove { position: absolute; top: 8px; right: 8px; background: transparent; border: 1px solid rgba(255,100,100,0.3); color: #ff6464; cursor: pointer; width: 20px; height: 20px; border-radius: 3px; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .tier-row-remove:hover { background: rgba(255,80,80,0.18); }
  .elite-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; margin-top: 4px; }
  .elite-check { width: 14px; height: 14px; border: 1px solid rgba(255,193,7,0.5); border-radius: 2px; background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .elite-check.on { background: rgba(255,193,7,0.25); border-color: var(--sao-gold); }
  .elite-check.on::after { content: '★'; font-size: 9px; color: var(--sao-gold); }
  .elite-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--sao-gold-soft); }
  .add-tier-btn { background: rgba(77,208,225,0.08); border: 1px dashed rgba(77,208,225,0.4); color: var(--sao-cyan-bright); padding: 7px; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; cursor: pointer; border-radius: 3px; text-align: center; transition: all 0.2s; margin-top: 2px; }
  .add-tier-btn:hover { background: rgba(77,208,225,0.16); border-color: var(--sao-cyan); }

  /* Modal buttons */
  .m-btn { padding: 9px 18px; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 3px; transition: all 0.25s; }
  .m-btn.cancel { background: transparent; border: 1px solid rgba(77,208,225,0.35); color: var(--sao-text-dim); }
  .m-btn.cancel:hover { border-color: rgba(77,208,225,0.6); color: var(--sao-cyan-bright); }
  .m-btn.save { background: linear-gradient(180deg, var(--sao-cyan-bright), var(--sao-cyan-deep)); border: 1px solid var(--sao-gold); color: #042430; }
  .m-btn.save:hover { box-shadow: 0 0 16px rgba(77,208,225,0.6); transform: translateY(-1px); }

  .m-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(77,208,225,0.3), transparent); margin: 14px 0; }

  /* === HISTORY TAB === */
  .period-selector { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
  .period-btn { background: rgba(0,10,20,0.7); border: 1px solid rgba(77,208,225,0.22); color: var(--sao-text-dim); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; padding: 6px 10px; cursor: pointer; border-radius: 3px; transition: all 0.2s; white-space: nowrap; }
  .period-btn:hover { border-color: rgba(77,208,225,0.5); color: var(--sao-cyan-bright); }
  .period-btn.active { background: rgba(77,208,225,0.15); border-color: var(--sao-cyan); color: #fff; text-shadow: 0 0 6px var(--sao-cyan); }
  .custom-range { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .custom-range .m-label { margin: 0; flex-shrink: 0; }
  .custom-range .m-input { flex: 1; min-width: 130px; }
  .chart-section { margin-bottom: 18px; }
  .chart-title { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--sao-text-dim); text-align: center; margin-bottom: 10px; }
  .chart-scroll { overflow-x: auto; padding-bottom: 4px; }
  .chart-pct-row { display: flex; gap: 3px; height: 14px; margin-bottom: 3px; }
  .chart-pct-cell { flex: 1; min-width: 14px; font-size: 7px; text-align: center; color: var(--sao-text-dim); line-height: 14px; }
  .chart-bars-row { display: flex; align-items: flex-end; gap: 3px; height: 130px; border-bottom: 1px solid rgba(77,208,225,0.18); }
  .chart-bar { flex: 1; min-width: 14px; min-height: 3px; border-radius: 2px 2px 0 0; cursor: pointer; transition: opacity 0.2s; }
  .chart-bar:hover { opacity: 0.75; }
  .chart-bar.bar-sel { outline: 2px solid #fff; outline-offset: 1px; }
  .chart-bar.bar-good { background: linear-gradient(180deg,#b9f6ca,var(--sao-green-bar)); box-shadow: 0 0 5px var(--sao-green); }
  .chart-bar.bar-mid  { background: linear-gradient(180deg,#fff9c4,#fdd835); box-shadow: 0 0 5px #fdd835; }
  .chart-bar.bar-low  { background: linear-gradient(180deg,#ff8a80,#ef5350); box-shadow: 0 0 5px #ef5350; }
  .chart-bar.bar-empty { background: rgba(77,208,225,0.08); border: 1px solid rgba(77,208,225,0.15); }
  .chart-label-row { display: flex; gap: 3px; margin-top: 5px; }
  .chart-label-cell { flex: 1; min-width: 14px; font-size: 7px; text-align: center; color: var(--sao-text-dim); cursor: pointer; }
  .chart-label-cell.today { color: var(--sao-cyan-bright); }
  .day-detail { border: 1px solid rgba(77,208,225,0.25); border-radius: 4px; background: rgba(0,10,20,0.45); overflow: hidden; }
  .day-detail-hdr { padding: 10px 14px; border-bottom: 1px solid rgba(77,208,225,0.15); display: flex; justify-content: space-between; align-items: center; background: rgba(77,208,225,0.06); }
  .day-detail-date { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-cyan-bright); }
  .day-detail-score { font-family: 'Cinzel', serif; font-size: 10px; color: var(--sao-gold-soft); }
  .day-detail-section { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--sao-text-dim); padding: 8px 14px 4px; }
  .history-quest { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid rgba(77,208,225,0.07); cursor: pointer; transition: background 0.15s; }
  .history-quest:last-child { border-bottom: none; }
  .history-quest:hover { background: rgba(77,208,225,0.06); }
  .hist-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(77,208,225,0.35); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.2s; }
  .hist-check.done { background: var(--sao-green); border-color: var(--sao-green); color: #fff; box-shadow: 0 0 6px var(--sao-green); }
  .hist-quest-text { flex: 1; font-size: 13px; color: var(--sao-text); }
  .history-quest.done-q .hist-quest-text { color: var(--sao-text-dim); text-decoration: line-through; }
  .hist-xp { font-size: 10px; color: var(--sao-gold-soft); font-family: 'Cinzel', serif; flex-shrink: 0; }
  .hist-empty { padding: 20px 14px; text-align: center; color: var(--sao-text-dim); font-size: 12px; }
  .chart-bar { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .chart-bar-pct { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: #fff; line-height: 1; flex-shrink: 0; text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 10px rgba(0,0,0,0.5); pointer-events: none; letter-spacing: 0.5px; }
  .hist-goto-btn { background: rgba(77,208,225,0.12); border: 1px solid rgba(77,208,225,0.45); color: var(--sao-cyan-bright); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; padding: 6px 12px; cursor: pointer; border-radius: 3px; transition: all 0.2s; white-space: nowrap; }
  .hist-goto-btn:hover { background: rgba(77,208,225,0.22); }
  .date-banner { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(255,193,7,0.08); border: 1px solid rgba(255,193,7,0.35); border-radius: 4px; padding: 9px 14px; margin-bottom: 14px; }
  .date-banner-text { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--sao-gold-soft); }
  .date-banner-btn { background: transparent; border: 1px solid rgba(255,193,7,0.4); color: var(--sao-gold-soft); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; padding: 5px 12px; cursor: pointer; border-radius: 3px; transition: all 0.2s; white-space: nowrap; }
  .date-banner-btn:hover { background: rgba(255,193,7,0.15); }
  .hist-readonly-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid rgba(77,208,225,0.07); }
  .hist-readonly-row:last-child { border-bottom: none; }
  .chart-summary { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: rgba(0,10,20,0.5); border: 1px solid rgba(77,208,225,0.2); border-radius: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .chart-summary-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .chart-summary-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: var(--sao-text-dim); }
  .chart-summary-value { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; }
  .chart-summary-value.good { color: var(--sao-green); text-shadow: 0 0 8px var(--sao-green); }
  .chart-summary-value.mid  { color: #fdd835; text-shadow: 0 0 8px #fdd835; }
  .chart-summary-value.low  { color: #ef5350; text-shadow: 0 0 8px #ef5350; }
  .chart-summary-divider { width: 1px; height: 36px; background: rgba(77,208,225,0.2); flex-shrink: 0; }

  /* ═══════════════════════════ DUNGEON SYSTEM ═══════════════════════════ */
  .dungeon-section { margin-bottom:0; }
  .dungeon-divider { display:flex; align-items:center; gap:10px; margin:14px 0 6px; }
  .dungeon-divider::before,.dungeon-divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(77,208,225,0.25),transparent); }
  .dungeon-divider span { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:rgba(77,208,225,0.45); white-space:nowrap; }

  /* Select screen */
  .dungeon-select-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:4px; color:var(--sao-cyan-bright); text-shadow:0 0 8px var(--sao-cyan); text-align:center; margin-bottom:3px; }
  .dungeon-select-sub { font-size:10px; color:rgba(180,220,235,0.5); text-align:center; margin-bottom:10px; }
  .dungeon-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:8px; }
  .dungeon-card { background:rgba(0,10,20,0.8); border:1px solid rgba(120,120,120,0.25); border-radius:6px; padding:10px 8px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; overflow:hidden; }
  .dungeon-card::before { content:''; position:absolute; inset:0; background:var(--dglow,rgba(77,208,225,0.15)); opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .dungeon-card:hover::before { opacity:0.12; }
  .dungeon-card:hover { border-color:var(--dcolor,var(--sao-cyan)); transform:translateY(-2px); }
  .dungeon-card.selected { border-color:var(--dcolor,var(--sao-cyan)); box-shadow:0 0 12px var(--dglow,rgba(77,208,225,0.3)); }
  .dungeon-card.selected::before { opacity:0.1; }
  .dcard-emoji { font-size:26px; line-height:1; }
  .dcard-diff { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--dcolor); }
  .dcard-name { font-size:11px; font-weight:600; color:#e8f0f5; text-align:center; }
  .dcard-time { font-size:9px; color:rgba(180,220,235,0.55); }
  .dcard-rewards { display:flex; gap:6px; }
  .dcard-xp { font-size:9px; color:var(--sao-gold-soft); }
  .dcard-col { font-size:9px; color:#4fc3f7; }
  .dcard-stat { font-size:9px; color:#b9f6ca; }
  .dungeon-enter-btn { display:block; width:100%; background:linear-gradient(135deg,rgba(0,30,60,0.9),rgba(0,50,80,0.9)); border:1px solid var(--sao-cyan); border-radius:4px; color:var(--sao-cyan-bright); font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; padding:10px; cursor:pointer; transition:all 0.2s; text-shadow:0 0 6px var(--sao-cyan); }
  .dungeon-enter-btn:hover { background:rgba(77,208,225,0.12); box-shadow:0 0 14px rgba(77,208,225,0.25); }

  /* ── Rank tabs ── */
  .dungeon-rank-tabs { display:flex; gap:5px; margin-bottom:10px; }
  .dungeon-rank-tab { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; padding:5px 0; border-radius:3px; border:1px solid rgba(77,208,225,0.2); background:transparent; color:rgba(123,167,192,0.45); cursor:pointer; transition:all 0.15s; flex:1; }
  .dungeon-rank-tab:hover:not(.locked) { border-color:var(--sao-cyan); color:var(--sao-cyan-bright); }
  .dungeon-rank-tab.active { border-color:var(--sao-cyan); color:var(--sao-cyan-bright); background:rgba(77,208,225,0.08); box-shadow:0 0 8px rgba(77,208,225,0.2); }
  .dungeon-rank-tab.rank-S.active { border-color:#ffd700; color:#ffd700; background:rgba(255,215,0,0.08); box-shadow:0 0 10px rgba(255,215,0,0.3); }
  .dungeon-rank-tab.rank-A.active { border-color:#ffa000; color:#ffa000; background:rgba(255,160,0,0.08); }
  .dungeon-rank-tab.rank-B.active { border-color:#ce93d8; color:#ce93d8; background:rgba(156,39,176,0.08); }
  .dungeon-rank-tab.locked { opacity:0.3; cursor:not-allowed; }

  /* ── Class grid ── */
  .dungeon-class-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .dungeon-class-col { display:flex; flex-direction:column; }
  .dungeon-class-header { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:rgba(123,167,192,0.55); text-align:center; padding:4px 2px 6px; border-bottom:1px solid rgba(77,208,225,0.12); margin-bottom:6px; }
  .dungeon-class-card { background:rgba(0,8,18,0.85); border:1px solid rgba(120,120,120,0.2); border-radius:5px; padding:9px 7px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .dungeon-class-card::before { content:''; position:absolute; inset:0; background:var(--dglow,transparent); opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .dungeon-class-card:not(.locked):hover { transform:translateY(-2px); border-color:var(--dcolor); box-shadow:0 0 12px var(--dglow); }
  .dungeon-class-card:not(.locked):hover::before,.dungeon-class-card.selected::before { opacity:0.09; }
  .dungeon-class-card.selected { border-color:var(--dcolor); box-shadow:0 0 14px var(--dglow); }
  .dungeon-class-card.locked { opacity:0.35; cursor:not-allowed; filter:grayscale(0.6); }
  .dcc-emoji { font-size:22px; text-align:center; margin-bottom:4px; line-height:1; }
  .dcc-name { font-size:9px; font-weight:600; color:#d0e8f5; text-align:center; line-height:1.25; margin-bottom:5px; }
  .dcc-meta { display:flex; justify-content:space-between; font-size:8px; color:rgba(180,220,235,0.45); margin-bottom:3px; }
  .dcc-stat { color:#b9f6ca; }
  .dcc-rewards { display:flex; justify-content:space-between; font-size:8px; }
  .dcc-xp { color:var(--sao-gold-soft); }
  .dcc-col { color:#4fc3f7; }
  .dcc-lock-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:rgba(0,0,0,0.35); font-family:'Cinzel',serif; font-size:8px; color:rgba(123,167,192,0.7); letter-spacing:1px; }

  /* ── Idle combat HP bar ── */
  .dexp-idle-combat { background:rgba(0,5,15,0.7); border:1px solid rgba(77,208,225,0.12); border-radius:4px; padding:7px 10px; margin:6px 0; }
  .dexp-idle-combat.break-mode { border-color:rgba(129,199,132,0.15); background:rgba(0,8,4,0.6); }
  .dexp-idle-info { flex:1; }
  .dexp-idle-name { display:flex; justify-content:space-between; align-items:center; font-size:10px; color:rgba(180,220,235,0.7); letter-spacing:0.5px; margin-bottom:4px; }
  .dexp-floor-num { opacity:0.4; font-size:9px; }
  .dexp-idle-dps { font-family:'Cinzel',serif; font-size:8px; color:rgba(77,208,225,0.55); letter-spacing:1px; }
  .dexp-idle-hpbar { height:6px; background:rgba(0,10,20,0.8); border:1px solid rgba(255,100,100,0.2); border-radius:3px; overflow:hidden; margin-bottom:3px; }
  .dexp-idle-hpfill { height:100%; background:linear-gradient(90deg,#e53935,#ef9a9a); border-radius:3px; }
  .dexp-idle-combat.break-mode .dexp-idle-hpfill { background:linear-gradient(90deg,#388e3c,#81c784); opacity:0.4; }
  .dexp-idle-hptxt { font-size:8px; color:rgba(180,220,235,0.35); letter-spacing:0.5px; }
  .dexp-kill-count { font-family:'Cinzel',serif; font-size:9px; color:var(--sao-gold-soft); letter-spacing:1px; white-space:nowrap; }
  /* Practice Arena */
  .practice-section { margin-bottom:10px; }
  .practice-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:#ff8a80; text-shadow:0 0 8px rgba(255,138,128,0.5); text-align:center; margin-bottom:3px; }
  .practice-sub { font-size:9px; color:var(--sao-text-dim); text-align:center; letter-spacing:1px; margin-bottom:8px; opacity:0.6; }
  .practice-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
  .practice-card { background:rgba(20,5,5,0.85); border:1px solid rgba(255,100,80,0.2); border-radius:6px; padding:10px 8px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; overflow:hidden; }
  .practice-card::before { content:''; position:absolute; inset:0; background:var(--pglow); opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .practice-card:hover::before { opacity:0.1; }
  .practice-card:hover { border-color:var(--pcolor); transform:translateY(-1px); }
  .pcard-emoji { font-size:24px; line-height:1; }
  .pcard-diff { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--pcolor); }
  .pcard-name { font-size:11px; font-weight:600; color:#e8f0f5; text-align:center; }
  .pcard-hp { font-size:9px; color:#ef9a9a; }
  .pcard-fight { margin-top:4px; width:100%; padding:5px; background:transparent; border:1px solid rgba(255,100,80,0.4); border-radius:3px; color:#ef9a9a; font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; cursor:pointer; transition:all 0.15s; }
  .pcard-fight:hover { background:rgba(255,100,80,0.1); border-color:rgba(255,100,80,0.7); }
  .practice-badge { display:inline-block; background:rgba(255,138,128,0.12); border:1px solid rgba(255,138,128,0.4); color:#ff8a80; font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; padding:2px 8px; border-radius:2px; margin-left:8px; vertical-align:middle; }
  .dboss-practice-bar { background:rgba(255,138,128,0.08); border:1px solid rgba(255,138,128,0.25); border-radius:3px; padding:4px 10px; text-align:center; font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:#ef9a9a; margin-bottom:6px; }

  /* Explore screen */
  .dungeon-explore { background:var(--dbg,rgba(0,10,20,0.95)); border:1px solid var(--dcolor,rgba(77,208,225,0.4)); border-radius:8px; padding:12px; margin-bottom:4px; box-shadow:0 0 14px var(--dglow,rgba(77,208,225,0.15)); }
  .dexp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .dexp-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; color:var(--dcolor); text-shadow:0 0 8px var(--dglow); }
  .dexp-diff-badge { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--dcolor); border:1px solid var(--dcolor); padding:2px 6px; border-radius:2px; }
  .dexp-overall { margin-bottom:10px; }
  .dexp-overall-label { display:flex; justify-content:space-between; font-size:9px; color:rgba(180,220,235,0.55); letter-spacing:1px; margin-bottom:3px; }
  .dexp-overall-track { height:6px; background:rgba(0,10,20,0.8); border:1px solid rgba(77,208,225,0.2); border-radius:3px; overflow:hidden; }
  .dexp-overall-fill { height:100%; background:linear-gradient(90deg,var(--dcolor),rgba(255,255,255,0.5)); border-radius:3px; transition:width 1s linear; }
  /* Animated battle scene */
  .dexp-scene { height:90px; background:linear-gradient(180deg,rgba(0,5,15,0.95) 0%,rgba(0,15,30,0.6) 60%,rgba(0,5,15,0.95) 100%); border:1px solid rgba(77,208,225,0.12); border-radius:4px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; margin-bottom:4px; overflow:hidden; position:relative; }
  .dexp-bg { position:absolute; inset:0; pointer-events:none; }
  .dexp-layer { position:absolute; top:0; left:0; width:200%; height:100%; }
  .dexp-layer-far { background:repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(77,208,225,0.025) 38px,rgba(77,208,225,0.025) 39px); animation:bgScroll1 10s linear infinite; }
  .dexp-layer-mid { top:auto; bottom:28%; height:1px; background:linear-gradient(90deg,transparent,rgba(77,208,225,0.12),transparent 60%); animation:bgScroll2 5s linear infinite; }
  .dexp-layer-near { top:auto; bottom:16%; height:1px; background:linear-gradient(90deg,transparent,rgba(77,208,225,0.18),transparent 40%); animation:bgScroll3 2.5s linear infinite; }
  .dexp-bg.paused .dexp-layer { animation-play-state:paused; }
  .dexp-hero { font-size:30px; z-index:2; position:relative; filter:drop-shadow(0 0 6px rgba(77,208,225,0.7)); user-select:none; }
  .dexp-hero.running { animation:heroRun 0.45s ease-in-out infinite; }
  .dexp-vs { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:rgba(255,193,7,0.5); z-index:2; }
