  .dexp-enemy { font-size:30px; z-index:2; position:relative; filter:drop-shadow(0 0 8px var(--dglow,rgba(77,208,225,0.4))); animation:enemyFloat 2.2s ease-in-out infinite; user-select:none; }
  .dexp-enemy.paused { animation-play-state:paused; }
  .dexp-enemy-name { text-align:center; font-size:9px; letter-spacing:2px; color:rgba(180,220,235,0.45); margin-bottom:8px; }
  /* Pomodoro section */
  .dexp-pomo-section { background:rgba(0,5,15,0.6); border:1px solid rgba(77,208,225,0.1); border-radius:4px; padding:8px 10px; margin-bottom:8px; }
  .dexp-pomo-phase { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--sao-cyan); text-align:center; margin-bottom:4px; }
  .dexp-pomo-phase.break-phase { color:#81c784; }
  .dexp-pomo-timer { font-family:'Cinzel',serif; font-size:28px; letter-spacing:5px; color:var(--sao-cyan-bright); text-align:center; text-shadow:0 0 10px var(--sao-cyan); animation:timerGlow 1.2s ease-in-out infinite; }
  .dexp-pomo-timer.paused { color:rgba(180,220,235,0.35); text-shadow:none; animation:none; }
  .dexp-pomo-track { height:4px; background:rgba(0,10,20,0.8); border:1px solid rgba(77,208,225,0.18); border-radius:2px; overflow:hidden; margin:5px 0; }
  .dexp-pomo-fill { height:100%; background:var(--sao-cyan); border-radius:2px; transition:width 1s linear; }
  .dexp-pomo-fill.break-fill { background:#81c784; }
  .dexp-pomo-count { font-size:11px; text-align:center; color:rgba(255,193,7,0.75); letter-spacing:2px; }
  /* Action buttons */
  .dexp-actions { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
  .dexp-btn { flex:1; min-width:72px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; padding:7px 4px; border-radius:4px; cursor:pointer; border:1px solid; transition:all 0.18s; background:rgba(0,10,20,0.7); }
  .dexp-btn:hover:not(:disabled) { filter:brightness(1.25); transform:translateY(-1px); }
  .dexp-btn-primary { border-color:var(--sao-cyan); color:var(--sao-cyan-bright); }
  .dexp-btn-pause { border-color:rgba(255,193,7,0.5); color:var(--sao-gold-soft); }
  .dexp-btn-exit { border-color:rgba(76,175,80,0.6); color:#81c784; }
  .dexp-btn-boss { border-color:rgba(244,67,54,0.55); color:#ef9a9a; }
  .dexp-btn-abandon { border-color:rgba(100,100,100,0.3); color:rgba(180,220,235,0.35); font-size:8px; }
  .dexp-complete-badge { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--sao-gold-soft); text-align:center; border:1px solid rgba(255,193,7,0.3); border-radius:3px; padding:6px; background:rgba(255,193,7,0.04); animation:completePulse 2s ease-in-out infinite; }
  /* Boss fight */
  .dungeon-boss { background:rgba(5,0,15,0.98); border:1px solid var(--dcolor,#f44336); border-radius:8px; padding:10px; margin-bottom:4px; box-shadow:0 0 18px var(--dglow,rgba(244,67,54,0.3)); }
  .dboss-header { display:flex; justify-content:space-between; align-items:center; font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--dcolor); margin-bottom:10px; }
  .dboss-turn { font-size:8px; color:rgba(180,220,235,0.45); }
  .dboss-arena { display:flex; align-items:flex-start; gap:6px; margin-bottom:8px; }
  .dboss-fighter { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .dboss-sprite { font-size:38px; line-height:1; margin-bottom:2px; transition:filter 0.15s,transform 0.15s; }
  .boss-sprite { font-size:42px; }
  .dboss-name { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:rgba(180,220,235,0.75); text-align:center; }
  .dboss-bar-wrap { width:100%; }
  .dboss-bar-label { display:flex; justify-content:space-between; font-size:8px; color:rgba(180,220,235,0.45); margin-bottom:2px; }
  .dboss-track { height:6px; background:rgba(0,10,20,0.8); border:1px solid rgba(77,208,225,0.12); border-radius:3px; overflow:hidden; }
  .dboss-fill { height:100%; border-radius:3px; transition:width 0.35s ease; }
  .hp-fill { background:linear-gradient(90deg,#c62828,#ff8a80); }
  .mp-fill { background:linear-gradient(90deg,#1565c0,#42a5f5); }
  .enemy-hp-fill { background:linear-gradient(90deg,var(--dcolor),rgba(255,255,255,0.5)); }
  .dboss-buff { font-size:8px; color:#ffe082; letter-spacing:1px; padding:1px 4px; background:rgba(255,224,130,0.08); border-radius:2px; }
  .dboss-derived-stats { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .dboss-derived-stats span { font-size:9px; font-family:'Cinzel',serif; letter-spacing:0.5px; color:var(--sao-cyan-bright); background:rgba(77,208,225,0.08); border:1px solid rgba(77,208,225,0.25); border-radius:3px; padding:1px 5px; cursor:default; }

  /* ── INVENTORY (Metin2 style) ──────────────────────────── */
  .inv-window { background:linear-gradient(180deg,#110d07,#0a0804); border:2px solid #8b6914; border-radius:3px; box-shadow:inset 0 0 0 1px #4a3608,0 0 20px rgba(139,105,20,0.25); overflow:hidden; }
  .inv-window-title { background:linear-gradient(90deg,rgba(139,105,20,0.15),rgba(139,105,20,0.55),rgba(139,105,20,0.15)); border-bottom:1px solid #8b6914; padding:7px 12px; display:flex; justify-content:center; align-items:center; gap:12px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:5px; color:#e8c96a; text-shadow:0 0 10px rgba(200,150,12,0.6); }
  .inv-window-title::before,.inv-window-title::after { content:'✦'; font-size:9px; opacity:0.6; }
  .inv-body { display:flex; min-height:360px; }
  .inv-section-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; color:#8b6914; text-align:center; margin-bottom:7px; border-bottom:1px solid rgba(139,105,20,0.25); padding-bottom:4px; }

  /* Equipment panel */
  .inv-equip-panel { width:180px; flex-shrink:0; border-right:1px solid #3a2808; padding:10px 8px; background:rgba(0,0,0,0.25); display:flex; flex-direction:column; }
  .inv-equip-grid { display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(5,52px); grid-template-areas:"earL helm earR" "wpn  char armor" "shld neck brace" ".    belt .   " ".    boot .   "; gap:3px; }
  .inv-equip-slot { width:52px; height:52px; background:linear-gradient(135deg,#0d0906,#080503); border:1px solid #2a1a08; border-radius:2px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:border-color 0.15s,box-shadow 0.15s; overflow:hidden; }
  .inv-equip-slot::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 0%,rgba(139,105,20,0.07),transparent 65%); pointer-events:none; }
  .inv-equip-slot:hover { border-color:#6a4e14; }
  .inv-equip-slot.is-filled { border-color:#4a3010; }
  .inv-equip-slot.is-selected { border-color:#e8c96a !important; box-shadow:0 0 8px rgba(232,201,106,0.45); }
  .inv-equip-slot.r-rare { border-color:rgba(77,208,225,0.55) !important; }
  .inv-equip-slot.r-epic { border-color:rgba(206,147,216,0.55) !important; }
  .inv-equip-slot.r-legendary { border-color:rgba(232,201,106,0.75) !important; box-shadow:0 0 7px rgba(232,201,106,0.3) !important; }
  .inv-equip-slot-emoji { font-size:22px; line-height:1; }
  .inv-equip-slot-label { font-size:6.5px; color:#4a3010; letter-spacing:0.5px; margin-top:2px; text-align:center; line-height:1; }
  .inv-char-slot { grid-area:char; background:radial-gradient(circle,rgba(139,105,20,0.13),rgba(0,0,0,0.55)); border:1px solid rgba(139,105,20,0.45); border-radius:2px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; }
  .inv-char-sprite { font-size:24px; line-height:1; }
  .inv-char-name { font-size:7px; color:#e8c96a; letter-spacing:1px; margin-top:2px; }
  .inv-char-lv { font-size:7px; color:#8b6914; }
  .inv-eq-bonuses { margin-top:8px; display:flex; flex-wrap:wrap; gap:2px; min-height:12px; }
  .inv-eq-bonus-tag { font-size:8px; font-family:'Cinzel',serif; color:#76ff03; background:rgba(118,255,3,0.05); border:1px solid rgba(118,255,3,0.14); padding:1px 4px; border-radius:2px; }

  /* Bag panel */
  .inv-bag-panel { flex:1; padding:10px 8px; display:flex; flex-direction:column; }
  .inv-bag-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:2px; flex-shrink:0; }
  .inv-bag-slot { aspect-ratio:1; background:linear-gradient(135deg,#0d0906,#080503); border:1px solid #1c1208; border-radius:2px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:border-color 0.12s; overflow:hidden; }
  .inv-bag-slot:hover { border-color:#3a2a14; }
  .inv-bag-slot.has-item { border-color:#2a1e0a; }
  .inv-bag-slot.is-selected { border-color:#e8c96a !important; box-shadow:0 0 5px rgba(232,201,106,0.4); }
  .inv-bag-slot.r-rare { border-color:rgba(77,208,225,0.5) !important; }
  .inv-bag-slot.r-epic { border-color:rgba(206,147,216,0.5) !important; }
  .inv-bag-slot.r-legendary { border-color:rgba(232,201,106,0.7) !important; box-shadow:0 0 4px rgba(232,201,106,0.2) !important; }
  .inv-slot-emoji { font-size:20px; line-height:1; }
  .inv-slot-qty { position:absolute; bottom:1px; right:3px; font-size:8px; color:#e8c96a; font-family:'Cinzel',serif; pointer-events:none; text-shadow:0 1px 2px rgba(0,0,0,0.8); }

  /* Item info */
  .inv-info-panel { margin-top:6px; background:rgba(0,0,0,0.45); border:1px solid #2a1a08; border-radius:2px; padding:8px 10px; flex:1; min-height:64px; }
  .inv-info-empty { color:#4a3010; font-size:9px; text-align:center; padding-top:12px; letter-spacing:1px; }
  .inv-info-name { font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px; }
  .inv-info-name.r-common { color:#c8c8c8; }
  .inv-info-name.r-rare { color:#4dd0e1; }
  .inv-info-name.r-epic { color:#ce93d8; }
  .inv-info-name.r-legendary { color:#e8c96a; text-shadow:0 0 7px rgba(232,201,106,0.55); }
  .inv-info-rarity { font-size:8px; letter-spacing:2px; opacity:0.45; margin-top:1px; color:#888; }
  .inv-info-desc { font-size:9px; color:var(--sao-text-dim); margin:3px 0 4px; line-height:1.4; }
  .inv-info-stats { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:5px; }
  .inv-info-stat { font-size:9px; color:#76ff03; font-family:'Cinzel',serif; background:rgba(118,255,3,0.05); border:1px solid rgba(118,255,3,0.14); padding:1px 5px; border-radius:2px; }
  .inv-info-heal { font-size:9px; color:#ff8a80; font-family:'Cinzel',serif; background:rgba(255,138,128,0.05); border:1px solid rgba(255,138,128,0.2); padding:1px 5px; border-radius:2px; }
  .inv-info-actions { display:flex; gap:5px; }
  .inv-act-btn { flex:1; padding:5px 4px; border-radius:2px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; background:transparent; border:1px solid; transition:all 0.14s; }
  .inv-act-btn.equip    { color:#4dd0e1; border-color:rgba(77,208,225,0.4); }
  .inv-act-btn.equip:hover { background:rgba(77,208,225,0.1); }
  .inv-act-btn.unequip  { color:#ff8a80; border-color:rgba(255,138,128,0.4); }
  .inv-act-btn.unequip:hover { background:rgba(255,138,128,0.1); }
  .inv-act-btn.use-item { color:#76ff03; border-color:rgba(118,255,3,0.35); }
  .inv-act-btn.use-item:hover { background:rgba(118,255,3,0.08); }
  .inv-act-btn.drop-item{ color:#555; border-color:rgba(85,85,85,0.3); }
  .inv-act-btn.drop-item:hover { background:rgba(85,85,85,0.08); }

  /* Yang bar */
  .inv-yang-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:7px 12px; background:rgba(0,0,0,0.5); border-top:1px solid #4a3608; font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:#8b6914; }
  .inv-yang-val { font-size:14px; color:#e8c96a; text-shadow:0 0 8px rgba(232,201,106,0.4); font-variant-numeric:tabular-nums; }
  .dboss-vs-divider { font-family:'Cinzel',serif; font-size:13px; letter-spacing:2px; color:rgba(255,193,7,0.45); align-self:center; flex-shrink:0; }
  .dboss-log { height:110px; overflow-y:auto; background:rgba(0,5,15,0.8); border:1px solid rgba(77,208,225,0.1); border-radius:4px; padding:6px; margin-bottom:8px; scrollbar-width:thin; scrollbar-color:rgba(77,208,225,0.25) transparent; }
  .d-log-line { font-size:10px; color:rgba(180,220,235,0.65); padding:1px 0; border-bottom:1px solid rgba(77,208,225,0.04); line-height:1.4; }
  .d-log-line:last-child { color:var(--sao-cyan-bright); font-weight:600; }
  .dboss-outcome { font-family:'Cinzel',serif; font-size:18px; letter-spacing:6px; text-align:center; padding:10px; }
  .dboss-outcome.win { color:var(--sao-gold); text-shadow:0 0 15px var(--sao-gold); animation:outcomeGlow 1.5s ease-in-out infinite; }
  .dboss-outcome.lose { color:#f44336; text-shadow:0 0 12px #f44336; }
  /* Skills */
  .dboss-skills { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
  .skill-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:7px 4px; border-radius:4px; cursor:pointer; background:rgba(0,10,25,0.8); border:1px solid rgba(77,208,225,0.22); transition:all 0.15s; position:relative; }
  .skill-btn:hover:not(:disabled) { border-color:var(--sao-cyan); background:rgba(77,208,225,0.07); transform:translateY(-1px); }
  .skill-btn.queued { border-color:var(--sao-gold); background:rgba(255,193,7,0.09); box-shadow:0 0 8px rgba(255,193,7,0.2); }
  .skill-btn:disabled { opacity:0.38; cursor:not-allowed; transform:none; }
  .skill-emoji { font-size:17px; line-height:1; }
  .skill-name { font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px; color:var(--sao-cyan-bright); }
  .skill-desc { font-size:7.5px; color:rgba(180,220,235,0.45); text-align:center; }
  .skill-cd { position:absolute; top:3px; right:5px; font-size:10px; font-weight:700; color:rgba(244,67,54,0.85); font-family:'Cinzel',serif; }
  /* Reward screen */
  .dungeon-reward { background:rgba(5,0,15,0.98); border:1px solid var(--dcolor,var(--sao-gold)); border-radius:8px; padding:16px; text-align:center; box-shadow:0 0 20px var(--dglow); margin-bottom:4px; }
  .dreward-title { font-family:'Cinzel',serif; font-size:15px; letter-spacing:5px; color:var(--sao-gold); text-shadow:0 0 12px var(--sao-gold); margin-bottom:4px; }
  .dreward-subtitle { font-size:11px; color:rgba(180,220,235,0.55); margin-bottom:14px; }
  .dreward-items { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .dreward-item { display:flex; align-items:center; gap:10px; background:rgba(0,10,20,0.6); border:1px solid rgba(77,208,225,0.12); border-radius:4px; padding:7px 12px; font-size:13px; color:#e8f0f5; }
  .dreward-item.boss-bonus { border-color:rgba(255,193,7,0.35); color:var(--sao-gold-soft); }
  .dreward-icon { font-size:18px; }
  /* Keyframe animations */
  @keyframes heroRun { 0%,100%{transform:translateY(0) rotate(-2deg)} 25%{transform:translateY(-7px) rotate(-5deg)} 50%{transform:translateY(-1px) rotate(-2deg)} 75%{transform:translateY(-4px) rotate(1deg)} }
  @keyframes enemyFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-9px) scale(1.06)} }
  @keyframes bgScroll1 { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes bgScroll2 { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes bgScroll3 { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes timerGlow { 0%,100%{text-shadow:0 0 10px var(--sao-cyan)} 50%{text-shadow:0 0 22px var(--sao-cyan),0 0 45px rgba(77,208,225,0.25)} }
  @keyframes completePulse { 0%,100%{border-color:rgba(255,193,7,0.25)} 50%{border-color:rgba(255,193,7,0.65);box-shadow:0 0 8px rgba(255,193,7,0.18)} }
  @keyframes outcomeGlow { 0%,100%{text-shadow:0 0 15px var(--sao-gold)} 50%{text-shadow:0 0 30px var(--sao-gold),0 0 60px rgba(255,193,7,0.3)} }
  .d-hit { animation:hitFlash 0.28s ease-in-out !important; }
  @keyframes hitFlash { 0%,100%{filter:none;transform:scale(1)} 50%{filter:brightness(5) saturate(0);transform:scale(1.15)} }
  .d-dead { opacity:0.25; filter:grayscale(1) brightness(0.6); }

  /* ═══════════════════ OVERLAYS (mastery · harvest · weekly report) ═══════════════════ */
  @keyframes masteryFadeIn  { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
  @keyframes masteryFadeOut { from{opacity:1;transform:scale(1)}     to{opacity:0;transform:scale(0.97)} }
  @keyframes thRevealIn     { from{opacity:0;transform:scale(0.8) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

  .mastery-overlay, .harvest-overlay, .weekly-report-overlay {
    position:fixed; inset:0; z-index:1000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,rgba(2,8,18,0.97) 0%,rgba(4,16,34,0.97) 100%);
    padding:24px 20px; overflow-y:auto;
    animation:masteryFadeIn 0.5s ease forwards;
  }

  /* — HARVEST — */
  .harvest-overlay { gap:10px; text-align:center; }
  .harvest-badge { font-family:'Cinzel',serif; font-size:13px; letter-spacing:5px; color:var(--sao-gold); text-shadow:0 0 14px var(--sao-gold); padding-bottom:12px; border-bottom:1px solid rgba(255,193,7,0.35); width:100%; max-width:360px; text-align:center; }
  .harvest-date { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--sao-text-dim); }
  .harvest-quests { font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--sao-cyan-bright); text-shadow:0 0 12px var(--sao-cyan); }
  .harvest-xp { font-family:'Cinzel',serif; font-size:15px; color:var(--sao-gold-soft); text-shadow:0 0 8px var(--sao-gold); }
  .harvest-gains { display:flex; flex-direction:column; gap:6px; background:rgba(0,10,20,0.65); border:1px solid rgba(77,208,225,0.22); border-radius:5px; padding:12px 24px; min-width:200px; margin:4px 0; }
  .harvest-stat-row { display:flex; justify-content:space-between; gap:24px; }
  .harvest-stat-key { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--sao-text-dim); }
  .harvest-stat-val { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:var(--sao-cyan-bright); text-shadow:0 0 6px var(--sao-cyan); }
  .harvest-no-gains { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:var(--sao-text-dim); opacity:0.5; }
  .harvest-dismiss-btn { background:linear-gradient(180deg,rgba(13,41,66,0.9),rgba(6,26,43,0.95)); border:1px solid var(--sao-cyan); color:var(--sao-cyan-bright); font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; padding:10px 28px; cursor:pointer; border-radius:3px; transition:all 0.2s; margin-top:6px; text-shadow:0 0 6px var(--sao-cyan); }
  .harvest-dismiss-btn:hover { background:rgba(77,208,225,0.18); box-shadow:0 0 14px rgba(77,208,225,0.4); }

  /* — MASTERY — */
  .mastery-overlay { gap:14px; text-align:center; }
  .mastery-badge { font-family:'Cinzel',serif; font-size:11px; letter-spacing:5px; color:var(--mc,var(--sao-cyan)); text-shadow:0 0 12px var(--mc,var(--sao-cyan)); }
  .mastery-class-name { font-family:'Cinzel',serif; font-size:28px; font-weight:700; color:var(--mc,var(--sao-cyan-bright)); text-shadow:0 0 20px var(--mc,var(--sao-cyan)); letter-spacing:6px; }
  .mastery-tier-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--sao-text-dim); margin-bottom:4px; }
  .mastery-reward-box { background:rgba(0,10,20,0.7); border:1px solid var(--mc,rgba(77,208,225,0.3)); border-radius:5px; padding:14px 28px; min-width:240px; }
  .mastery-reward-title { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--sao-text-dim); margin-bottom:10px; }
  .mastery-reward-line { font-family:'Cinzel',serif; font-size:14px; color:var(--sao-text); display:flex; justify-content:space-between; gap:20px; padding:4px 0; border-bottom:1px solid rgba(77,208,225,0.08); }
  .mastery-reward-line:last-child { border-bottom:none; }
  .mastery-reward-val { color:var(--mc,var(--sao-cyan-bright)); font-weight:700; text-shadow:0 0 6px var(--mc,var(--sao-cyan)); }
  .mastery-dismiss { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--sao-text-dim); opacity:0.45; margin-top:8px; cursor:pointer; }
  /* TRUE HERO */
  .true-hero-overlay { background:radial-gradient(ellipse at 50% 30%,rgba(20,20,30,0.98),rgba(2,2,8,0.99)); }
  .th-stars { position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 80% 15%,rgba(255,255,255,0.5),transparent),radial-gradient(1.5px 1.5px at 50% 60%,rgba(255,255,255,0.4),transparent),radial-gradient(1px 1px at 10% 70%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,0.4),transparent); }
  .th-question-wrap { position:relative; height:60px; display:flex; align-items:center; justify-content:center; }
  .th-question { font-family:'Cinzel',serif; font-size:42px; font-weight:700; color:rgba(255,255,255,0.15); letter-spacing:8px; position:absolute; }
  .th-reveal { font-family:'Cinzel',serif; font-size:32px; font-weight:700; color:#fff; letter-spacing:8px; text-shadow:0 0 20px rgba(255,255,255,0.8),0 0 50px rgba(255,255,255,0.3); position:absolute; opacity:0; }

  /* — WEEKLY REPORT — */
  .weekly-report-overlay { justify-content:flex-start; }
  .wr-inner { width:100%; max-width:600px; display:flex; flex-direction:column; gap:14px; }
  .wr-badge { font-family:'Cinzel',serif; font-size:12px; letter-spacing:5px; color:var(--sao-gold); text-shadow:0 0 12px var(--sao-gold); text-align:center; padding-bottom:12px; border-bottom:1px solid rgba(255,193,7,0.3); }
  .wr-week { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:var(--sao-text-dim); text-align:center; margin-top:-4px; }
  .wr-levelup-banner { font-family:'Cinzel',serif; font-size:12px; letter-spacing:4px; color:var(--sao-gold); text-shadow:0 0 12px var(--sao-gold); background:rgba(255,193,7,0.07); border:1px solid rgba(255,193,7,0.4); border-radius:4px; padding:8px; text-align:center; animation:wrPulse 1.6s ease-in-out infinite; }
  @keyframes wrPulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
  .wr-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  @media (max-width:500px) { .wr-grid { grid-template-columns:repeat(2,1fr); } }
  .wr-card { background:rgba(0,10,20,0.7); border:1px solid rgba(77,208,225,0.18); border-radius:5px; padding:10px 12px; text-align:center; display:flex; flex-direction:column; gap:4px; }
  .wr-card-main { grid-column:1/-1; border-color:rgba(77,208,225,0.38); box-shadow:0 0 10px rgba(77,208,225,0.08); }
  .wr-card-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--sao-text-dim); }
  .wr-card-value { font-family:'Cinzel',serif; font-size:26px; font-weight:700; color:var(--sao-cyan-bright); text-shadow:0 0 10px var(--sao-cyan); line-height:1; }
  .wr-card-main .wr-card-value { font-size:30px; }
  .wr-card-sub { font-size:10px; color:var(--sao-text-dim); }
  .wr-up   { color:var(--sao-green); text-shadow:0 0 5px var(--sao-green); }
  .wr-down { color:#ef5350; text-shadow:0 0 5px #ef5350; }
  .wr-section-title { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--sao-text-dim); display:flex; align-items:center; gap:10px; }
  .wr-section-title::before,.wr-section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(77,208,225,0.22),transparent); }
  .wr-habits { display:flex; flex-direction:column; gap:7px; background:rgba(0,10,20,0.5); border:1px solid rgba(77,208,225,0.14); border-radius:5px; padding:10px 14px; }
  .wr-habit-row { display:flex; align-items:center; gap:8px; }
  .wr-habit-name { font-size:11px; color:var(--sao-text); width:160px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wr-habit-bar-wrap { flex:1; height:6px; background:rgba(0,10,20,0.8); border:1px solid rgba(77,208,225,0.1); border-radius:3px; overflow:hidden; }
  .wr-habit-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,rgba(77,208,225,0.5),var(--sao-cyan-bright)); box-shadow:0 0 6px rgba(77,208,225,0.35); }
  .wr-habit-count { font-family:'Cinzel',serif; font-size:10px; color:var(--sao-text-dim); width:28px; text-align:right; flex-shrink:0; }
  .wr-highlights { display:flex; flex-direction:column; gap:6px; }
  .wr-highlight { font-size:12px; padding:8px 12px; border-radius:4px; }
  .wr-highlight.best  { background:rgba(77,208,225,0.06); border:1px solid rgba(77,208,225,0.2); color:var(--sao-text); }
  .wr-highlight.worst { background:rgba(255,193,7,0.04); border:1px solid rgba(255,193,7,0.18); color:var(--sao-text-dim); }
  .wr-highlight.best strong  { color:var(--sao-cyan-bright); }
  .wr-highlight.worst strong { color:var(--sao-gold-soft); }
  .wr-dismiss-btn { background:linear-gradient(180deg,rgba(13,41,66,0.9),rgba(6,26,43,0.95)); border:1px solid var(--sao-gold); color:var(--sao-gold-soft); font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; padding:12px 32px; cursor:pointer; border-radius:3px; transition:all 0.2s; align-self:center; margin-top:4px; text-shadow:0 0 6px var(--sao-gold); }
  .wr-dismiss-btn:hover { background:rgba(255,193,7,0.12); box-shadow:0 0 14px rgba(255,193,7,0.4); }
  .wr-report-btn { background:transparent; border:1px solid rgba(77,208,225,0.4); color:var(--sao-cyan-bright); font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; padding:5px 12px; cursor:pointer; border-radius:3px; transition:all 0.25s; white-space:nowrap; }
  .wr-report-btn:hover { background:rgba(77,208,225,0.12); box-shadow:0 0 10px rgba(77,208,225,0.3); }

  /* ── CHARACTER STATUS HEADER ──────────────────────────────────── */
  .char-status-header {
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(135deg,rgba(0,8,18,0.97),rgba(6,26,43,0.92));
    border:1px solid rgba(77,208,225,0.2); border-radius:8px;
    padding:12px 16px; margin-bottom:14px; position:relative; overflow:hidden;
  }
  .char-status-header::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--rank-color,var(--sao-cyan)),transparent);
  }
  .char-status-rank {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; font-weight:700;
    border:1px solid currentColor; padding:5px 11px; border-radius:3px;
    white-space:nowrap; text-shadow:0 0 8px currentColor; flex-shrink:0;
  }
  .char-status-level { display:flex; flex-direction:column; align-items:center; flex-shrink:0; min-width:44px; }
  .char-status-lv-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--sao-text-dim); }
  .char-status-lv-num { font-family:'Cinzel',serif; font-size:26px; font-weight:700; color:#fff; line-height:1; text-shadow:0 0 10px var(--sao-cyan); }
  .char-status-xp { flex:1; min-width:0; }
  .char-status-xp-bar { height:6px; background:rgba(255,255,255,0.07); border-radius:3px; overflow:hidden; margin-bottom:5px; }
  .char-status-xp-fill { height:100%; border-radius:3px; transition:width 0.5s ease; box-shadow:0 0 8px currentColor; }
  .char-status-xp-text { display:flex; justify-content:space-between; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.5px; color:var(--sao-text-dim); }
  .char-status-xp-text span:first-child { color:var(--sao-cyan-bright); }

  /* ── CLASS PANEL (CHARACTER tab) ──────────────────────────────── */
  #classPanelEl { margin-bottom:18px; }
  .class-panel {
    background:linear-gradient(135deg,rgba(0,8,18,0.97) 0%,rgba(6,26,43,0.92) 100%);
    border:1px solid rgba(77,208,225,0.2); border-radius:8px;
    padding:16px 18px 14px; position:relative; overflow:hidden;
  }
  .class-panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--cls-accent,var(--sao-cyan)),transparent);
  }
  .class-panel-hdr { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--sao-text-dim); margin-bottom:14px; text-align:center; }
  .class-equipped-display { text-align:center; }
  .class-name-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .class-name-big { font-family:'Cinzel',serif; font-size:22px; font-weight:700; letter-spacing:3px; text-shadow:0 0 14px currentColor; line-height:1; }
  .class-tier-badge { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; padding:3px 8px; border:1px solid currentColor; border-radius:3px; opacity:0.7; }
  .class-stats-chips { display:flex; justify-content:center; gap:7px; margin-bottom:10px; flex-wrap:wrap; }
  .cls-stat-chip { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--chip-c); border:1px solid var(--chip-c); padding:2px 9px; border-radius:3px; text-shadow:0 0 6px var(--chip-c); }
  .class-passive-row { font-size:11px; color:var(--sao-text-dim); letter-spacing:0.5px; margin-bottom:6px; }
  .class-panel-desc { font-size:10px; color:rgba(255,255,255,0.35); letter-spacing:0.3px; font-style:italic; margin-bottom:12px; line-height:1.4; }
  .class-mastery-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .class-mastery-bar { flex:1; height:6px; background:rgba(255,255,255,0.07); border-radius:3px; overflow:hidden; }
  .class-mastery-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
  .class-mastery-label { font-family:'Cinzel',serif; font-size:10px; color:var(--sao-text-dim); white-space:nowrap; min-width:75px; text-align:right; }
  .class-unlock-alert { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--sao-gold-soft); text-shadow:0 0 8px var(--sao-gold); text-align:center; margin-bottom:12px; animation:pulse-gold 1.6s ease-in-out infinite; }
  @keyframes pulse-gold { 0%,100%{opacity:1} 50%{opacity:0.45} }
  .class-change-btn { width:100%; font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; padding:9px; background:transparent; border:1px solid rgba(77,208,225,0.35); color:var(--sao-cyan-bright); border-radius:4px; cursor:pointer; transition:all 0.2s; }
  .class-change-btn:hover { background:rgba(77,208,225,0.1); border-color:var(--sao-cyan); box-shadow:0 0 12px rgba(77,208,225,0.3); }

  /* ── CLASS POPUP OVERLAY ──────────────────────────────────────── */
  .class-popup-overlay { position:fixed; inset:0; background:rgba(0,4,12,0.93); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); z-index:1000; display:flex; flex-direction:column; padding:14px 14px 10px; }
  .class-popup-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-shrink:0; }
  .class-popup-title { font-family:'Cinzel',serif; font-size:14px; letter-spacing:4px; color:var(--sao-cyan-bright); text-shadow:0 0 10px var(--sao-cyan); }
  .class-popup-close { background:transparent; border:1px solid rgba(77,208,225,0.25); color:var(--sao-text-dim); width:30px; height:30px; border-radius:4px; cursor:pointer; font-size:14px; transition:all 0.2s; }
  .class-popup-close:hover { border-color:#ef5350; color:#ef5350; box-shadow:0 0 8px rgba(239,83,80,0.4); }

  /* ── CLASS TREE ───────────────────────────────────────────────── */
  .class-tree-row { display:flex; align-items:center; justify-content:center; margin-bottom:12px; padding:10px 6px; background:rgba(0,8,18,0.6); border:1px solid rgba(77,208,225,0.1); border-radius:6px; flex-shrink:0; }
  .tree-node { text-align:center; padding:6px 8px; min-width:70px; border-radius:4px; cursor:pointer; transition:background 0.2s; }
  .tree-node:hover { background:rgba(255,255,255,0.04); }
  .tree-node-name { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; font-weight:600; margin-bottom:3px; }
  .tree-node-req  { font-size:9px; color:var(--sao-text-dim); margin-bottom:3px; }
  .tree-node-status { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; }
  .tree-complete .tree-node-status { color:var(--sao-gold-soft); }
  .tree-active   .tree-node-status { color:var(--sao-cyan-bright); }
  .tree-locked   .tree-node-status { color:rgba(255,255,255,0.18); }
  .tree-eq-dot { color:var(--sao-gold-soft); margin-right:3px; }
  .tree-arrow { color:rgba(77,208,225,0.22); font-size:18px; padding:0 2px; flex-shrink:0; }

  /* ── TIER TABS ────────────────────────────────────────────────── */
  .class-tier-tabs { display:flex; gap:6px; margin-bottom:12px; flex-shrink:0; }
  .class-tier-tab { flex:1; font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; padding:8px 4px; background:rgba(0,8,18,0.8); border:1px solid rgba(77,208,225,0.12); color:var(--sao-text-dim); border-radius:4px; cursor:pointer; transition:all 0.2s; text-align:center; }
  .class-tier-tab:hover:not(.locked-tab) { border-color:rgba(77,208,225,0.4); color:var(--sao-cyan-bright); background:rgba(77,208,225,0.07); }
  .class-tier-tab.active { border-color:var(--sao-cyan); color:var(--sao-cyan-bright); background:rgba(77,208,225,0.12); box-shadow:0 0 8px rgba(77,208,225,0.2); }
  .class-tier-tab.locked-tab { opacity:0.3; cursor:not-allowed; }

  /* ── CLASS CARDS ──────────────────────────────────────────────── */
  .class-popup-body { flex:1; overflow-y:auto; padding-right:3px; }
  .class-popup-body::-webkit-scrollbar { width:4px; }
  .class-popup-body::-webkit-scrollbar-track { background:transparent; }
  .class-popup-body::-webkit-scrollbar-thumb { background:rgba(77,208,225,0.2); border-radius:2px; }
  .class-cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:10px; padding-bottom:8px; }
  .class-card { background:rgba(0,8,18,0.92); border:1px solid rgba(120,120,120,0.18); border-left:3px solid var(--cls-color); border-radius:6px; padding:13px 14px; transition:all 0.2s; }
  .class-card.available:not(.equipped-cls) { cursor:pointer; }
  .class-card.available:not(.equipped-cls):hover { border-color:var(--cls-color); transform:translateY(-2px); box-shadow:0 4px 18px rgba(0,0,0,0.5),0 0 10px var(--cls-color); background:rgba(255,255,255,0.04); }
  .class-card.locked { opacity:0.5; filter:grayscale(0.35); }
  .class-card.equipped-cls { border-color:var(--cls-color); box-shadow:0 0 14px var(--cls-color); background:rgba(255,255,255,0.04); }
  .class-card-eq-badge { position:absolute; top:8px; right:8px; font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px; color:var(--sao-gold-soft); border:1px solid var(--sao-gold-soft); padding:2px 5px; border-radius:2px; }
  .class-card-name { font-family:'Cinzel',serif; font-size:13px; font-weight:700; letter-spacing:2px; margin-bottom:8px; line-height:1.2; text-shadow:0 0 10px var(--cls-color); }
  .class-card-chips { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .class-card-chip { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--chip-c); border:1px solid var(--chip-c); padding:2px 6px; border-radius:2px; text-shadow:0 0 4px var(--chip-c); }
  .class-card-desc { font-size:9px; color:rgba(255,255,255,0.35); font-style:italic; letter-spacing:0.3px; margin-bottom:7px; line-height:1.4; }
  .class-card-passive { font-size:10px; color:var(--sao-text-dim); letter-spacing:0.5px; margin-bottom:4px; }
  .class-card-prereq, .class-card-unlock { font-size:10px; color:var(--sao-text-dim); margin-bottom:3px; line-height:1.5; }
  .class-card-lock { margin-top:8px; font-size:10px; line-height:1.7; border-top:1px solid rgba(255,255,255,0.06); padding-top:7px; }
  .class-card-mastery { margin-top:10px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06); }
  .class-card-mastery-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .class-card-mastery-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:rgba(180,220,235,0.4); }
  .class-card-mastery-label.mastered { color:var(--sao-gold-soft); }
  .class-card-mastery-val { font-size:9px; color:rgba(180,220,235,0.55); letter-spacing:0.5px; }
  .class-card-mastery-val.mastered { color:var(--sao-gold-soft); font-family:'Cinzel',serif; letter-spacing:1px; }
  .class-card-mastery-track { height:4px; background:rgba(0,10,20,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
  .class-card-mastery-fill { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }

  /* ── EQUIP CONFIRM POPUP ──────────────────────────────────────── */
  .equip-confirm-overlay {
    position:fixed; inset:0; background:rgba(0,4,12,0.88);
    z-index:9998; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .equip-confirm-box {
    background:linear-gradient(135deg,rgba(0,8,18,0.98),rgba(6,26,43,0.95));
    border:1px solid rgba(77,208,225,0.25); border-radius:8px;
    padding:28px 24px 22px; max-width:320px; width:100%;
    text-align:center; position:relative; overflow:hidden;
  }
  .equip-confirm-box::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--confirm-color,var(--sao-cyan)),transparent);
  }
  .equip-confirm-label {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
    color:var(--sao-text-dim); margin-bottom:14px;
  }
  .equip-confirm-name {
    font-family:'Cinzel',serif; font-size:20px; font-weight:700;
    letter-spacing:3px; text-shadow:0 0 14px currentColor;
    margin-bottom:6px; line-height:1.2;
  }
  .equip-confirm-chips { display:flex; justify-content:center; gap:7px; margin-bottom:18px; }
  .equip-confirm-body {
    font-size:12px; color:var(--sao-text-dim); margin-bottom:22px; line-height:1.5;
  }
  .equip-confirm-btns { display:flex; gap:10px; }
  .equip-confirm-yes {
    flex:1; font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    padding:10px; border-radius:4px; cursor:pointer; transition:all 0.2s;
    background:transparent; border:1px solid var(--confirm-color,var(--sao-cyan));
    color:var(--confirm-color,var(--sao-cyan-bright));
  }
  .equip-confirm-yes:hover { box-shadow:0 0 14px var(--confirm-color,var(--sao-cyan)); background:rgba(255,255,255,0.05); }
  .equip-confirm-no {
    flex:1; font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    padding:10px; border-radius:4px; cursor:pointer; transition:all 0.2s;
    background:transparent; border:1px solid rgba(77,208,225,0.2); color:var(--sao-text-dim);
  }
  .equip-confirm-no:hover { border-color:rgba(239,83,80,0.5); color:#ef5350; }

  /* ── CLASS UNLOCK OVERLAY ── */
  .class-unlock-overlay {
    position: fixed; inset: 0; z-index: 9995;
    background: rgba(2,13,20,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: all; overflow: hidden;
    animation: cuIn 0.45s ease forwards;
  }
  .class-unlock-overlay.leaving { animation: cuOut 0.5s ease forwards; }
  @keyframes cuIn  { from{opacity:0;transform:scale(1.04)} to{opacity:1;transform:scale(1)} }
  @keyframes cuOut { from{opacity:1} to{opacity:0} }
  .cu-bg-glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 65% 55% at center, var(--cu-glow, rgba(77,208,225,0.08)) 0%, transparent 65%);
    animation: cuGlowPulse 1.8s ease infinite alternate;
  }
  @keyframes cuGlowPulse { from{opacity:0.5} to{opacity:1} }
  .cu-scan {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(77,208,225,0.014) 3px, rgba(77,208,225,0.014) 4px);
  }
  .cu-eyebrow { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; color:var(--sao-cyan); opacity:0; margin-bottom:10px; animation:cuUp 0.5s 0.3s ease forwards; }
  .cu-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--sao-text-dim); opacity:0; margin-bottom:20px; animation:cuUp 0.5s 0.42s ease forwards; }
  .cu-ring {
    width:130px; height:130px; border-radius:50%;
    border:1px solid var(--cu-color, rgba(77,208,225,0.4));
    box-shadow:0 0 30px var(--cu-glow,rgba(77,208,225,0.12)), inset 0 0 30px var(--cu-glow,rgba(77,208,225,0.05));
    display:flex; align-items:center; justify-content:center;
    margin-bottom:22px; opacity:0;
    animation:cuRingIn 0.55s 0.5s ease forwards, cuRingPulse 2s 1s ease infinite alternate;
  }
  @keyframes cuRingIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
  @keyframes cuRingPulse {
    from{box-shadow:0 0 20px var(--cu-glow,rgba(77,208,225,0.1)), inset 0 0 20px var(--cu-glow,rgba(77,208,225,0.04))}
    to  {box-shadow:0 0 55px var(--cu-glow,rgba(77,208,225,0.25)), inset 0 0 40px var(--cu-glow,rgba(77,208,225,0.10))}
  }
  .cu-ring-icon { font-size:46px; }
  .cu-tier-badge { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; padding:3px 12px; border:1px solid var(--cu-color,var(--sao-cyan)); color:var(--cu-color,var(--sao-cyan)); background:rgba(0,0,0,0.25); border-radius:2px; opacity:0; margin-bottom:12px; animation:cuUp 0.5s 0.7s ease forwards; }
  .cu-class-name { font-family:'Cinzel',serif; font-size:26px; font-weight:700; letter-spacing:3px; color:var(--cu-color,#fff); text-align:center; line-height:1.2; opacity:0; animation:cuUp 0.5s 0.85s ease forwards, cuNameGlow 1.6s 1.3s ease infinite alternate; }
  @keyframes cuNameGlow {
    from { text-shadow:0 0 18px var(--cu-glow-str,rgba(77,208,225,0.4)); }
    to   { text-shadow:0 0 42px var(--cu-glow-str,rgba(77,208,225,0.8)), 0 0 80px var(--cu-glow,rgba(77,208,225,0.2)); }
  }
  .cu-class-stats { font-size:11px; color:var(--sao-text-dim); letter-spacing:2px; opacity:0; margin-top:6px; animation:cuUp 0.5s 1.0s ease forwards; }
  .cu-divider { width:0; height:1px; margin:14px auto 12px; background:linear-gradient(90deg,transparent,var(--cu-color,var(--sao-cyan)),transparent); animation:cuLine 0.6s 1.1s ease forwards; }
  @keyframes cuLine { from{width:0} to{width:200px} }
  .cu-sub { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.6); text-align:center; line-height:2; opacity:0; animation:cuUp 0.5s 1.2s ease forwards; }
  .cu-tap { font-size:9px; color:var(--sao-text-dim); letter-spacing:2px; opacity:0; margin-top:26px; animation:cuUp 0.5s 1.5s ease forwards; }
  @keyframes cuUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  /* Multi-class variant */
  .cu-multi-list { display:flex; flex-direction:column; gap:8px; width:100%; max-width:320px; padding:0 20px; margin-bottom:8px; }
  .cu-multi-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid rgba(77,208,225,0.2); background:rgba(0,10,20,0.45); border-radius:3px; opacity:0; }
  .cu-multi-item:nth-child(1){animation:cuUp 0.45s 0.55s ease forwards}
  .cu-multi-item:nth-child(2){animation:cuUp 0.45s 0.68s ease forwards}
  .cu-multi-item:nth-child(3){animation:cuUp 0.45s 0.81s ease forwards}
  .cu-multi-item:nth-child(4){animation:cuUp 0.45s 0.94s ease forwards}
  .cu-multi-item:nth-child(5){animation:cuUp 0.45s 1.07s ease forwards}
  .cu-multi-item:nth-child(6){animation:cuUp 0.45s 1.20s ease forwards}
  .cu-multi-icon { font-size:18px; flex-shrink:0; }
  .cu-multi-name { font-family:'Cinzel',serif; font-size:12px; letter-spacing:1.5px; color:#fff; flex:1; }
  .cu-multi-tier { font-size:8px; letter-spacing:1px; color:var(--sao-text-dim); flex-shrink:0; }
  .cu-multi-stats { font-size:13px; letter-spacing:1px; flex-shrink:0; margin-left:4px; }
</style>
</head>
<body>

<div class="container">
  <div class="status-panel" id="statusPanel">
    <div class="status-top-bar">
      <span><span class="blink-dot"></span>MENU // STATUS</span>
      <span id="dateLabel">--</span>
      <button class="sound-toggle" id="soundToggle" title="Toggle sound" onclick="toggleSound()">🔊</button>
    </div>
    <div class="status-body">
      <div class="player-row">
        <div class="avatar-frame" id="avatarFrame" onclick="document.getElementById('avatarInput').click()" title="Upload profile photo">
          <span id="avatarLetter">T</span>
        </div>
        <input type="file" id="avatarInput" accept="image/*">
        <div class="player-info-wrap">
          <div class="player-info">
            <div class="player-name" id="playerNameEl">Tuni</div>
            <div class="player-tag" id="playerTagEl">Beginner</div>
          </div>
          <button class="player-edit-btn" onclick="openPlayerModal()" title="Edit profile">✎</button>
        </div>
        <div class="lvl-pill">LV <span id="lvNum">1</span></div>
      </div>
      <div class="bars-row">
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">HP</span><span id="hpText">100/100</span></div>
          <div class="bar-track"><div class="bar-fill hp" id="hpFill" style="width:100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">MP</span><span id="mpText">100/100</span></div>
          <div class="bar-track"><div class="bar-fill mp" id="mpFill" style="width:100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-label"><span class="bar-name">EXP</span><span id="xpText">0/100</span></div>
          <div class="bar-track"><div class="bar-fill exp" id="xpFill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="micro-stats">
        <div class="micro"><div class="micro-label">STREAK</div><div class="micro-value gold" id="statStreak">0</div></div>
        <div class="micro"><div class="micro-label">DAY</div><div class="micro-value" id="statQuests">0/0</div></div>
        <div class="micro"><div class="micro-label">WEEK</div><div class="micro-value gold" id="statWeek">0/0</div></div>
        <div class="micro"><div class="micro-label">GOLD</div><div class="micro-value gold" id="statCol">0</div></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="habits">⟦ HABITS ⟧</div>
    <div class="tab" data-tab="work">⟦ WORK ⟧</div>
    <div class="tab" data-tab="character">⟦ CHARACTER ⟧</div>
    <div class="tab" data-tab="history">⟦ HISTORY ⟧</div>
    <div class="tab" data-tab="achievements">⟦ ACHIEVEMENTS ⟧</div>
    <div class="tab tab-full" data-tab="inventory">⟦ INVENTORY ⟧</div>
  </div>

  <div class="panel" id="mainPanel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">DAILY QUESTS</div>
      <div class="panel-subtitle" id="panelSubtitle">Today's missions</div>
    </div>
    <div id="panelContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="habitModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">⟦ NEW HABIT ⟧</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="m-btn cancel" onclick="closeModal()">CANCEL</button>
      <button class="m-btn save" id="modalSaveBtn" onclick="handleSave()">SAVE</button>
    </div>
  </div>
</div>

<div class="notification" id="notification">
  <div class="notif-bar">⟦ SYSTEM ⟧</div>
  <div class="notif-body" id="notifMsg">Quest Complete!</div>
</div>

<script src=game.js></script>
</body>
</html>
