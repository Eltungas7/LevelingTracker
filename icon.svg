<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1b29"/>
      <stop offset="100%" stop-color="#07111b"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <g clip-path="url(#clip)">

    <!-- Ambient compass fill -->
    <circle cx="256" cy="256" r="150" fill="rgba(200,136,58,0.10)"/>
    <!-- Outer amber ring -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="#c8883a" stroke-width="5.5"/>
    <!-- Inner segmented ring: 8 arcs, gaps at diagonal positions -->
    <circle cx="256" cy="256" r="132" fill="none" stroke="#9a5e15"
            stroke-width="6" stroke-dasharray="68 36" stroke-dashoffset="34"/>
    <!-- Cardinal tick marks on outer ring -->
    <line x1="256" y1="94"  x2="256" y2="110" stroke="#c8883a" stroke-width="4"/>
    <line x1="256" y1="402" x2="256" y2="418" stroke="#c8883a" stroke-width="4"/>
    <line x1="94"  y1="256" x2="110" y2="256" stroke="#c8883a" stroke-width="4"/>
    <line x1="402" y1="256" x2="418" y2="256" stroke="#c8883a" stroke-width="4"/>

    <!-- ══ LANCE — drawn pointing up, rotate(45°) → tip upper-right, butt lower-left ══ -->
    <g transform="translate(256,256) rotate(45)" fill="#5cc8e2">
      <!-- Spear head -->
      <polygon points="0,-204, 15,-158, 15,-116, 0,-108, -15,-116, -15,-158"/>
      <!-- Head bevel highlight -->
      <polygon points="0,-204, 7,-158, 15,-158, 15,-116, 0,-108" fill="#9ae4f8" opacity="0.55"/>
      <!-- Socket collar -->
      <rect x="-13" y="-112" width="26" height="13" rx="3"/>
      <rect x="-13" y="-112" width="26" height="5"  rx="2" fill="#9ae4f8" opacity="0.4"/>
      <!-- Shaft -->
      <rect x="-7"  y="-99"  width="14" height="310" rx="3" fill="#3ea8c0"/>
      <!-- Shaft centre highlight -->
      <rect x="-2"  y="-99"  width="5"  height="310" rx="2" fill="#5cc8e2" opacity="0.38"/>
      <!-- Butt cap diamond -->
      <polygon points="0,224, 17,209, 0,199, -17,209"/>
    </g>

    <!-- ══ SWORD — drawn pointing up, rotate(135°) → tip lower-right, handle upper-left ══ -->
    <g transform="translate(256,256) rotate(135)" fill="#5cc8e2">
      <!-- Blade (tapered) -->
      <polygon points="0,-204, 14,-13, -14,-13"/>
      <!-- Blade bevel highlight -->
      <polygon points="0,-204, 6,-58, 14,-13" fill="#9ae4f8" opacity="0.52"/>
      <!-- Blade window cutouts (geometric detail) -->
      <polygon points="-5,-90, 0,-108, 5,-90, 0,-72" fill="#091520" opacity="0.82"/>
      <polygon points="-4,-58, 0,-72,  4,-58, 0,-44" fill="#091520" opacity="0.72"/>
      <!-- Crossguard -->
      <polygon points="-40,-14, 40,-14, 42,3, 32,13, 13,13, 13,6, -13,6, -13,13, -32,13, -42,3"/>
      <!-- Guard top highlight -->
      <rect x="-40" y="-14" width="80" height="4" rx="1" fill="#9ae4f8" opacity="0.38"/>
      <!-- Grip -->
      <rect x="-9"  y="13"  width="18" height="52" rx="2" fill="#3ea8c0"/>
      <!-- Grip wraps -->
      <rect x="-9"  y="25"  width="18" height="3"  rx="1" fill="#5cc8e2" opacity="0.52"/>
      <rect x="-9"  y="37"  width="18" height="3"  rx="1" fill="#5cc8e2" opacity="0.52"/>
      <rect x="-9"  y="49"  width="18" height="3"  rx="1" fill="#5cc8e2" opacity="0.52"/>
      <!-- Pommel -->
      <polygon points="0,93, 24,75, 10,65, -10,65, -24,75"/>
      <polygon points="0,93, 18,81, 0,72, -18,81" fill="#9ae4f8" opacity="0.4"/>
    </g>

    <!-- ══ 4-POINTED AMBER STAR (tips at ±90 px) ══ -->
    <polygon points="256,166, 282,230, 346,256, 282,282, 256,346, 230,282, 166,256, 230,230"
             fill="#c8883a"/>
    <!-- Facets: lit top-left, shadowed bottom-right -->
    <polygon points="256,166, 282,230, 256,256, 230,230" fill="#e0a030" opacity="0.68"/>
    <polygon points="166,256, 230,230, 256,256, 230,282" fill="#e0a030" opacity="0.68"/>
    <polygon points="346,256, 282,282, 256,256, 282,230" fill="#884c10" opacity="0.58"/>
    <polygon points="256,346, 230,282, 256,256, 282,282" fill="#884c10" opacity="0.58"/>
    <!-- Centre disc -->
    <circle cx="256" cy="256" r="26" fill="#d09022"/>
    <circle cx="256" cy="256" r="15" fill="#a86015"/>
    <!-- Centre glint -->
    <polygon points="256,249, 264,256, 256,263, 248,256" fill="#f4c040" opacity="0.92"/>

  </g>
</svg>
